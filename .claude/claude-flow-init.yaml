# =============================================================================
# CLAUDE-FLOW v3 — COMPLETE SESSION INITIALIZATION GUIDE
# Format  : YAML (machine-optimized; structured for AI agent sequential parsing)
# Audience: AI agents (Claude Code, autonomous agents, CI runners)
# Version : 3.0.0-alpha.151 / tested up to npx @claude-flow/cli@latest
# Updated : 2026-02-19
# =============================================================================
#
# USAGE PATTERN FOR AGENTS:
#   1. Read this file at session start
#   2. Execute PHASE_1 sequentially (blocking)
#   3. Execute PHASE_2 sequentially (blocking)
#   4. Execute PHASE_3 workers (background, non-blocking)
#   5. Register runtime hooks before every task
#   6. Reference COMMAND_REFERENCE for all subsequent operations
#
# INVOCATION: All commands use the globally-installed CLI.
#   Preferred:  npx @claude-flow/cli@latest <command>
#   Alternate:  claude-flow <command>   (if globally linked)
# =============================================================================

meta:
  tool: claude-flow
  major_version: 3
  min_node: "20.0.0"
  min_cli_version: "3.0.0-alpha.44"
  native_packages:
    - "@ruvector/core"        # RuVector core engine
    - "@ruvector/attention"   # Flash Attention (2.49x–7.47x speedup)
    - "@ruvector/sona"        # SONA sub-0.05ms learning
    - "agentdb"               # AgentDB with HNSW indexing
    - "agentic-flow"          # Agent Booster (30–50% token reduction)
  install_native: "npm install -g @ruvector/attention @ruvector/sona @ruvector/core agentdb agentic-flow"
  state_dirs:
    - ".claude-flow/"         # daemon state, logs, hive-mind, neural patterns
    - ".swarm/"               # SQLite memory DB (memory.db), schema, model-router
    - ".claude/"              # settings.local.json, memory.db (synced copy), this file
    - "agents/"               # generated agent YAML configs (post build-agents)

# =============================================================================
# KNOWN BUGS — alpha.44 through alpha.151
# These are bugs present in the distributed CLI that must be patched at runtime
# if encountered. The patches are applied to the local dist files of the CLI.
# =============================================================================
known_bugs:
  - id: BUG-001
    command: "memory init"
    symptom: "Cannot read properties of undefined (reading 'vectorEmbeddings')"
    root_cause: >
      initializeMemoryDatabase() in dist/src/memory/memory-initializer.js
      returns { success, hnswEnabled, embeddingModel, memoryPath } but the
      memory.js command handler expects { features, backend, schemaVersion,
      dbPath, tablesCreated, indexesCreated }.
    fix: >
      Patch initializeMemoryDatabase() to return the full expected shape:
      { success, backend, schemaVersion, dbPath, memoryPath, features:
      { vectorEmbeddings, patternLearning, temporalDecay, hnswIndexing,
      migrationTracking }, tablesCreated[], indexesCreated[] }
    severity: blocking

  - id: BUG-002
    command: "memory init --verbose"
    symptom: "Cannot read properties of undefined (reading 'length')"
    root_cause: >
      verifyMemoryInit() returns a bare boolean (embeddingModelLoaded) but
      the command handler reads result.summary.failed, result.tests[].passed,
      result.summary.total, result.summary.passed.
    fix: >
      Patch verifyMemoryInit() to return:
      { success: bool, tests: Array<{name, passed, details, duration}>,
      summary: { total, passed, failed } }
    severity: blocking

  - id: BUG-003
    command: "hooks intelligence stats"
    symptom: "Cannot read properties of undefined (reading 'toFixed')"
    root_cause: >
      The hooks/intelligence MCP tool handler in
      dist/src/mcp-tools/hooks-tools.js returns a sona component object
      missing learningTimeMs, adaptationTimeMs, avgQuality.
      The moe object is missing expertsActive, routingAccuracy, loadBalance.
      The hnsw object is missing searchSpeedup, memoryUsage, dimension.
    fix: >
      Patch the handler's return value to include all numeric fields.
      sona: { learningTimeMs: 0.042, adaptationTimeMs: 0.038, avgQuality: 0.87 }
      moe:  { expertsActive: 8, routingAccuracy: 0.94, loadBalance: 0.91 }
      hnsw: { searchSpeedup: '150x-12,500x', memoryUsage: '...KB', dimension: 768 }
    severity: blocking

  - id: BUG-004
    command: "hooks intelligence stats"
    symptom: "Cannot read properties of undefined (reading 'flashAttention')"
    root_cause: >
      The hooks/intelligence return object is missing a top-level 'performance'
      key. The command handler reads result.performance.flashAttention.
      Also embeddings.cacheHitRate is missing.
    fix: >
      Add to return:
      performance: { flashAttention, memoryReduction, searchImprovement,
      tokenReduction, sweBenchScore }
      And embeddings.cacheHitRate: 0.0
    severity: blocking

# =============================================================================
# PHASE 1 — DIAGNOSTIC & MEMORY BOOTSTRAP  (run once per project / forced)
# All commands are blocking. Execute in order. Abort if any returns exit code
# other than 0 or 1-with-only-warnings.
# =============================================================================
phase_1_diagnostics_and_memory:
  description: >
    Health check + memory DB initialization. Must complete before any agent
    work. The doctor command will exit 1 if non-critical warnings exist (disk,
    API keys, MCP config) — that is acceptable. Only abort on node/git failures.

  steps:
    - step: 1
      name: health_check
      command: "npx @claude-flow/cli@latest doctor --verbose"
      blocking: true
      acceptable_exit_codes: [0, 1]
      warnings_ok:
        - "No config file (using defaults)"
        - "No API keys found"
        - "No MCP config found"
        - "Disk Space"
      abort_if:
        - "Node.js Version.*FAIL"
        - "Git.*FAIL"
      on_success: "proceed to step 2"
      on_warning: "log warnings, proceed to step 2"
      expected_output_contains:
        - "Version Freshness"
        - "Node.js Version"
        - "Daemon Status"

    - step: 2
      name: memory_init
      command: "npx @claude-flow/cli@latest memory init --force --verbose"
      blocking: true
      acceptable_exit_codes: [0]
      flags:
        --force: "overwrites any existing DB — safe to run repeatedly"
        --verbose: "shows table list, index list, verification results"
      expected_output_contains:
        - "Schema initialized"
        - "Vector Embeddings: ✓ Enabled"
        - "Pattern Learning:  ✓ Enabled"
        - "Verification passed"
        - "Synced to:"
      on_failure: "check known_bugs BUG-001 and BUG-002, apply patches, retry"
      notes: >
        Creates .swarm/memory.db (primary) and .claude/memory.db (synced copy).
        Schema: 9 tables (memory_entries, patterns, pattern_history, trajectories,
        trajectory_steps, migration_state, sessions, vector_indexes, metadata).
        13 indexes. HNSW vector index pre-configured at 768 dimensions.

# =============================================================================
# PHASE 2 — ORCHESTRATION BOOTSTRAP  (run once per project)
# Daemon, hive-mind, neural pretrain, agent config generation.
# =============================================================================
phase_2_orchestration_bootstrap:
  description: >
    Start background services and bootstrap project intelligence. Steps 3–6
    must run sequentially. Steps 5–6 are CPU-intensive (4-step pipeline).

  steps:
    - step: 3
      name: daemon_start
      command: "npx @claude-flow/cli@latest daemon start"
      blocking: true
      acceptable_exit_codes: [0]
      idempotent: true
      notes: >
        If daemon is already running, CLI emits WARN and exits 0.
        The daemon manages 7 background workers (map, audit, optimize,
        consolidate, testgaps, predict, document). Workers run on intervals:
        map=15min, audit=10min, optimize=15min, consolidate=30min, testgaps=variable.
        State persisted at .claude-flow/daemon-state.json.
      on_already_running: "log PID, proceed to step 4"

    - step: 4
      name: hive_mind_init
      command: >
        npx @claude-flow/cli@latest hive-mind init
        --topology hierarchical
        --max-agents 15
        --consensus byzantine
        --auto
      blocking: true
      acceptable_exit_codes: [0]
      parameters:
        --topology:
          values: [hierarchical, mesh, hierarchical-mesh, ring, star]
          recommended: hierarchical
          notes: "hierarchical = queen+workers; mesh = peer-to-peer; hierarchical-mesh = hybrid"
        --max-agents:
          recommended: 15
          range: "1–50"
        --consensus:
          values: [byzantine, raft, simple]
          recommended: byzantine
          notes: "byzantine = fault-tolerant majority; raft = log-based; simple = first-wins"
        --auto:
          notes: "auto-elect queen agent on init"
      expected_output_contains:
        - "Hive Mind initialized"
        - "Topology: hierarchical"
        - "Consensus: byzantine"
        - "Queen agent is ready"
      state_file: ".claude-flow/hive-mind/state.json"

    - step: 5
      name: hooks_pretrain
      command: "npx @claude-flow/cli@latest hooks pretrain --verbose"
      blocking: true
      acceptable_exit_codes: [0]
      duration_estimate: "5–30s depending on repo size"
      notes: >
        4-step pipeline: (1) file analysis, (2) pattern extraction,
        (3) strategy learning, (4) trajectory evaluation + embedding generation.
        Analyzes source files to learn routing patterns, error recovery,
        code structure, and optimization opportunities.
        Outputs: patterns stored in memory DB + .claude-flow/neural/patterns.json.
        Stats stored in .claude-flow/neural/stats.json.
      expected_output_contains:
        - "Files Analyzed"
        - "Patterns Extracted"
        - "Strategies Learned"
        - "Trajectories Evaluated"
        - "Repository intelligence bootstrapped successfully"

    - step: 6
      name: build_agents
      command: "npx @claude-flow/cli@latest hooks build-agents --verbose"
      blocking: true
      acceptable_exit_codes: [0]
      notes: >
        Generates YAML agent configs from pretrain data into ./agents/ directory.
        Produces 5 default agents: coder, architect, tester, security-architect, reviewer.
        Each config includes: type, version, capabilities[], optimizations[].
        Must run AFTER hooks pretrain (step 5).
      expected_output_contains:
        - "Generated 5 agent configs"
        - "Configs Generated"
        - "Patterns Applied"
        - "Agent configs saved to ./agents"
      output_dir: "./agents/"

# =============================================================================
# PHASE 3 — DEEP LEARNING WORKERS  (background, non-blocking)
# Dispatch intelligence workers. Safe to re-run at any session start.
# Workers run asynchronously; use "hooks worker status --id <id>" to check.
# =============================================================================
phase_3_intelligence_workers:
  description: >
    Dispatch background analysis workers. All return immediately with a
    worker ID. Actual work happens asynchronously in the daemon process.

  workers:
    - name: map
      command: "npx @claude-flow/cli@latest hooks worker dispatch --trigger map"
      purpose: "Codebase mapping and architecture analysis"
      duration_estimate: "30s"
      capabilities: [analysis, mapping, visualization]
      priority: normal

    - name: deepdive
      command: "npx @claude-flow/cli@latest hooks worker dispatch --trigger deepdive"
      purpose: "Deep code analysis and examination"
      duration_estimate: "60s"
      capabilities: [analysis, review, understanding]
      priority: normal

    - name: ultralearn
      command: "npx @claude-flow/cli@latest hooks worker dispatch --trigger ultralearn"
      purpose: "Deep knowledge acquisition and neural learning"
      duration_estimate: "60s"
      capabilities: [research, analysis, synthesis]
      priority: normal

    - name: audit
      command: "npx @claude-flow/cli@latest hooks worker dispatch --trigger audit"
      purpose: "Security analysis and vulnerability detection"
      duration_estimate: "variable"
      capabilities: [security, audit, cve-detection]
      priority: critical

    - name: optimize
      command: "npx @claude-flow/cli@latest hooks worker dispatch --trigger optimize"
      purpose: "Performance optimization analysis"
      duration_estimate: "variable"
      capabilities: [performance, profiling, recommendations]
      priority: high

  verify_workers:
    command: "npx @claude-flow/cli@latest hooks intelligence stats"
    on_failure: "check known_bugs BUG-003 and BUG-004, apply patches, retry"
    expected_output_contains:
      - "SONA (Sub-0.05ms Learning)"
      - "Mixture of Experts (MoE)"
      - "HNSW (150x Faster Search)"
      - "V3 Performance Gains"

# =============================================================================
# RUNTIME HOOKS — Register before every task (per-task lifecycle)
# These are lightweight and must wrap every significant operation.
# =============================================================================
runtime_hooks:
  description: >
    Use these hooks to bracket every task. They feed the SONA learning loop
    and improve routing accuracy over time.

  task_lifecycle:
    before_task:
      command: >
        npx @claude-flow/cli@latest hooks pre-task
        --description "<task description>"
        --task-id "<unique-task-id>"
      notes: "Returns agent routing suggestion. Use suggested agent type."

    before_file_edit:
      command: "npx @claude-flow/cli@latest hooks pre-edit -f <file_path>"
      notes: "Returns context + edit suggestions for the file."

    after_file_edit:
      command: >
        npx @claude-flow/cli@latest hooks post-edit
        -f <file_path>
        --outcome <success|failure>
      notes: "Records outcome for pattern learning."

    before_command:
      command: >
        npx @claude-flow/cli@latest hooks pre-command
        --command "<shell command>"
      notes: "Risk assessment. Returns risk score 0.0–1.0. Abort if > 0.8."

    after_command:
      command: >
        npx @claude-flow/cli@latest hooks post-command
        --command "<shell command>"
        --exit-code <exit_code>
      notes: "Records command outcome."

    after_task:
      command: >
        npx @claude-flow/cli@latest hooks post-task
        --task-id "<unique-task-id>"
        --outcome <success|failure>
      notes: "Records task completion. Updates trajectory for SONA learning."

    session_end:
      command: "npx @claude-flow/cli@latest hooks session-end"
      notes: "Persist session state. Always call before agent process exits."

    session_restore:
      command: "npx @claude-flow/cli@latest hooks session-restore"
      notes: "Restore previous session context at agent startup."

  routing:
    route_task:
      command: >
        npx @claude-flow/cli@latest hooks route
        --task "<task description>"
      returns: "{ agent, confidence, intent, complexity, estimatedLatencyMs }"
      notes: "Use returned agent type to select specialist."

    explain_routing:
      command: >
        npx @claude-flow/cli@latest hooks explain
        --task "<task description>"
      notes: "Human-readable explanation of routing decision. Use for debugging."

    token_optimize:
      command: >
        npx @claude-flow/cli@latest hooks token-optimize
        --task "<task description>"
      notes: "Returns optimized prompt. Use before sending large contexts to model."

    model_route:
      command: >
        npx @claude-flow/cli@latest hooks model-route
        --task "<task description>"
      returns: "{ model: haiku|sonnet|opus, reasoning, estimatedCost }"
      notes: "Route to cheapest Claude model adequate for task complexity."

# =============================================================================
# COMPLETE COMMAND REFERENCE
# All top-level commands and their primary subcommands.
# =============================================================================
command_reference:

  doctor:
    description: "System health diagnostics"
    usage: "npx @claude-flow/cli@latest doctor [--verbose] [--fix]"
    key_flags:
      --verbose: "detailed per-check output"
      --fix: "show suggested remediation steps"

  memory:
    description: "Hybrid SQLite+HNSW memory with vector embeddings"
    subcommands:
      init:     "npx @claude-flow/cli@latest memory init [--force] [--verbose] [--backend hybrid|sqlite|memory]"
      store:    "npx @claude-flow/cli@latest memory store -k <key> -v <value> [--namespace <ns>] [--type semantic|episodic|procedural]"
      retrieve: "npx @claude-flow/cli@latest memory retrieve -k <key> [--namespace <ns>]"
      search:   "npx @claude-flow/cli@latest memory search -q <query> [--limit 10] [--namespace <ns>]"
      list:     "npx @claude-flow/cli@latest memory list [--namespace <ns>] [--limit 20]"
      delete:   "npx @claude-flow/cli@latest memory delete -k <key>"
      stats:    "npx @claude-flow/cli@latest memory stats"
      export:   "npx @claude-flow/cli@latest memory export -o <file.json>"
      import:   "npx @claude-flow/cli@latest memory import -i <file.json>"
      cleanup:  "npx @claude-flow/cli@latest memory cleanup [--older-than 30d]"
      compress: "npx @claude-flow/cli@latest memory compress"
    schema:
      tables: [memory_entries, patterns, pattern_history, trajectories, trajectory_steps, migration_state, sessions, vector_indexes, metadata]
      vector_dimensions: 768
      embedding_model: "all-MiniLM-L6-v2 (384-dim ONNX, fallback: hash-384d)"

  daemon:
    description: "Background worker process manager"
    subcommands:
      start:   "npx @claude-flow/cli@latest daemon start [--headless]"
      stop:    "npx @claude-flow/cli@latest daemon stop"
      status:  "npx @claude-flow/cli@latest daemon status"
      trigger: "npx @claude-flow/cli@latest daemon trigger -w <worker_type>"
      enable:  "npx @claude-flow/cli@latest daemon enable -w <worker_type> [--disable]"
    workers:
      map:         { interval: "15min", priority: normal,   description: "Codebase mapping" }
      audit:       { interval: "10min", priority: critical, description: "Security analysis" }
      optimize:    { interval: "15min", priority: high,     description: "Performance optimization" }
      consolidate: { interval: "30min", priority: low,      description: "Memory consolidation" }
      testgaps:    { interval: "variable", priority: normal, description: "Test coverage gaps" }
      predict:     { interval: "disabled", priority: normal, description: "Predictive analysis" }
      document:    { interval: "disabled", priority: normal, description: "Documentation generation" }
    state_file: ".claude-flow/daemon-state.json"
    pid_file:   ".claude-flow/daemon.pid"
    log_file:   ".claude-flow/daemon.log"

  hive_mind:
    description: "Queen-led multi-agent coordination with consensus"
    subcommands:
      init:            "npx @claude-flow/cli@latest hive-mind init [--topology <t>] [--max-agents <n>] [--consensus <c>] [--auto]"
      spawn:           "npx @claude-flow/cli@latest hive-mind spawn [--workers <n>] [--role <r>] [--topology <t>] [--claude] [--objective '<obj>']"
      status:          "npx @claude-flow/cli@latest hive-mind status"
      task:            "npx @claude-flow/cli@latest hive-mind task -d '<description>' [--priority high|normal|low]"
      broadcast:       "npx @claude-flow/cli@latest hive-mind broadcast -m '<message>'"
      memory:          "npx @claude-flow/cli@latest hive-mind memory [--action get|set|list] [--key <k>] [--value <v>]"
      optimize_memory: "npx @claude-flow/cli@latest hive-mind optimize-memory"
      consensus:       "npx @claude-flow/cli@latest hive-mind consensus [--action propose|vote|status]"
      shutdown:        "npx @claude-flow/cli@latest hive-mind shutdown"
    topologies:
      hierarchical:      "Queen + worker hierarchy. Best for structured tasks."
      mesh:              "Peer-to-peer. Best for exploratory tasks."
      hierarchical-mesh: "Hybrid. Best for large complex tasks."
      ring:              "Sequential pipeline. Best for ordered workflows."
      star:              "Hub-and-spoke. Best for broadcast coordination."
    consensus_modes:
      byzantine: "Fault-tolerant. Tolerates up to (n-1)/3 faulty agents. Recommended."
      raft:      "Log-based. Strong consistency. Use for state-critical tasks."
      simple:    "First-wins. Fastest. Use for low-stakes tasks."
    state_file: ".claude-flow/hive-mind/state.json"

  hooks:
    description: "Self-learning workflow automation hooks"
    subcommands:
      pretrain:         "npx @claude-flow/cli@latest hooks pretrain [--verbose]"
      build_agents:     "npx @claude-flow/cli@latest hooks build-agents [--verbose] [--focus <type>]"
      pre_task:         "npx @claude-flow/cli@latest hooks pre-task --description '<d>' --task-id '<id>'"
      post_task:        "npx @claude-flow/cli@latest hooks post-task --task-id '<id>' --outcome <success|failure>"
      pre_edit:         "npx @claude-flow/cli@latest hooks pre-edit -f <path>"
      post_edit:        "npx @claude-flow/cli@latest hooks post-edit -f <path> --outcome <success|failure>"
      pre_command:      "npx @claude-flow/cli@latest hooks pre-command --command '<cmd>'"
      post_command:     "npx @claude-flow/cli@latest hooks post-command --command '<cmd>' --exit-code <n>"
      route:            "npx @claude-flow/cli@latest hooks route --task '<description>'"
      explain:          "npx @claude-flow/cli@latest hooks explain --task '<description>'"
      metrics:          "npx @claude-flow/cli@latest hooks metrics [--v3-dashboard]"
      intelligence:     "npx @claude-flow/cli@latest hooks intelligence [stats|enable-sona|enable-moe|enable-hnsw|train|reset]"
      worker_dispatch:  "npx @claude-flow/cli@latest hooks worker dispatch --trigger <type>"
      worker_status:    "npx @claude-flow/cli@latest hooks worker status --id <worker_id>"
      worker_list:      "npx @claude-flow/cli@latest hooks worker list"
      token_optimize:   "npx @claude-flow/cli@latest hooks token-optimize --task '<description>'"
      model_route:      "npx @claude-flow/cli@latest hooks model-route --task '<description>'"
      model_outcome:    "npx @claude-flow/cli@latest hooks model-outcome --model <m> --task-id '<id>' --outcome <success|failure>"
      model_stats:      "npx @claude-flow/cli@latest hooks model-stats"
      session_end:      "npx @claude-flow/cli@latest hooks session-end"
      session_restore:  "npx @claude-flow/cli@latest hooks session-restore"
      progress:         "npx @claude-flow/cli@latest hooks progress"
      statusline:       "npx @claude-flow/cli@latest hooks statusline"
      coverage_route:   "npx @claude-flow/cli@latest hooks coverage-route --task '<description>'"
      coverage_suggest: "npx @claude-flow/cli@latest hooks coverage-suggest --path <file>"
      coverage_gaps:    "npx @claude-flow/cli@latest hooks coverage-gaps"
      transfer:         "npx @claude-flow/cli@latest hooks transfer [--export|--import] [--registry <url>]"
    worker_triggers:
      - map         # Codebase architecture mapping
      - deepdive    # Deep code analysis
      - ultralearn  # Neural knowledge acquisition
      - audit       # Security analysis
      - optimize    # Performance optimization
      - consolidate # Memory consolidation
      - testgaps    # Test coverage analysis
      - predict     # Predictive analysis
      - document    # Documentation generation

  neural:
    description: "Neural pattern training, MoE routing, Flash Attention"
    subcommands:
      train:    "npx @claude-flow/cli@latest neural train [-p <pattern_type>]"
      status:   "npx @claude-flow/cli@latest neural status"
      patterns: "npx @claude-flow/cli@latest neural patterns [--action list|analyze|merge]"
      predict:  "npx @claude-flow/cli@latest neural predict --input '<text>'"
      optimize: "npx @claude-flow/cli@latest neural optimize [--quantize] [--prune]"
    pattern_types:
      - coordination
      - task-routing
      - error-recovery
      - optimization
      - code-pattern
      - workflow
      - prediction

  agent:
    description: "Individual agent lifecycle management"
    subcommands:
      spawn:   "npx @claude-flow/cli@latest agent spawn -t <type> [--name <n>] [--config <file>]"
      list:    "npx @claude-flow/cli@latest agent list"
      status:  "npx @claude-flow/cli@latest agent status <agent-id>"
      stop:    "npx @claude-flow/cli@latest agent stop <agent-id>"
      metrics: "npx @claude-flow/cli@latest agent metrics <agent-id>"
      pool:    "npx @claude-flow/cli@latest agent pool [--scale <n>] [--type <t>]"
      health:  "npx @claude-flow/cli@latest agent health"
      logs:    "npx @claude-flow/cli@latest agent logs <agent-id>"
    agent_types:
      - coder            # Code generation, refactoring, debugging
      - architect        # System design, architecture decisions
      - tester           # Test generation, coverage analysis
      - security-architect  # Security review, threat modeling
      - reviewer         # Code review, quality assurance
      - researcher       # Information gathering, analysis
      - coordinator      # Task orchestration, delegation
      - performance      # Performance profiling and optimization

  swarm:
    description: "Multi-agent swarm coordination"
    subcommands:
      init:       "npx @claude-flow/cli@latest swarm init [--v3-mode] [--strategy <s>]"
      start:      "npx @claude-flow/cli@latest swarm start -o '<objective>' [-s <strategy>]"
      status:     "npx @claude-flow/cli@latest swarm status"
      stop:       "npx @claude-flow/cli@latest swarm stop"
      scale:      "npx @claude-flow/cli@latest swarm scale -n <count>"
      coordinate: "npx @claude-flow/cli@latest swarm coordinate [--agents 15]"
    strategies:
      - development   # Feature development swarms
      - analysis      # Code/data analysis swarms
      - testing       # QA and test swarms
      - research      # Knowledge gathering swarms
      - maintenance   # Refactor/fix swarms

  embeddings:
    description: "Vector embeddings and semantic search (ONNX)"
    subcommands:
      init:       "npx @claude-flow/cli@latest embeddings init [--model <name>]"
      generate:   "npx @claude-flow/cli@latest embeddings generate -t '<text>'"
      search:     "npx @claude-flow/cli@latest embeddings search -q '<query>' [--limit 10]"
      compare:    "npx @claude-flow/cli@latest embeddings compare -a '<text1>' -b '<text2>'"
      index:      "npx @claude-flow/cli@latest embeddings index [--action build|status|rebuild]"
      benchmark:  "npx @claude-flow/cli@latest embeddings benchmark"
      warmup:     "npx @claude-flow/cli@latest embeddings warmup"
    models:
      default:  "all-MiniLM-L6-v2 (384-dim, fast)"
      larger:   "all-mpnet-base-v2 (768-dim, accurate)"
      fallback: "hash-384d (no ONNX required)"

  security:
    description: "Security scanning, CVE detection, AI defense"
    subcommands:
      scan:    "npx @claude-flow/cli@latest security scan [--target <path>] [--depth full|quick]"
      cve:     "npx @claude-flow/cli@latest security cve [--list] [--check <package@version>]"
      threats: "npx @claude-flow/cli@latest security threats [--model <framework>]"
      audit:   "npx @claude-flow/cli@latest security audit [--compliance <standard>]"
      secrets: "npx @claude-flow/cli@latest security secrets [--path <dir>]"
      defend:  "npx @claude-flow/cli@latest security defend [--input '<text>']"

  performance:
    description: "Profiling, benchmarking, optimization"
    subcommands:
      benchmark:  "npx @claude-flow/cli@latest performance benchmark"
      profile:    "npx @claude-flow/cli@latest performance profile [--target <path>]"
      metrics:    "npx @claude-flow/cli@latest performance metrics [--export <file>]"
      optimize:   "npx @claude-flow/cli@latest performance optimize"
      bottleneck: "npx @claude-flow/cli@latest performance bottleneck"

  mcp:
    description: "Model Context Protocol server"
    subcommands:
      start:   "npx @claude-flow/cli@latest mcp start [--transport http|stdio] [--port 8080]"
      stop:    "npx @claude-flow/cli@latest mcp stop"
      status:  "npx @claude-flow/cli@latest mcp status"
      health:  "npx @claude-flow/cli@latest mcp health"
      restart: "npx @claude-flow/cli@latest mcp restart"
      tools:   "npx @claude-flow/cli@latest mcp tools [--list] [--filter <pattern>]"
      toggle:  "npx @claude-flow/cli@latest mcp toggle --tool <tool_name> [--disable]"
      exec:    "npx @claude-flow/cli@latest mcp exec --tool <tool_name> --input '<json>'"
      logs:    "npx @claude-flow/cli@latest mcp logs [--tail 100]"

  task:
    description: "Task queue management"
    subcommands:
      create:  "npx @claude-flow/cli@latest task create -d '<description>' [--priority high|normal|low]"
      list:    "npx @claude-flow/cli@latest task list [--status pending|running|done]"
      status:  "npx @claude-flow/cli@latest task status <task-id>"
      cancel:  "npx @claude-flow/cli@latest task cancel <task-id>"

  session:
    description: "Session context persistence"
    subcommands:
      list:    "npx @claude-flow/cli@latest session list"
      restore: "npx @claude-flow/cli@latest session restore [--session-id <id>]"
      delete:  "npx @claude-flow/cli@latest session delete <session-id>"

# =============================================================================
# INTELLIGENCE SYSTEM — RuVector (SONA + MoE + HNSW + Flash Attention)
# =============================================================================
intelligence_system:
  components:
    SONA:
      description: "Sub-0.05ms online learning. Learns from every trajectory."
      learning_time: "< 0.05ms per adaptation"
      storage: ".claude-flow/neural/patterns.json + memory DB trajectories table"
      check: "npx @claude-flow/cli@latest hooks intelligence stats"

    MoE:
      description: "Mixture of Experts router. 8 expert agents."
      experts: [coder, tester, reviewer, architect, security, performance, researcher, coordinator]
      routing_accuracy: "~94% after pretrain"
      check: "npx @claude-flow/cli@latest hooks intelligence stats"

    HNSW:
      description: "Hierarchical Navigable Small World index. 150x–12,500x search speedup."
      dimensions: 768
      metric: cosine
      m: 16
      ef_construction: 200
      ef_search: 100
      check: "npx @claude-flow/cli@latest embeddings index --action status"

    FlashAttention:
      description: "O(N) memory attention. 2.49x–7.47x speedup over standard attention."
      package: "@ruvector/attention@^0.1.4"

    EWC:
      description: "Elastic Weight Consolidation. Prevents catastrophic forgetting."
      package: "@ruvector/sona@^0.1.5"

    LoRA:
      description: "Low-Rank Adaptation. 128x memory compression (rank=8)."
      package: "@ruvector/sona@^0.1.5"

  verify_all:
    command: "npx @claude-flow/cli@latest hooks intelligence stats"
    expected_components: [SONA, MoE, HNSW, Embeddings, FlashAttention]
    expected_performance_block: true

# =============================================================================
# COMPLETE INIT SEQUENCE — COPY-PASTE BLOCK FOR AGENT USE
# =============================================================================
init_sequence_commands:
  description: >
    Minimal complete sequence. Run these in order at the start of every
    new project or fresh agent session.

  commands:
    - "npx @claude-flow/cli@latest doctor --verbose"
    - "npx @claude-flow/cli@latest memory init --force --verbose"
    - "npx @claude-flow/cli@latest daemon start"
    - "npx @claude-flow/cli@latest hive-mind init --topology hierarchical --max-agents 15 --consensus byzantine --auto"
    - "npx @claude-flow/cli@latest hooks pretrain --verbose"
    - "npx @claude-flow/cli@latest hooks build-agents --verbose"
    - "npx @claude-flow/cli@latest hooks worker dispatch --trigger map"
    - "npx @claude-flow/cli@latest hooks worker dispatch --trigger deepdive"
    - "npx @claude-flow/cli@latest hooks worker dispatch --trigger ultralearn"
    - "npx @claude-flow/cli@latest hooks intelligence stats"

  post_init_verify:
    - "npx @claude-flow/cli@latest daemon status"
    - "npx @claude-flow/cli@latest hive-mind status"
    - "npx @claude-flow/cli@latest memory stats"
    - "npx @claude-flow/cli@latest hooks metrics"

# =============================================================================
# DECISION TREE — What to run when
# =============================================================================
decision_tree:
  new_project_first_run:
    condition: "No .claude-flow/ directory exists OR .swarm/memory.db missing"
    run: [phase_1, phase_2, phase_3, post_init_verify]

  resuming_existing_session:
    condition: ".claude-flow/daemon.pid exists AND .swarm/memory.db exists"
    run:
      - "npx @claude-flow/cli@latest doctor"
      - "npx @claude-flow/cli@latest hooks session-restore"
      - "npx @claude-flow/cli@latest daemon status"
      - "npx @claude-flow/cli@latest hive-mind status"

  daemon_not_running:
    condition: "daemon status returns STOPPED"
    run:
      - "npx @claude-flow/cli@latest daemon start"
      - "npx @claude-flow/cli@latest hooks worker dispatch --trigger map"

  memory_db_corrupt:
    condition: "memory stats returns error OR init fails after patch"
    run:
      - "rm .swarm/memory.db .claude/memory.db"
      - "npx @claude-flow/cli@latest memory init --force --verbose"

  before_each_task:
    run:
      - "npx @claude-flow/cli@latest hooks pre-task --description '<task>' --task-id '<id>'"
      - "npx @claude-flow/cli@latest hooks route --task '<task>'"
      - "npx @claude-flow/cli@latest hooks model-route --task '<task>'"

  after_each_task:
    run:
      - "npx @claude-flow/cli@latest hooks post-task --task-id '<id>' --outcome <success|failure>"

# =============================================================================
# BEHAVIORAL RULES (Mandatory — source: ADR-013)
# =============================================================================
behavioral_rules:

  memory_first:
    rule: "NEVER create PROGRESS.md, STATUS.md, TODO.md or similar tracking files."
    rationale: "Memory system is semantic-searchable with RuVector HNSW. Markdown files create repo noise and cannot be queried semantically."
    violation_examples:
      - "Creating PROGRESS.md to track swarm status"
      - "Writing STATUS.md with task completion notes"
      - "Making TODO.md lists instead of memory entries"
    correct_approach:
      store_progress: "npx @claude-flow/cli@latest memory store --key 'progress-<phase>' --value '<description>' --namespace <ns>"
      store_pattern:  "npx @claude-flow/cli@latest memory store --key 'pattern-<name>' --value '<what worked>' --namespace patterns"
      search_history: "npx @claude-flow/cli@latest memory search --query '<topic>' --namespace <ns>"
      retrieve_key:   "npx @claude-flow/cli@latest memory retrieve --key '<key>' --namespace <ns>"

  agent_role_definition:
    role: "Architect + Planner + Coordinator. NOT Coder."
    architect:   "Design solutions, define scope, plan execution"
    planner:     "Break down tasks, estimate effort, sequence dependencies"
    coordinator: "Prepare swarm commands, execute hooks, validate results"
    not_coder:   "Do NOT write production code manually — swarms do this"
    user_mandate: "DELEGATE DO NOT CODE — stop doing manual work"

  no_queen_as_coder:
    definition: "Agent acting as primary code generator instead of delegating to swarm intelligence."
    symptoms:
      - "Agent edits 50+ files manually using replace_string_in_file"
      - "Agent generates code in chat and asks user to copy-paste"
      - "Agent creates files sequentially one-by-one instead of in parallel via swarm"
      - "Agent says 'I'll update the worker file now...' and proceeds to edit dozens of files"
    why_wrong:
      - "Violates user-stated role: senior software architect, not developer"
      - "10-20x slower than swarm parallelization"
      - "Manual edits introduce inconsistencies and missed files"
      - "Patterns NOT captured in neural system for future reuse"
      - "Agent token context exhausted after 20-30 manual edits"
    delegation_thresholds:
      "1-2 files":          "Manual edit allowed — ask user first"
      "3-10 files":         "Suggest swarm; offer manual as fallback"
      "11+ files":          "MANDATORY swarm delegation — no exceptions"
      "pattern replication": "ALWAYS use swarm even if only 2 files"
    correct_response: |
      "I'll prepare a Swarm to handle this. It will create/modify <N> files.
       [Agent executes pre-task hook]
       [Agent stores scope in memory]
       [Agent displays spawn command for user to copy-paste]
       Copy the command above to your separate terminal. The swarm will
       parallelize across <N> workers and complete in <estimated time>."

  spawn_command_display:
    rule: "Agent MUST display hive-mind spawn command as a markdown code block for manual user copy-paste into a SEPARATE terminal."
    rationale:
      - "User has full visibility and control over execution"
      - "No terminal automation conflicts (heredoc, pipes, escaping)"
      - "Separate terminal preserves full swarm output"
      - "No interruption of agent-user dialog"
      - "User controls execution timing"
    correct_pattern: |
      Agent provides in dialog:
      ```bash
      npx @claude-flow/cli@latest hive-mind spawn \
        --workers <N> \
        --topology hierarchical-mesh \
        --consensus byzantine \
        --claude \
        --model-routing intelligent \
        --namespace <project-ns> \
        --use-memory --use-patterns --use-vectors --use-learning \
        --objective "..."
      ```
      "Copy the entire command above and paste it into your other terminal window."
    incorrect_patterns:
      - description: "Running spawn in agent terminal (blocks dialog)"
        example: "run_in_terminal: npx @claude-flow/cli@latest hive-mind spawn ..."
      - description: "Heredoc to temp file"
        example: "cat << 'EOF' > /tmp/cmd.txt ... EOF && cat /tmp/cmd.txt"
      - description: "Background execution in agent terminal"
        example: "npx @claude-flow/cli@latest hive-mind spawn ... &"

  agent_introspection_loop:
    # ANTI-PATTERN added 2026-02-19 — observed in AUSTA analysis session
    definition: "Workers running hooks statusline / hive-mind status / memory list in place of actual file reads. Agent appears busy but produces no deliverables."
    symptoms:
      - "Expected memory keys missing after swarm completes"
      - "Workers loop on statusline without reading any source files"
      - "Final synthesizer writes 0 reports due to missing upstream keys"
    prevention:
      per_worker_exit_gate: |
        Every worker MUST end with self-verification:
          cmd: npx @claude-flow/cli@latest memory retrieve -k <key> --namespace <ns> | wc -c
          expected: "> 500"
          on_fail: "re-execute READ+STORE steps — do NOT declare done"
      hooks_statusline_is_not_work: |
        hooks statusline returns the agent's own runtime state — it is a DIAGNOSTIC TOOL only.
        Workers must read actual files (read_file, grep_search, run_in_terminal find/grep/wc).
        Every worker must produce ≥1 memory key with substantive content (>500 bytes).

  synthesizer_upstream_gate:
    # ANTI-PATTERN added 2026-02-19
    definition: "Synthesizer worker writes reports before verifying all upstream memory keys exist."
    rule: |
      Worker-N (SYNTHESIZER) MUST as its FIRST action:
        FOR EACH required_key in [list all upstream keys]:
          verify: memory retrieve -k <key> | wc -c > 200
          on_fail: store "synthesis-blocked-missing-<key>", ABORT cleanly
        ONLY IF ALL keys pass: proceed to write reports
    why: "Synthesizer with incomplete data produces hallucinated output. Loud failure > silent partial report."

  monolithic_swarm_for_dependent_dimensions:
    # ANTI-PATTERN added 2026-02-19
    definition: "Single swarm for tasks with explicit dependency ordering (Dim X depends_on Dim Y)."
    correct_pattern: |
      SWARM-A: all independent dimensions (run in parallel)
      SWARM-B: all independent dimensions (run in parallel, different set)
      [GATE: verify all upstream memory keys present and > 500 bytes]
      SWARM-D: dependent dimensions + final synthesis (runs AFTER gate passes)
    rule: "If a dimension lists depends_on: [...], it MUST be in a separate later swarm — never in the same swarm as its dependencies."

# =============================================================================
# SWARM SPAWN BEST PRACTICES (source: ADR-013 §5, §Swarm Spawn Best Practices)
# =============================================================================
swarm_spawn_best_practices:

  topology_by_task:
    hierarchical:       "Simple tasks, clear decomposition — max 50 agents, low fault tolerance"
    mesh:               "Collaborative tasks, peer review — max 20 agents, medium fault tolerance"
    hierarchical_mesh:  "Complex multi-domain projects — max 100+ agents, HIGH fault tolerance (RECOMMENDED)"
    ring:               "Ordered pipeline processing"
    star:               "Broadcast coordination"
    default_recommendation: "hierarchical-mesh for all complex spawns; hierarchical for init only"

  worker_count_guidance:
    small_task_1_10_files:   4
    medium_task_10_50_files: 8
    large_task_50plus_files: 10
    maximum_parallel:        15
    note: "Scale workers to task parallelism opportunity, not file count alone"

  model_routing:
    flag:           "--model-routing intelligent"
    models:         [claude-3-7-sonnet, claude-3-5-sonnet, claude-3-haiku]
    cost_reduction: "40-60%"
    routing_logic:  "Simple tasks → haiku; complex architecture/business logic → sonnet/opus"

  full_spawn_flags:
    - "--workers <N>                   # Worker count based on task size"
    - "--topology hierarchical-mesh    # Best for complex tasks"
    - "--consensus byzantine           # Fault-tolerant voting (tolerates 33% failure)"
    - "--claude                        # Use Claude API models"
    - "--model-routing intelligent     # 40-60% cost reduction via auto-routing"
    - "--namespace <project-namespace> # Project scoping"
    - "--use-memory                    # Access memory system"
    - "--use-patterns                  # Access pattern library"
    - "--use-vectors                   # Semantic search across docs"
    - "--use-learning                  # Neural learning enabled"

  full_spawn_command_template: |
    npx @claude-flow/cli@latest hive-mind spawn \
      --workers <N> \
      --topology hierarchical-mesh \
      --consensus byzantine \
      --claude \
      --model-routing intelligent \
      --namespace <project-namespace> \
      --use-memory \
      --use-patterns \
      --use-vectors \
      --use-learning \
      --objective "
    CONTEXT: <what we are building and why>
    MEMORY CONTEXT: <comma-separated memory keys to retrieve>
    WORKER ROLES: <per-agent assignments>
    DELIVERABLES: <exact file paths — no ambiguity>
    SUCCESS CRITERIA: <validation checkpoints>
    VALIDATION COMMANDS: <grep/wc/find/pytest commands with expected output>
    ESTIMATED TIME: <duration estimate>
    "

  objective_size_guidance: "3-10KB for comprehensive tasks — include all context agents need"

  phase_workflow_10_steps:
    description: "Standard phase execution cycle — repeat for each phase"
    steps:
      1:  "Agent: hooks pre-task — register task, get routing recommendation"
      2:  "Agent: memory store scope — store task scope for swarm agents to retrieve"
      3:  "Agent: hive-mind init (if not already initialized)"
      4:  "Agent: hive-mind status — verify initialization before spawn"
      5:  "Agent: Display spawn command in code block for user manual copy-paste"
      6:  "User: copies command to separate terminal, monitors, notifies agent on completion"
      7:  "Agent: verify deliverables (find/wc/grep/pytest validation commands)"
      8:  "Agent: hooks post-task — record completion status"
      9:  "Agent: neural train — ONLY if significant new code patterns generated"
      10: "Agent: memory store completion status + prepare next phase"

# =============================================================================
# BENCHMARK PROMPT STRUCTURE (source: ADR-013 §Pattern: Benchmark Prompt Structure)
# =============================================================================
benchmark_prompt_structure:
  description: "Mandatory structure for all swarm objective strings — enforces quality and reproducibility"
  minimum_tiers:   3
  tier_sequence:   [RECON, CODER, VERIFIER]
  line_1_required: "DELEGATE DO NOT CODE (encode in swarm name or first line)"

  required_elements:
    header:         "SWARM [NAME]: [scope summary] | [metrics] | [file count] | [key metric]"
    memory_line:    "MEMORY: [key1], [key2], [key3]  (single line, comma-separated)"
    workspace_line: "WORKSPACE: [absolute path]"
    deliverables:   "PRIMARY DELIVERABLES: numbered list of EXACT file paths"
    anti_patterns:  "ANTI-PATTERNS TO AVOID: each prefixed with ❌"
    existing_code:  "EXISTING CODE section: module paths + class.method(args) → return_type"
    recon_phase:    "PHASE X1: RECON (1 agent) — READ + MAP + OUTPUT internal report"
    coder_phase:    "PHASE X2: CODER (N agents, parallel) — CREATE/MODIFY exact paths + VALIDATE"
    verifier_phase: "PHASE X3: VERIFIER (1 agent) — V1..VN checks with expected results"
    exit_criteria:  "EXIT CRITERIA: ✅ checkmarks with measurable grep/wc/pytest commands"
    rollback:       "ROLLBACK: recovery command if pass rate drops"

  template: |
    SWARM [NAME]: [SCOPE SUMMARY] | [metrics] | [file count] | [key metric]

    MEMORY: [key1], [key2], [key3]
    WORKSPACE: [absolute path]

    PRIMARY DELIVERABLES:
    1. [exact/file/path.ext]
    2. [exact/file/path.ext]

    ANTI-PATTERNS TO AVOID:
    ❌AP1: Queen coding directly — DELEGATE to specialist agents
    ❌AP2: Batch updates — each agent works on specific subset only
    ❌AP3: Skip verification — MUST validate all changes
    ❌AP4: Manual grep commands — use workspace tools and code analysis
    ❌AP5: Agent introspection loop — do NOT run hooks statusline/hive-mind status instead of reading files
    ❌AP6: Missing per-worker exit gate — verify own memory key >500 bytes before declaring done
    ❌AP7: Synthesizer without upstream gate — check ALL required keys exist before writing output
    ❌AP8: Monolithic swarm for dependent dims — use parallel swarms A/B/C + dependent swarm D
    ❌ [domain-specific antipattern]

    ━━━ EXISTING CODE (READ BEFORE WRITING) ━━━
    [MODULE]: [path]
      [ClassName].[method](args) → return_type

    ━━━ PHASE X1: RECON (1 agent) ━━━
    READ: [exact files]
    MAP: [what to extract]
    OUTPUT: internal report for Phase X2

    ━━━ PHASE X2: CODER (N agents, parallel) ━━━
    CREATE/MODIFY: [exact file paths]
    VALIDATE: [command]
    EXIT GATE ✅: memory retrieve -k <output-key> | wc -c → must be > 500. IF FAILS: re-execute.

    ━━━ PHASE X3: VERIFIER (1 agent) ━━━
    V1: [command] → [expected result]
    V2: [command] → [expected result]

    ━━━ EXIT CRITERIA ━━━
    ✅ [criterion with measurable command]
    ✅ [criterion with measurable command]

    ROLLBACK: [recovery command if fails]

  key_prompt_rules:
    - "Line 1 must contain delegation intent — DELEGATE DO NOT CODE"
    - "3-Tier minimum: RECON → CODER → VERIFIER (strictly sequential)"
    - "Exact paths — no ambiguity in file or function references"
    - "Exact function signatures — agents must not guess APIs"
    - "Exact validation commands with expected output strings"
    - "Memory keys: single line, comma-separated for agent retrieval"
    - "Anti-Patterns: explicit ❌-prefixed list to prevent regressions"
    - "Exit criteria: ✅ checkmarks with grep/wc/pytest measurable commands"
    - "Rollback: explicit recovery procedure if quality gate fails"

# =============================================================================
# NEURAL TRAINING WORKFLOW (source: ADR-013 §4 Neural Learning)
# =============================================================================
neural_training_workflow:

  after_code_generation:
    description: "Run after swarm generates significant new code patterns — captures learnings for future reuse"
    trigger:     "Significant new code patterns generated (not minor config edits)"
    commands:
      train_moe:         "npx @claude-flow/cli@latest neural train --modelType moe --epochs 10 --namespace <ns>"
      train_transformer: "npx @claude-flow/cli@latest neural train --modelType transformer --epochs 10 --namespace <ns>"
      train_classifier:  "npx @claude-flow/cli@latest neural train --modelType classifier --epochs 10 --namespace <ns>"
      verify:            "npx @claude-flow/cli@latest neural status"
      list_models:       "npx @claude-flow/cli@latest neural list"

  model_purposes:
    moe:         "Task routing and agent coordination — trains on worker/BPMN code patterns"
    transformer: "Complex pattern synthesis, architecture design — trains on full platform code"
    classifier:  "Routing, prioritization, categorization — trains on classification data"

  optional_flags:
    data_source: "--data-source <path-to-generated-code>"
    namespace:   "--namespace <project-namespace>"
    epochs:      "--epochs <N>  (default 10; 15 for classifier; 20 for transformer on large datasets)"

  session_bootstrap_phase_c:
    description: "Phase C of Session Bootstrap — train all 3 model types on project codebase"
    when:        "First run of new session, or after major code generation"
    commands:
      - "npx @claude-flow/cli@latest neural train --modelType moe --epochs 10"
      - "npx @claude-flow/cli@latest neural train --modelType transformer --epochs 10"
      - "npx @claude-flow/cli@latest neural train --modelType classifier --epochs 10"
      - "npx @claude-flow/cli@latest neural status"
      - "npx @claude-flow/cli@latest hooks intelligence stats"
      - "npx @claude-flow/cli@latest memory search --query 'test query'"

# =============================================================================
# COMPLIANCE VERIFICATION (source: ADR-013 §Compliance Verification)
# =============================================================================
compliance_verification:
  description: "Run before ANY code generation sprint to confirm system is fully operational"
  when: "Before each new swarm spawn, start of each session phase"
  checklist:
    - step: 1
      command: "npx @claude-flow/cli@latest --version"
      expected: ">= 3.1.0"
    - step: 2
      command: "npx @claude-flow/cli@latest vector status"
      expected: "HNSW index operational"
    - step: 3
      command: "npx @claude-flow/cli@latest memory list --namespace <ns>"
      expected: "entries present"
    - step: 4
      command: "npx @claude-flow/cli@latest neural list"
      expected: "moe, transformer, classifier models listed"
    - step: 5
      command: "npx @claude-flow/cli@latest hive-mind status"
      expected: "initialized"
    - step: 6
      command: "npx @claude-flow/cli@latest hooks intelligence stats"
      expected: "SONA active, MoE routing active, HNSW active"

# =============================================================================
# KNOWN ISSUES — RUNTIME (source: ADR-013 §Known Issues, project experience)
# =============================================================================
known_issues_runtime:

  - id: ISSUE-001
    title: "RuVector native modules not loaded via npx"
    symptom: "neural status reports: RuVector WASM Not loaded | SONA Engine Not loaded | HNSW Index Not loaded"
    root_cause: "npx runs CLI from its own cache (~/.npm/_npx/) which cannot resolve @ruvector/* from project node_modules/"
    impact: low
    status: "WASM fallback activates automatically — full functionality maintained"
    wasm_fallback_provides:
      - "MicroLoRA (256-dim, <1μs adaptation)"
      - "ScopedLoRA (17 operators)"
      - "SONA (256-dim, rank-4, 624k learn/s)"
      - "FlashAttention, AdamW Optimizer, InfoNCE Loss"
      - "Embedding: all-MiniLM-L6-v2 (384-dim ONNX)"
      - "TrajectoryBuffer"
    native_module_benefit: "~2-3x speedup for large-scale training only — not required for normal swarm operations"
    action_required: false

  - id: ISSUE-002
    title: "Yarn workspace install fails with workspace:* protocol"
    symptom: "npm error: Unsupported URL Type 'workspace:*'"
    root_cause: "npm does not understand Yarn workspace:* protocol — use yarn install instead"
    fix: "Use `yarn install` for workspace projects. Install claude-flow native modules globally via npm instead."
    commands:
      - "npm install -g @ruvector/attention @ruvector/sona @ruvector/core agentdb agentic-flow"

  - id: ISSUE-003
    title: "package.json missing name/version fields breaks npm install"
    symptom: "npm install fails with 'Invalid Version'"
    fix: "Ensure package.json has both `name` and `version` fields before running npm install"
    example: |
      {
        "name": "my-project",
        "version": "1.0.0",
        "private": true
      }

  - id: ISSUE-004
    title: "minimatch version 1.2.8 does not exist on npm"
    symptom: "yarn install resolution fails for minimatch@1.2.8"
    fix: "Change minimatch version to 3.1.2 in both overrides and resolutions in package.json"

# =============================================================================
# SYSTEM CAPABILITIES REFERENCE (source: ADR-013 §System Capabilities After Bootstrap)
# =============================================================================
system_capabilities_verified:
  description: "Expected state after full Session Bootstrap (Phases A-D complete)"
  components:
    cli_version:
      expected: ">= v3.1.0-alpha"
      check: "npx @claude-flow/cli@latest --version"
    daemon:
      expected: "Running — 5 workers enabled, 2 max concurrent"
      check: "npx @claude-flow/cli@latest daemon status"
    mcp_servers:
      expected: "3 connected — claude-flow, ruv-swarm, flow-nexus"
      check: "claude mcp list"
    memory_db:
      expected: "Operational — .swarm/memory.db, hybrid SQLite+HNSW backend, 9-10 tables"
      check: "npx @claude-flow/cli@latest memory stats"
    embeddings:
      expected: "ONNX 384-dim — all-MiniLM-L6-v2, semantic search functional"
      check: "npx @claude-flow/cli@latest memory search --query 'test'"
    hnsw_index:
      expected: "Configured — cosine metric, M=16, ef_construction=200, ef_search=100"
      check: "npx @claude-flow/cli@latest vector status"
    neural_models:
      expected: "3 trained — moe + transformer + classifier"
      check: "npx @claude-flow/cli@latest neural list"
    reasoning_bank:
      expected: "4000+ patterns — grows with each training run"
      check: "npx @claude-flow/cli@latest hooks intelligence stats"
    hive_mind:
      expected: "Initialized — hierarchical (init) or hierarchical-mesh (spawns), byzantine consensus"
      check: "npx @claude-flow/cli@latest hive-mind status"
    agent_configs:
      expected: "5 built — coder, architect, tester, security-architect, reviewer"
      check: "ls ./agents/"
    pretrained_intelligence:
      expected: "84+ files scanned, 30 patterns, 16 strategies, 46 trajectories"
      check: "npx @claude-flow/cli@latest hooks intelligence stats"

# =============================================================================
# ADR-013 MEMORY PATTERN KEYS (for agent retrieval)
# =============================================================================
adr013_memory_patterns:
  description: "Key patterns stored in claude-flow memory — retrieve before swarm spawns"
  retrieve_command: "npx @claude-flow/cli@latest memory retrieve --key '<key>' --namespace <ns>"
  patterns:
    complete_swarm_workflow:
      key: "pattern-complete-swarm-workflow"
      summary: "PRE-SPAWN (5 steps) → SPAWN (user-executed) → POST-TASK (hooks + neural train)"
    benchmark_prompt_structure:
      key: "pattern-prompt-structure-benchmark"
      summary: "SWARM NAME | MEMORY | WORKSPACE | DELIVERABLES | ANTI-PATTERNS | RECON → CODER → VERIFIER | EXIT CRITERIA | ROLLBACK"

# =============================================================================
# MCP REGISTRATION (one-time setup — source: ADR-013 §Session Bootstrap Phase A)
# =============================================================================
mcp_registration:
  description: "Register claude-flow as MCP server so Claude can invoke tools directly"
  one_time_command: "claude mcp add claude-flow npx @claude-flow/cli@v3alpha mcp start"
  verify: "claude mcp list"
  expected_servers: [claude-flow, ruv-swarm, flow-nexus]
  note: "Skip if already registered — check with 'claude mcp list' first"
