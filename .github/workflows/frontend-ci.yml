name: Frontend CI

on:
  push:
    branches:
      - main
      - develop
      - release/*
    paths:
      - src/web/**
      - src/web/mobile/**
      - src/web/design-system/**
      - src/web/shared/**
  pull_request:
    branches:
      - develop
    paths:
      - src/web/**
      - src/web/mobile/**
      - src/web/design-system/**
      - src/web/shared/**

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src/web
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache-dependency-path: src/web/yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Run eslint
        run: yarn lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src/web
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache-dependency-path: src/web/yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Run typecheck
        run: yarn typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src/web
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache-dependency-path: src/web/yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Run tests
        run: yarn test:ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend
          directory: src/web
          fail_ci_if_error: false

  maestro-e2e:
    runs-on: macos-latest
    timeout-minutes: 20
    needs: [lint, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Install dependencies
        working-directory: src/web/mobile
        run: yarn install --frozen-lockfile
      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - name: Start Metro bundler
        working-directory: src/web/mobile
        run: npx expo start --no-dev --minify &
      - name: Run Maestro E2E tests
        working-directory: src/web/mobile
        run: maestro test .maestro/flows/
        timeout-minutes: 15
