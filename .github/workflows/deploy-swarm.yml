name: Deploy to Docker Swarm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      rollback:
        description: "Rollback to previous version"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/healthcare-app

jobs:
  # ── Job 1: Run Tests ─────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ !inputs.rollback }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: austa_test
          POSTGRES_USER: austa
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U austa"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_pgsql, redis, pcntl, bcmath, intl, zip

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        working-directory: backend
        run: |
          cp .env.example .env 2>/dev/null || true
          php artisan key:generate --force 2>/dev/null || true

      - name: Run migrations
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: austa_test
          DB_USERNAME: austa
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: php artisan migrate --force

      - name: Run tests
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: austa_test
          DB_USERNAME: austa
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: php artisan test

  # ── Job 2: Build & Push Docker Image ─────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !inputs.rollback }}
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/docker/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Swarm ──────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ !inputs.rollback }}
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Docker Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image-tag }}
            cd /opt/austa
            git pull origin main
            chmod +x infrastructure/scripts/deploy.sh
            ./infrastructure/scripts/deploy.sh "${IMAGE_TAG}"

  # ── Job 4: Smoke Test ───────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ !inputs.rollback }}

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            if curl -sf --max-time 10 "${{ secrets.APP_URL }}/api/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/10 failed, retrying in 15s..."
            sleep 15
          done
          echo "Smoke test failed!"
          exit 1

  # ── Rollback (manual trigger) ───────────────────────────────────────────
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: ${{ inputs.rollback }}
    environment: production

    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/austa
            chmod +x infrastructure/scripts/rollback.sh
            ./infrastructure/scripts/rollback.sh
