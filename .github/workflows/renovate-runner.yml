name: Renovate Runner

on:
  schedule:
    # Before 6am weekdays, America/Sao_Paulo (UTC-3) = 09:00 UTC
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no PRs created)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: renovate-runner
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check RENOVATE_TOKEN
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          if [ -z "$RENOVATE_TOKEN" ]; then
            echo "::error::RENOVATE_TOKEN secret is not set. Renovate cannot run."
            exit 1
          fi

      - name: Run Renovate
        uses: renovatebot/github-action@0b17c4eb901eca44d018fb25744a50a74b2042df # v46.1.4
        with:
          configurationFile: .github/renovate-global.json
          renovate-version: '43'
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          LOG_LEVEL: info
