name: Renovate Runner

on:
  schedule:
    # Before 6am weekdays, America/Sao_Paulo (UTC-3) = 09:00 UTC
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no PRs created)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: renovate-runner
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.3
        with:
          configurationFile: .github/renovate-global.json
          renovate-version: 43
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          LOG_LEVEL: info
