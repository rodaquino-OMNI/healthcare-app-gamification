name: EAS Update (OTA)

on:
  push:
    branches:
      - main
    paths:
      - 'src/web/mobile/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Update branch'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
      message:
        description: 'Update message'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKING_DIRECTORY: src/web/mobile
  NODE_VERSION: '20'

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::warning::EXPO_TOKEN not set. Update will be skipped."
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Expo
        if: env.SKIP_BUILD != 'true'
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Publish update
        if: env.SKIP_BUILD != 'true'
        env:
          UPDATE_BRANCH: ${{ github.event.inputs.branch || 'production' }}
          UPDATE_MESSAGE: ${{ github.event.inputs.message || format('OTA update from {0}', github.sha) }}
          APP_ENV: ${{ github.event.inputs.branch == 'preview' && 'staging' || 'production' }}
        run: |
          eas update --branch "$UPDATE_BRANCH" --message "$UPDATE_MESSAGE" --non-interactive
