name: EAS Update (OTA)

on:
  push:
    branches:
      - main
    paths:
      - 'src/web/mobile/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Update branch'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
      message:
        description: 'Update message'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKING_DIRECTORY: src/web/mobile
  NODE_VERSION: '20'

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::warning::EXPO_TOKEN not set. Update will be skipped."
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: src/web/yarn.lock

      - name: Setup Expo
        if: env.SKIP_BUILD != 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: src/web

      - name: Publish update
        if: env.SKIP_BUILD != 'true'
        run: |
          BRANCH="${{ github.event.inputs.branch || 'production' }}"
          MESSAGE="${{ github.event.inputs.message || format('OTA update from {0}', github.sha) }}"
          eas update --branch "$BRANCH" --message "$MESSAGE" --non-interactive
        env:
          APP_ENV: ${{ github.event.inputs.branch == 'preview' && 'staging' || 'production' }}
