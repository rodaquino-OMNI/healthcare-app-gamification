name: Renovate CI

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-config:
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate renovate.json
        run: npx --package=renovate -- renovate-config-validator renovate.json

  lockfile-check:
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - { name: backend, path: src/backend }
          - { name: web, path: src/web }
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Verify lockfile integrity
        run: pnpm install --frozen-lockfile

      - name: Audit for high/critical vulnerabilities (${{ matrix.workspace.name }})
        working-directory: ${{ matrix.workspace.path }}
        run: |
          pnpm audit --prod || {
            echo "::warning::Audit found high/critical vulnerabilities"
            exit 1
          }

  build-backend:
    if: github.actor == 'renovate[bot]'
    needs: lockfile-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: src/backend
        run: pnpm lint

      - name: Test
        run: pnpm turbo run test --filter='./src/backend/*' -- --coverage --coverageReporters=lcov

  build-web:
    if: github.actor == 'renovate[bot]'
    needs: lockfile-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --filter='./src/web/*'

      - name: Test
        run: pnpm turbo run test --filter='./src/web/*' -- --ci --coverage

      - name: Build
        run: pnpm turbo run build --filter='./src/web/*'

  summary:
    if: github.actor == 'renovate[bot]' && always()
    needs: [validate-config, lockfile-check, build-backend, build-web]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check job results
        run: |
          echo "## Renovate PR CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Config validation | ${{ needs.validate-config.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lockfile check | ${{ needs.lockfile-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend build & test | ${{ needs.build-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web build & test | ${{ needs.build-web.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any required job failed
        if: |
          needs.validate-config.result == 'failure' ||
          needs.lockfile-check.result == 'failure' ||
          needs.build-backend.result == 'failure' ||
          needs.build-web.result == 'failure'
        run: exit 1
