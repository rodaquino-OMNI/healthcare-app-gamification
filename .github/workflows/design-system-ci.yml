name: Design System CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/web/design-system/**'
  pull_request:
    paths:
      - 'src/web/design-system/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache-dependency-path: src/web/yarn.lock
      - name: Install dependencies
        working-directory: src/web
        run: yarn install --frozen-lockfile
      - name: Run lint
        working-directory: src/web/design-system
        run: yarn lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache-dependency-path: src/web/yarn.lock
      - name: Install dependencies
        working-directory: src/web
        run: yarn install --frozen-lockfile
      - name: Run tests
        working-directory: src/web/design-system
        run: yarn test:ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: src/web/design-system/coverage
          env_vars: CI,GITHUB_ACTIONS
          fail_ci_if_error: false
          flags: design-system
          name: codecov-design-system
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  storybook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache-dependency-path: src/web/yarn.lock
      - name: Install dependencies
        working-directory: src/web
        run: yarn install --frozen-lockfile
      - name: Build Storybook
        working-directory: src/web/design-system
        run: yarn build-storybook
        env:
          CI: 'true'
      - name: Chromatic Publish
        uses: chromaui/action@v10
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}
          workingDir: src/web/design-system
