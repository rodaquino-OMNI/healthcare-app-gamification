name: Web CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/web/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/web/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'
        cache-dependency-path: src/web/yarn.lock
        
    - name: Install dependencies for Web Monorepo
      working-directory: src/web
      run: yarn install --frozen-lockfile
      
    - name: Validate package.json files
      run: node scripts/validate-package-json.js
      
    - name: Lint Web Components
      working-directory: src/web
      run: yarn lint
      
    - name: Test Web Components
      working-directory: src/web
      run: yarn test:ci
      
    - name: Build Web Application
      working-directory: src/web
      run: yarn build