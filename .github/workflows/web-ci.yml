name: Web CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/web/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/web/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies for Web Monorepo
      working-directory: src/web
      run: npm install --legacy-peer-deps
      
    - name: Lint Web Components
      working-directory: src/web
      run: npm run lint
      
    - name: Test Web Components
      working-directory: src/web
      run: npm run test
      
    - name: Build Web Application
      working-directory: src/web
      run: npm run build