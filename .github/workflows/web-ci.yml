name: Web CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/web/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/web/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Verify lockfile resolution integrity
      run: |
        echo "Checking for known vulnerable lockfile resolutions..."
        if grep -qE '(^|[ /])next@15\.4\.[0-7]' pnpm-lock.yaml 2>/dev/null; then
          echo "::error::Lockfile drift: next resolves to a version below 15.4.8 (vulnerable)"
          exit 1
        fi
        if grep -qE '(^|[ /])esbuild@0\.2[0-4]\.' pnpm-lock.yaml 2>/dev/null; then
          echo "::error::Lockfile drift: esbuild resolves to a version below 0.25.0 (vulnerable)"
          exit 1
        fi
        echo "Lockfile resolution integrity verified."

    - name: Validate package.json files
      run: node scripts/validate-package-json.js

    - name: Lint Web Components
      run: pnpm turbo run lint --filter='./src/web/*'

    - name: Test Web Components
      run: pnpm turbo run test --filter='./src/web/*' -- --ci --coverage

    - name: Build Web Application
      run: pnpm turbo run build --filter='./src/web/*'
