name: Auto Commit and Push

on:
  # Manual trigger from Actions tab
  workflow_dispatch:
  
  # Optional: You can also schedule this to run periodically
  # schedule:
  #   - cron: '0 0 * * *'  # Runs at midnight UTC every day

jobs:
  commit-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Fetch all history for all tags and branches
      
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
      
      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          echo "::set-output name=has_changes::$(if [ -n "$(git status --porcelain)" ]; then echo "true"; else echo "false"; fi)"
      
      - name: Stage all changes
        if: steps.git-check.outputs.has_changes == 'true'
        run: git add .
      
      - name: Commit changes
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git commit -m "Auto-commit: Sync pending changes [skip ci]" -m "Automated commit via GitHub Actions workflow"
      
      - name: Push changes
        if: steps.git-check.outputs.has_changes == 'true'
        run: git push origin ${GITHUB_REF#refs/heads/}