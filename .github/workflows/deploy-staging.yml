name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package.json files
        run: node scripts/validate-package-json.js

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate-dependencies
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod

  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: audit
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @austa/shared exec prisma generate

      - name: Run backend linters
        working-directory: src/backend
        run: pnpm lint
      - name: Run web linters
        run: pnpm turbo run lint --filter='./src/web/*'
      - name: Run backend tests
        run: pnpm turbo run test --filter='./src/backend/*'
      - name: Run web tests
        run: pnpm turbo run test --filter='./src/web/*'
      - name: Build backend
        run: pnpm turbo run build --filter='./src/backend/*'
      - name: Build web
        run: pnpm turbo run build --filter='./src/web/*'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api-gateway
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ./src/backend
          file: ./src/backend/api-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/austa-api-gateway:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/austa-api-gateway:latest

      - name: Build and push auth-service
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ./src/backend
          file: ./src/backend/auth-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/austa-auth-service:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/austa-auth-service:latest

      - name: Build and push gamification-engine
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ./src/backend
          file: ./src/backend/gamification-engine/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/austa-gamification-engine:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/austa-gamification-engine:latest

      - name: Build and push health-service
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ./src/backend
          file: ./src/backend/health-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/austa-health-service:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/austa-health-service:latest

      - name: Build and push care-service
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ./src/backend
          file: ./src/backend/care-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/austa-care-service:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/austa-care-service:latest

      - name: Build and push plan-service
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ./src/backend
          file: ./src/backend/plan-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/austa-plan-service:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/austa-plan-service:latest

      - name: Build and push notification-service
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ./src/backend
          file: ./src/backend/notification-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/austa-notification-service:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/austa-notification-service:latest

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-push
    if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Kubernetes CLI
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name austa-staging-cluster --region sa-east-1

      - name: Update image tags
        env:
          IMAGE_SHA: ${{ github.sha }}
          OWNER: ${{ github.repository_owner }}
        run: |
          sed -i "s|image:.*austa-api-gateway.*|image: ghcr.io/${OWNER}/austa-api-gateway:${IMAGE_SHA}|" infrastructure/kubernetes/api-gateway/deployment.yaml
          sed -i "s|image:.*austa-auth-service.*|image: ghcr.io/${OWNER}/austa-auth-service:${IMAGE_SHA}|" infrastructure/kubernetes/auth-service/deployment.yaml
          sed -i "s|image:.*austa-gamification-engine.*|image: ghcr.io/${OWNER}/austa-gamification-engine:${IMAGE_SHA}|" infrastructure/kubernetes/gamification/deployment.yaml
          sed -i "s|image:.*austa-health-service.*|image: ghcr.io/${OWNER}/austa-health-service:${IMAGE_SHA}|" infrastructure/kubernetes/health-journey/deployment.yaml
          sed -i "s|image:.*austa-care-service.*|image: ghcr.io/${OWNER}/austa-care-service:${IMAGE_SHA}|" infrastructure/kubernetes/care-journey/deployment.yaml
          sed -i "s|image:.*austa-plan-service.*|image: ghcr.io/${OWNER}/austa-plan-service:${IMAGE_SHA}|" infrastructure/kubernetes/plan-journey/deployment.yaml
          sed -i "s|image:.*austa-notification-service.*|image: ghcr.io/${OWNER}/austa-notification-service:${IMAGE_SHA}|" infrastructure/kubernetes/notification-service/deployment.yaml

      - name: Apply network policies
        run: |
          kubectl apply -f infrastructure/kubernetes/api-gateway/network-policy.yaml
          kubectl apply -f infrastructure/kubernetes/auth-service/network-policy.yaml
          kubectl apply -f infrastructure/kubernetes/gamification/network-policy.yaml
          kubectl apply -f infrastructure/kubernetes/health-journey/network-policy.yaml
          kubectl apply -f infrastructure/kubernetes/care-journey/network-policy.yaml
          kubectl apply -f infrastructure/kubernetes/plan-journey/network-policy.yaml
          kubectl apply -f infrastructure/kubernetes/notification-service/network-policy.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f infrastructure/kubernetes/api-gateway/deployment.yaml
          kubectl apply -f infrastructure/kubernetes/api-gateway/service.yaml
          kubectl apply -f infrastructure/kubernetes/auth-service/deployment.yaml
          kubectl apply -f infrastructure/kubernetes/auth-service/service.yaml
          kubectl apply -f infrastructure/kubernetes/gamification/deployment.yaml
          kubectl apply -f infrastructure/kubernetes/gamification/service.yaml
          kubectl apply -f infrastructure/kubernetes/health-journey/deployment.yaml
          kubectl apply -f infrastructure/kubernetes/health-journey/service.yaml
          kubectl apply -f infrastructure/kubernetes/care-journey/deployment.yaml
          kubectl apply -f infrastructure/kubernetes/care-journey/service.yaml
          kubectl apply -f infrastructure/kubernetes/plan-journey/deployment.yaml
          kubectl apply -f infrastructure/kubernetes/plan-journey/service.yaml
          kubectl apply -f infrastructure/kubernetes/notification-service/deployment.yaml
          kubectl apply -f infrastructure/kubernetes/notification-service/service.yaml
          kubectl apply -f infrastructure/kubernetes/api-gateway/ingress.yaml

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/api-gateway --timeout=300s -n shared-services
          kubectl rollout status deployment/auth-service --timeout=300s -n shared-services
          kubectl rollout status deployment/gamification-engine --timeout=300s -n gamification
          kubectl rollout status deployment/health-journey --timeout=300s -n health-journey
          kubectl rollout status deployment/care-service --timeout=300s -n care-journey
          kubectl rollout status deployment/plan-journey --timeout=300s -n plan-journey
          kubectl rollout status deployment/notification-service --timeout=300s -n shared-services
