name: Deploy to Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Audit backend dependencies
        working-directory: src/backend
        run: |
          # Install dependencies without generating a lockfile
          npm install --no-package-lock --legacy-peer-deps
          # Run audit and ignore ENOTFOUND errors
          npm audit --production || true
          
      - name: Audit web dependencies
        working-directory: src/web
        run: |
          npm install --no-package-lock --legacy-peer-deps
          npm audit --production || true
          
  deploy:
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install backend dependencies
        working-directory: src/backend
        run: npm install --legacy-peer-deps
          
      - name: Install web dependencies
        working-directory: src/web
        run: npm install --legacy-peer-deps
        
      - name: Run backend linters
        working-directory: src/backend
        run: npm run lint || true
        
      - name: Run web linters
        working-directory: src/web
        run: npm run lint || true
        
      - name: Run backend tests
        working-directory: src/backend
        run: npm run test || true
        
      - name: Run web tests
        working-directory: src/web
        run: npm run test || true
        
      - name: Build backend
        working-directory: src/backend
        run: npm run build
        
      - name: Build web
        working-directory: src/web
        run: npm run build
        
      - name: Deploy to Staging
        run: |
          echo "Deploying to Staging..."
          # Add Kubernetes deployment steps here
          # kubectl apply -f infrastructure/kubernetes/gamification/deployment.yaml
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: sa-east-1