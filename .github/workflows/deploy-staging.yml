name: Deploy to Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          
      - name: Install validation dependencies
        run: npm install glob
          
      - name: Validate package.json files
        run: node scripts/validate-package-json.js
  
  audit:
    runs-on: ubuntu-latest
    needs: validate-dependencies
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          
      - name: Audit backend dependencies
        working-directory: src/backend
        run: |
          # Install dependencies using Yarn
          yarn install
          # Run audit 
          yarn audit || true
          
      - name: Audit web dependencies
        working-directory: src/web
        run: |
          yarn install
          yarn audit || true
          
  build-and-push:
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          
      - name: Install backend dependencies
        working-directory: src/backend
        run: yarn install
          
      - name: Install web dependencies
        working-directory: src/web
        run: yarn install
        
      - name: Run backend linters
        working-directory: src/backend
        run: yarn lint || true
        
      - name: Run web linters
        working-directory: src/web
        run: yarn lint || true
        
      - name: Run backend tests
        working-directory: src/backend
        run: yarn test || true
        
      - name: Run web tests
        working-directory: src/web
        run: yarn test || true
        
      - name: Build backend
        working-directory: src/backend
        run: yarn build
        
      - name: Build web
        working-directory: src/web
        run: yarn build
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push gamification-engine container
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend/gamification-engine
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/austa-gamification-engine:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/austa-gamification-engine:latest
          
      - name: Build and push api-gateway container
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend/api-gateway
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/austa-api-gateway:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/austa-api-gateway:latest
          
      - name: Build and push auth-service container
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend/auth-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/austa-auth-service:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/austa-auth-service:latest
          
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Kubernetes CLI
        uses: azure/setup-kubectl@v4
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: sa-east-1
          
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name austa-staging-cluster --region sa-east-1
        
      - name: Update deployment image tags
        run: |
          # Update image tags in deployment files
          sed -i "s|ghcr.io/${{ github.repository_owner }}/austa-gamification-engine:latest|ghcr.io/${{ github.repository_owner }}/austa-gamification-engine:${{ github.sha }}|g" infrastructure/kubernetes/gamification/deployment.yaml
          sed -i "s|ghcr.io/${{ github.repository_owner }}/austa-api-gateway:latest|ghcr.io/${{ github.repository_owner }}/austa-api-gateway:${{ github.sha }}|g" infrastructure/kubernetes/api-gateway/deployment.yaml
          sed -i "s|ghcr.io/${{ github.repository_owner }}/austa-auth-service:latest|ghcr.io/${{ github.repository_owner }}/austa-auth-service:${{ github.sha }}|g" infrastructure/kubernetes/auth-service/deployment.yaml
        
      - name: Deploy to Kubernetes
        run: |
          # Apply network policies first
          kubectl apply -f infrastructure/kubernetes/gamification/network-policy.yaml
          
          # Deploy services
          kubectl apply -f infrastructure/kubernetes/gamification/deployment.yaml
          kubectl apply -f infrastructure/kubernetes/api-gateway/deployment.yaml
          kubectl apply -f infrastructure/kubernetes/auth-service/deployment.yaml
          
          # Apply service configurations
          kubectl apply -f infrastructure/kubernetes/gamification/service.yaml
          kubectl apply -f infrastructure/kubernetes/api-gateway/service.yaml
          
          # Apply ingress configurations
          kubectl apply -f infrastructure/kubernetes/api-gateway/ingress.yaml
          
      - name: Wait for deployments to be ready
        run: |
          kubectl rollout status deployment/gamification-engine
          kubectl rollout status deployment/api-gateway
          kubectl rollout status deployment/auth-service