version: 2
updates:
  # Backend root npm dependencies
  - package-ecosystem: "npm"
    directory: "/src/backend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    reviewers:
      - "rodaquino-OMNI"
    labels:
      - "dependencies"
      - "backend"
    groups:
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "eslint*"
          - "prettier*"
          - "test*"
          - "jest*"
        update-types:
          - "minor"
          - "patch"
          - "security"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "security"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint*"
      - dependency-name: "prettier*"
      - dependency-name: "typescript"
        update-types: ["version-update:semver-minor"]
    commit-message:
      prefix: "deps"
      include: "scope"
        
  # Gamification Engine npm dependencies
  - package-ecosystem: "npm"
    directory: "/src/backend/gamification-engine"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    reviewers:
      - "rodaquino-OMNI"
    labels:
      - "dependencies"
      - "gamification"
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
          - "security"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint*"
      - dependency-name: "prettier*"
    commit-message:
      prefix: "deps"
      include: "scope"
        
  # API Gateway npm dependencies
  - package-ecosystem: "npm"
    directory: "/src/backend/api-gateway"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    reviewers:
      - "rodaquino-OMNI"
    labels:
      - "dependencies"
      - "api-gateway"
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
          - "security"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint*"
      - dependency-name: "prettier*"
    commit-message:
      prefix: "deps"
      include: "scope"
        
  # Web root npm dependencies
  - package-ecosystem: "npm"
    directory: "/src/web"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    reviewers:
      - "rodaquino-OMNI"
    labels:
      - "dependencies"
      - "frontend"
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
          - "security"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint*"
      - dependency-name: "prettier*"
      - dependency-name: "@types/*"
        update-types: ["version-update:semver-minor"]
    commit-message:
      prefix: "deps"
      include: "scope"
        
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "quarterly"
    open-pull-requests-limit: 3
    reviewers:
      - "rodaquino-OMNI"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
      include: "scope"
      
  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/src/backend"
    schedule:
      interval: "quarterly"
    open-pull-requests-limit: 3
    reviewers:
      - "rodaquino-OMNI"
    labels:
      - "dependencies"
      - "docker"
    groups:
      docker-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "docker"
      include: "scope"
      
  # Vulnerability alerts for all ecosystems
  - package-ecosystem: "npm"
    directory: "/src/backend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "security"
    target-branch: "main"
    versioning-strategy: "auto"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]