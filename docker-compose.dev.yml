version: '3.8'

services:
  api-gateway:
    build:
      context: src/backend/api-gateway
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ../backend/api-gateway:/app
      - node_modules:/app/node_modules
    depends_on:
      - auth-service
      - health-service
      - care-service
      - plan-service
      - gamification-engine
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/api-gateway
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-secret-key
      PORT: 4000
    restart: always

  auth-service:
    build:
      context: src/backend/auth-service
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    volumes:
      - ../backend/auth-service:/app
      - node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/auth-service
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-secret-key
      PORT: 4001
    restart: always

  health-service:
    build:
      context: src/backend/health-service
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
    volumes:
      - ../backend/health-service:/app
      - node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/health-service
      REDIS_URL: redis://redis:6379
      PORT: 4002
    restart: always

  care-service:
    build:
      context: src/backend/care-service
      dockerfile: Dockerfile
    ports:
      - "4003:4003"
    volumes:
      - ../backend/care-service:/app
      - node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/care-service
      REDIS_URL: redis://redis:6379
      PORT: 4003
    restart: always

  plan-service:
    build:
      context: src/backend/plan-service
      dockerfile: Dockerfile
    ports:
      - "4004:4004"
    volumes:
      - ../backend/plan-service:/app
      - node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/plan-service
      REDIS_URL: redis://redis:6379
      PORT: 4004
    restart: always

  gamification-engine:
    build:
      context: src/backend/gamification-engine
      dockerfile: Dockerfile
    ports:
      - "4005:4005"
    volumes:
      - ../backend/gamification-engine:/app
      - node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/gamification-engine
      REDIS_URL: redis://redis:6379
      PORT: 4005
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - kafka
    restart: always

  notification-service:
    build:
      context: src/backend/notification-service
      dockerfile: Dockerfile
    ports:
      - "4006:4006"
    volumes:
      - ../backend/notification-service:/app
      - node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/notification-service
      REDIS_URL: redis://redis:6379
      PORT: 4006
    restart: always

  web:
    build:
      context: src/web/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../web/web:/app
      - node_modules:/app/node_modules
    depends_on:
      - api-gateway
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      PORT: 3000
    restart: always

  mobile:
    build:
      context: src/web/mobile
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - ../web/mobile:/app
      - node_modules:/app/node_modules
    depends_on:
      - api-gateway
    environment:
      RN_API_BASE_URL: http://localhost:4000
      PORT: 8081
    restart: always

  db:
    image: postgres:14
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: austa
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: always

volumes:
  db_data:
  node_modules: