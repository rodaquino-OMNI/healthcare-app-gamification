# =============================================================================
# SWARM WORKFLOW — Compact reference (full: 013-agent-guide.yaml)
# =============================================================================
workflow:

  bootstrap: # Run ONCE per session
    - "npx @claude-flow/cli@latest daemon start"
    - "npx @claude-flow/cli@latest doctor --verbose"
    - "npx @claude-flow/cli@latest memory init --force --verbose"
    - "npx @claude-flow/cli@latest hooks pretrain --verbose"
    - "npx @claude-flow/cli@latest hooks build-agents --verbose"
    - "npx @claude-flow/cli@latest hooks worker dispatch --trigger map"
    - "npx @claude-flow/cli@latest hooks worker dispatch --trigger deepdive"
    - "npx @claude-flow/cli@latest hooks worker dispatch --trigger ultralearn"
    - "npx @claude-flow/cli@latest neural train --modelType moe --epochs 10"
    - "npx @claude-flow/cli@latest neural train --modelType transformer --epochs 10"
    - "npx @claude-flow/cli@latest neural train --modelType classifier --epochs 10"

  per_swarm:
    1_pre_task: "hooks pre-task --task-id {id} --description {desc}"
    2_store_scope: "memory store --key {id}-scope --value {scope} --namespace healthcare-platform"
    3_hive_init: "hive-mind init --topology hierarchical-mesh --max-agents 15 --consensus byzantine"
    4_spawn: "Display command. STOP. Wait for user."
    5_wait: "User runs in separate terminal. Do NOT poll."
    6_verify: "Run exit criteria commands."
    7_post_task: "hooks post-task --task-id {id} --success true --store-results true"
    8_neural: "hooks post-edit --file {f} --train-neural true"
    9_store: "memory store --key {id}-complete --value {results} --namespace healthcare-platform"

  spawn_flags: |
    npx @claude-flow/cli@latest hive-mind spawn \
      --workers {N} \
      --topology hierarchical-mesh \
      --consensus byzantine \
      --claude \
      --model-routing intelligent \
      --namespace healthcare-platform \
      --use-memory --use-patterns --use-vectors --use-learning \
      --objective '{OBJECTIVE}'

  queen_role_rules: |
    CRITICAL: The queen is the EXECUTION ENGINE, not the orchestrator.
    - Queen uses Edit/Read/Task tools directly
    - Queen delegates to workers via Task tool for parallel sub-tasks
    - Queen MUST NOT display hive-mind spawn commands for the user
    - Queen MUST NOT wait for user input — execute autonomously
    - AP10 (queen_as_orchestrator) = CRITICAL anti-pattern (WEIGHT=0.95)

  anti_drift:
    topology: hierarchical-mesh
    max_agents: 15
    consensus: byzantine
    rules:
      - "3-phase RECON→CODER→VERIFIER"
      - "EXIT GATE per worker (self-verification)"
      - "UPSTREAM GATE on verifier (blocks without data)"
      - "max 8 workers per swarm for tight coordination"
      - "AP10: queen NEVER displays spawn commands — she IS the executor"

  cli_prefix: "npx @claude-flow/cli@latest"
