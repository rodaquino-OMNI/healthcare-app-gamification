  launch_blockers:
    items:
      - id: SEC-01
        severity: HIGH
        file: "src/backend/gamification-engine/src/rules/rules.service.ts:268"
        finding: "RCE via new Function() — arbitrary code execution"
        fix: "Replace with safe evaluator (expr-eval or static rule map)"
        effort: M
        verify: "grep -rn 'new Function(' src/backend/ → 0 matches"
      - id: SEC-02
        severity: MEDIUM
        file: "src/backend/shared/src/encryption/encryption.service.ts:23"
        finding: "Static scrypt salt 'austa-phi-salt' — all users share same salt"
        fix: "crypto.randomBytes(32) per user, store salt alongside hash"
        effort: S
        verify: "grep -rn 'austa-phi-salt' src/backend/ → 0 matches"
      - id: SEC-03
        severity: MEDIUM
        file: "src/backend/shared/prisma/seed.ts:285,292,315"
        finding: "Hardcoded Password123! and CPF 12345678901"
        fix: "Read from env vars (SEED_ADMIN_PASSWORD) or use @faker-js/faker"
        effort: S
        verify: |
          grep -rn 'Password123' src/backend/shared/prisma/seed.ts → 0
          grep -rn '12345678901' src/backend/shared/prisma/seed.ts → 0
        note: "Test files use Password123! for fixtures — acceptable."
    swarm_template: |
      SWARM [SEC-SPRINT]: Fix 3 launch-blocking security findings | 3 items | ~5 files

      MEMORY: sec-sprint-scope (healthcare-platform namespace)
      WORKSPACE: /Users/rodrigo/claude-projects/healthcare-super-app--w-gamification--tgfzl7

      PRIMARY DELIVERABLES:
      1. rules.service.ts — new Function() replaced with safe evaluator
      2. encryption.service.ts — unique salt per user
      3. seed.ts — env vars instead of hardcoded creds

      ANTI-PATTERNS:
      ❌ AP1 (0.95): Do NOT add new deps without checking license
      ❌ AP2 (0.90): Do NOT change rule evaluation behavior — only the mechanism
      ❌ AP3 (0.85): Do NOT modify test fixtures unless fix changes public API

      ━━━ EXISTING CODE ━━━
      [gamification-engine] rules.service.ts:268:
        Has: const evaluateFunc = new Function('context', `...`)
        MISSING: Safe evaluator (no Function constructor)

      [shared] encryption.service.ts:23:
        Has: this.key = crypto.scryptSync(encryptionKey, 'austa-phi-salt', 32)
        MISSING: Per-user salt via crypto.randomBytes(32)

      [shared] seed.ts:285,292,315:
        Has: bcrypt.hash('Password123!', 10), cpf: '12345678901'
        MISSING: process.env.SEED_ADMIN_PASSWORD || faker fallback

      ━━━ PHASE 1: RECON (2 workers) ━━━
      Worker-1: READ rules.service.ts, map all new Function() call sites
      Worker-2: READ encryption.service.ts + seed.ts, map salt + credential refs

      ━━━ PHASE 2: CODER (3 workers, parallel) ━━━
      Worker-3: Replace new Function() in rules.service.ts
      Worker-4: Per-user salt in encryption.service.ts
      Worker-5: Env vars + faker in seed.ts

      ━━━ PHASE 3: VERIFIER (2 workers) ━━━
      Worker-6: grep -rn "new Function" src/backend/ → 0
      Worker-7: grep -rn "Password123" src/backend/shared/prisma/seed.ts → 0

      EXIT CRITERIA:
      EC1: grep -rn "new Function(" src/backend/ → 0
      EC2: grep -rn "austa-phi-salt" src/backend/ → 0
      EC3: grep -rn "Password123" src/backend/shared/prisma/seed.ts → 0
      EC4: grep -rn "12345678901" src/backend/shared/prisma/seed.ts → 0
      EC5: cd src/backend && yarn test → all pass
      EC6: No new files over 500 lines

      ROLLBACK: git checkout -- src/backend/gamification-engine/src/rules/rules.service.ts src/backend/shared/src/encryption/encryption.service.ts src/backend/shared/prisma/seed.ts

