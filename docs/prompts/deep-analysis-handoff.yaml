      - "Are NFRs defined with SLAs? (e.g. p99 < 200ms, 99.9% uptime)"
      - "Is there a data model / ERD documented anywhere?"
      - "Are API contracts defined (OpenAPI spec or GraphQL schema)?"
      - "How many ADRs should exist? How many do? What's missing?"
      - "Is there a documented threat model?"
      - "Does the test strategy specify coverage targets and tooling?"
      - "Are there design gaps — undocumented services or missing design decisions?"

  - id: DIM-3
    name: "Plan-to-Purpose Adherence"
    weight: 0.85
    priority: THIRD     # depends on DIM-1 and DIM-2 findings
    agent_role: "TRACE-ANALYST"
    memory_output_key: "dim3-adherence-gaps"
    depends_on: [DIM-1, DIM-2]

    objective: |
      Measure how well the plan addresses the stated purpose. Build a traceability
