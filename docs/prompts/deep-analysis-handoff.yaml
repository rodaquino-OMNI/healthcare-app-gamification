# SWARM WORKFLOW — Compact reference (full: 013-agent-guide.yaml)
# =============================================================================
workflow:

  bootstrap: # Run ONCE per session
    - "npx @claude-flow/cli@latest daemon start"
    - "npx @claude-flow/cli@latest doctor --verbose"
    - "npx @claude-flow/cli@latest memory init --force --verbose"
    - "npx @claude-flow/cli@latest hooks pretrain --verbose"
    - "npx @claude-flow/cli@latest hooks build-agents --verbose"
    - "npx @claude-flow/cli@latest hooks worker dispatch --trigger map"
    - "npx @claude-flow/cli@latest hooks worker dispatch --trigger deepdive"
    - "npx @claude-flow/cli@latest hooks worker dispatch --trigger ultralearn"
    - "npx @claude-flow/cli@latest neural train --modelType moe --epochs 10"
    - "npx @claude-flow/cli@latest neural train --modelType transformer --epochs 10"
    - "npx @claude-flow/cli@latest neural train --modelType classifier --epochs 10"

  per_swarm: # 9 steps per swarm (Section 15)
    1_pre_task: "hooks pre-task --task-id {id} --description {desc}"
    2_store_scope: "memory store --key {id}-scope --value {scope} --namespace healthcare-platform"
    3_hive_init: "hive-mind init --topology hierarchical-mesh --max-agents 15 --consensus byzantine"
    4_spawn: "Display command. STOP. Wait for user."
    5_wait: "User runs in separate terminal. Do NOT poll."
    6_verify: "Run grep/wc/find for exit criteria."
    7_post_task: "hooks post-task --task-id {id} --success true --store-results true"
    8_neural: "hooks post-edit --file {f} --train-neural true"
    9_store: "memory store --key {id}-complete --value {results} --namespace healthcare-platform"

  spawn_flags: |
    npx @claude-flow/cli@latest hive-mind spawn \
      --workers {N} \
      --topology hierarchical-mesh \
      --consensus byzantine \
      --claude \
      --model-routing intelligent \
      --namespace healthcare-platform \
      --use-memory --use-patterns --use-vectors --use-learning \
      --objective '{OBJECTIVE}'

  anti_drift:
    topology: hierarchical-mesh
    max_agents: 15
    consensus: byzantine
    rules:
      - "3-phase RECON→CODER→VERIFIER"
      - "EXIT GATE per worker (self-verification)"
      - "UPSTREAM GATE on verifier (blocks without data)"
      - "max 8 workers per swarm for tight coordination"

  cli_prefix: "npx @claude-flow/cli@latest"
  eoverride_workaround: "Run from /tmp if root package.json EOVERRIDE conflict"

# =============================================================================
# DEPENDENCY MANAGEMENT — Detailed instructions
# =============================================================================
# Current state as of 2026-02-28:
#   - Dependabot: ACTIVE (.github/dependabot.yml, 7 ecosystems)
#   - Renovate: CONFIG COMMITTED (renovate.json) but APP NOT INSTALLED
#   - Open PRs: #61 (4 dev-dep bumps, open 5 days)
#   - Backend: 11 vulns (1 high dev-only)
#   - Web: 17 vulns (8 high accepted-risk)

dependency_management:

  # ---------------------------------------------------------------------------
  # CURRENT VULNERABILITY SNAPSHOT (2026-02-28)
  # ---------------------------------------------------------------------------
  current_state:
    backend_audit: "yarn audit --level high → 1 high (serialize-javascript, dev-only)"
    web_audit: "yarn audit --level high → 8 high (4 next, 2 rollup, 2 ip)"
    resolution_pins_active:
      - { pkg: "minimatch", pinned: "3.1.4", reason: "ReDoS CVE" }
      - { pkg: "follow-redirects", pinned: "1.15.9", reason: "Open redirect" }
      - { pkg: "terser", pinned: "5.31.6", reason: "Code injection" }
      - { pkg: "ws", pinned: "8.18.0", reason: "DoS via close frame" }
      - { pkg: "@fastify/middie", pinned: "9.2.0", reason: "Path normalization bypass" }
    where_pins_live:
      backend: "src/backend/package.json → resolutions block"
      web: "src/web/package.json → resolutions block"
      root: "package.json → overrides block (109 entries)"

  # ---------------------------------------------------------------------------
  # STEP 1: TRIAGE PR #61 (priority: HIGH)
  # ---------------------------------------------------------------------------
  step_1_triage_pr_61:
    pr: 61
    title: "bump the dev-dependencies group across 1 directory with 4 updates"
    status: "Open since 2026-02-23"
    ci_status: "Was failing due to husky bug (now fixed in fd36296)"
    action: |
      # Check if Dependabot rebased against fixed main
      gh pr checks 61

      # If CI passes → merge immediately (dev-only, low risk)
      gh pr merge 61 --squash

      # If CI still fails → Dependabot may not have rebased yet
      # Comment to trigger rebase:
      gh pr comment 61 --body "@dependabot rebase"

      # If CI fails with REAL errors after rebase → close
      gh pr close 61 --comment "Closing: CI failures unrelated to husky. Renovate will handle."

  # ---------------------------------------------------------------------------
  # STEP 2: ACTIVATE RENOVATE (priority: HIGH)
  # ---------------------------------------------------------------------------
  step_2_activate_renovate:
    config: "renovate.json (already committed to main)"
    groups:
      - { name: "security-patches", automerge: true, delay: "0 days", scope: "Security advisories only" }
      - { name: "patch-updates", automerge: true, delay: "3 days", scope: "All patch bumps" }
      - { name: "backend-minor", automerge: false, scope: "NestJS, Prisma, etc." }
      - { name: "frontend-minor", automerge: false, scope: "React, Next.js, RN, etc." }
      - { name: "infrastructure", automerge: false, scope: "Docker, Terraform, GH Actions" }
      - { name: "major-updates", automerge: false, scope: "All major bumps (separate PRs)" }
    features:
      - "SHA-pins GitHub Actions digests (helpers:pinGitHubActionDigests)"
      - "Tracks Dockerfiles and Terraform .tf files"
      - "Schedule: weekday mornings, America/Sao_Paulo"
      - "Max 5 concurrent PRs, 2 per hour"
      - "Runs yarn dedupe after updates"
      - "Respects existing resolutions/overrides (ignoreDeps for pinned packages)"
    activation: |
      # User must install the Renovate GitHub App:
      # 1. Visit https://github.com/apps/renovate
      # 2. Install on the repository
      # 3. Renovate creates an onboarding PR within minutes
      # 4. Review and merge the onboarding PR
      # 5. Renovate begins scanning per renovate.json schedule

      # Verify activation:
      gh pr list --label renovate
      # Should show "Configure Renovate" onboarding PR

  # ---------------------------------------------------------------------------
  # STEP 3: DISABLE DEPENDABOT (priority: MEDIUM, after Renovate is proven)
  # ---------------------------------------------------------------------------
  step_3_disable_dependabot:
    prereq: "At least 1 Renovate PR created and merged successfully"
    options:
      option_a: |
        # Disable all update checks (keep file for security alerts)
        cat > .github/dependabot.yml << 'EOF'
        version: 2
        updates: []
        EOF
      option_b: |
        # Remove entirely (also disables Dependabot security alerts)
        git rm .github/dependabot.yml
    verify: "No new Dependabot PRs created after 1 week"
    note: |
      Dependabot security ALERTS (not PRs) are separate from version updates.
      Even with dependabot.yml deleted, security alerts remain active if enabled
      in GitHub Settings > Code security > Dependabot alerts.

  # ---------------------------------------------------------------------------
  # STEP 4: RESOLUTION PIN MAINTENANCE (ongoing)
  # ---------------------------------------------------------------------------
  step_4_maintain_pins:
    description: "Resolutions/overrides force specific versions for transitive deps with CVEs"
    when_to_add: |
      # Run when a new CVE appears in yarn audit:
      cd src/backend && yarn audit --level high

      # If a HIGH/CRITICAL vulnerability is in a transitive dep:
      # 1. Check if the patched version exists on npm
      # 2. Verify it doesn't break the parent package
      # 3. Add to the appropriate resolutions block:

      # Backend transitive → src/backend/package.json resolutions
      # Web transitive → src/web/package.json resolutions
      # Root-level → package.json overrides

    when_to_remove: |
      # Pins become stale when the parent package updates its own dependency.
      # Check periodically:
      yarn why <pinned-package>

      # If the parent now pulls a safe version natively → remove the pin.
      # Renovate PRs may also flag unnecessary pins via its update logic.

    format: |
      # In package.json (yarn resolutions or npm overrides):
      "resolutions": {
        "vulnerable-pkg": ">=safe-version"
      }
      # Then: yarn install (regenerates lock file with patched version)

  # ---------------------------------------------------------------------------
  # STEP 5: MAJOR MIGRATION PLANNING (post-launch)
  # ---------------------------------------------------------------------------
  step_5_major_migrations:
    next_js_15:
      vulns_fixed: 4
      effort: "XL (2-4 weeks)"
      breaking_changes:
        - "App Router changes (async page params, headers/cookies)"
        - "Turbopack default in dev"
        - "React 19 required"
        - "Middleware and routing changes"
      approach: |
        # Incremental migration path:
        # 1. Audit all src/web/web/src/pages/ for incompatible patterns
        # 2. Update next.config.js for Next.js 15 compatibility
        # 3. Upgrade React to 19.x alongside Next.js
        # 4. Run full test suite after migration
        # This should be a dedicated sprint, not mixed with feature work.

    sentry_nextjs_v8:
      vulns_fixed: 2
      effort: "L (3-5 days)"
      breaking_changes:
        - "New SDK initialization pattern"
        - "Different instrumentation approach"
        - "Drops support for older Node.js versions"
      approach: |
        # Simpler than Next.js 15 — can be done first:
        # 1. Upgrade @sentry/nextjs from v7 to v8
        # 2. Update sentry.client.config.ts and sentry.server.config.ts
        # 3. This resolves rollup 4.x transitive vulns automatically

    nestjs_cli_v11:
      vulns_fixed: 1
      effort: "M (1-2 days)"
      note: "Only fixes serialize-javascript (dev-only, lowest priority)"

  # ---------------------------------------------------------------------------
  # STEP 6: VULNERABILITY ACCEPTANCE CRITERIA
  # ---------------------------------------------------------------------------
  step_6_acceptance_criteria:
    accept_if:
      - "Dev-only dependency (not in production bundle)"
      - "No direct exploit path from user input"
      - "Transitive with no available patch"
      - "Fix requires major migration with breaking changes"
    reject_if:
      - "Production runtime, reachable from user input"
      - "Critical or high severity with available patch"
      - "Direct dependency (can be bumped without breaking)"
    documentation: |
      # When accepting a residual vulnerability, document:
      # 1. Package name and CVE/advisory ID
      # 2. Why it's accepted (which criteria above)
      # 3. What would fix it (even if deferred)
      # 4. Review date (re-evaluate quarterly)

      # Store in memory for audit trail:
      npx @claude-flow/cli@latest memory store \
        --key "vuln-accepted-{pkg}" \
        --value "{reason, fix, review-date}" \
        --namespace healthcare-platform

  # ---------------------------------------------------------------------------
  # STEP 7: AUTOMATED SECURITY SCANNING (CI integration)
  # ---------------------------------------------------------------------------
  step_7_ci_integration:
    current: "yarn audit --level high in deploy-staging.yml and deploy-production.yml"
    enhancement: |
      # Renovate + Dependabot alerts provide overlapping coverage:
      # - Renovate: creates PRs for updates (proactive)
      # - Dependabot alerts: flags known CVEs (reactive)
      # - yarn audit in CI: blocks deploys with new critical/high vulns

      # Recommended: keep all three active
      # - Renovate handles updates
      # - Dependabot alerts catch things Renovate misses
      # - CI audit is the hard gate before deployment

