# =============================================================================
# CLAUDE-FLOW TOOL SELECTION RATIONALE
# =============================================================================
tool_selection:
  why_not_manual_grep_only: |
    Manual grep misses semantic relationships between files.
    A spec file may say 'real-time health metrics' while code says 'HealthMetricsGateway' —
    only vector similarity search connects these. SONA learns which patterns co-occur
    across 667 source files and surfaces anomalies that sequential reading misses.

  tools_and_why:
    vector_index_and_search:
      tool: "npx @claude-flow/cli@latest vector index / vector search"
      engine: "RuVector HNSW (cosine similarity, 768-dim)"
      why: |
        Cross-file semantic analysis. Find ALL files related to 'HIPAA compliance'
        or 'gamification XP calculation' across 667 files without knowing exact
        variable names. Essential for plan-to-code adherence tracing.
      use_for:
        - "Dim 1: Find all purpose/problem-statement mentions across docs"
        - "Dim 3: Trace user story concepts to code implementations"
        - "Dim 5: Find all authentication/encryption patterns across services"

    memory_store_retrieve:
      tool: "npx @claude-flow/cli@latest memory store / retrieve / search"
      engine: "Hybrid SQLite + HNSW semantic search"
      why: |
        Persist intermediate findings between swarm workers. Worker-1 stores
        'purpose findings'; Worker-8 retrieves all to synthesize final report.
        Eliminates need for PROGRESS.md files. Enables semantic 'what did we
        find about security so far?' queries during analysis.
      use_for:
        - "All 5 dimensions: persist per-dimension findings"
        - "Cross-dimension synthesis by report worker"
        - "Resume analysis if session interrupted"

    neural_sona_pattern_analysis:
      tool: "npx @claude-flow/cli@latest neural train + hooks intelligence stats"
      engine: "SONA (256-dim, rank-4 LoRA, 624k learn/s) + MoE routing"
      why: |
        Train on the codebase to extract architectural patterns automatically.
        SONA identifies: which modules are architecturally similar, which deviate
        from the dominant pattern, where complexity concentrations exist.
        After training, 'hooks worker dispatch --trigger deepdive' runs autonomous
        deep pattern extraction across all 667 files.
      use_for:
        - "Dim 4: Automated pattern consistency analysis across 10 services"
        - "Dim 4: Identify outlier files with unusual complexity"
        - "Dim 2: Verify if architecture docs match code patterns"
      commands:
        - "npx @claude-flow/cli@latest neural train --modelType transformer --data-source src/ --epochs 5 --namespace austa-analysis"
        - "npx @claude-flow/cli@latest hooks worker dispatch --trigger deepdive"
        - "npx @claude-flow/cli@latest hooks worker dispatch --trigger map"
        - "npx @claude-flow/cli@latest hooks intelligence stats"

    hive_mind_swarm:
      tool: "npx @claude-flow/cli@latest hive-mind spawn"
      topology: "hierarchical-mesh"
      consensus: "byzantine"
      why: |
        8 workers execute the 5 analysis dimensions IN PARALLEL with coordination.
        Without swarm: sequential analysis takes 4-6h of agent time.
        With swarm: parallel execution reduces wall-clock time by ~5x.
        Byzantine consensus ensures no single worker's incorrect finding dominates.
        Hierarchical-mesh: RECON workers share findings with CODER/AUDITOR workers
        peer-to-peer, without going through a bottleneck coordinator.
      workers: 8
      worker_assignments:
        worker_1: "RECON-LEAD — read all specs, extract purpose + user personas"
        worker_2: "DOCS-ANALYST — score all documentation artifacts"
        worker_3: "TRACE-ANALYST — user story → code traceability matrix"
        worker_4: "CODE-AUDITOR-BACKEND — backend completeness + debt"
        worker_5: "CODE-AUDITOR-FRONTEND — web + mobile + design-system"
        worker_6: "SECURITY-AUDITOR — full security checklist + HIPAA/LGPD"
        worker_7: "DEPENDENCY-AUDITOR — npm audit, CVEs, deprecated packages"
        worker_8: "REPORT-SYNTHESIZER — wait for 1-7, write 3 final reports"

    hooks_pretrain:
      tool: "npx @claude-flow/cli@latest hooks pretrain"
      engine: "Pattern extraction from codebase (84+ files → 30 patterns, 16 strategies)"
      why: |
        Pre-trains hook intelligence on THIS codebase. After pretrain, the routing
        system knows which agents are best suited for which file types in this repo.
        Also generates agent configs tailored to this project's patterns.
      note: "Already run in previous session — check with 'hooks intelligence stats'"

    wasm_fallback_note: |
      RuVector native modules may not load via npx (known ISSUE-001 in claude-flow-init.yaml).
      WASM fallback activates automatically — all vector/SONA/HNSW functionality preserved.
      Do NOT spend time troubleshooting 'not loaded' messages — proceed normally.

# =============================================================================
# SESSION BOOTSTRAP (execute sequentially before spawning swarm)
# =============================================================================
session_bootstrap:
  description: "Run these commands in order before any analysis work"
  note: "Display each command group to user — do NOT auto-execute hive-mind spawn"

  phase_a_verify:
    description: "Verify claude-flow system state"
    commands:
      - cmd: "npx @claude-flow/cli@latest --version"
        expect: ">= 3.0.0"
      - cmd: "npx @claude-flow/cli@latest doctor"
        expect: "No critical failures"
      - cmd: "npx @claude-flow/cli@latest daemon status"
        expect: "Running (if stopped: daemon start)"
      - cmd: "npx @claude-flow/cli@latest hive-mind status"
        expect: "initialized"
      - cmd: "npx @claude-flow/cli@latest memory stats"
        expect: "Operational"

  phase_b_index:
    description: "Index repository into vector store for semantic search"
    note: "This is the core SONA/RuVector setup — enables cross-file semantic analysis"
    commands:
      - cmd: |
          npx @claude-flow/cli@latest vector index \
            --source "docs/" \
            --namespace austa-analysis \
            --algorithm hnsw \
            --dimensions 768
        purpose: "Index all 19 documentation files for semantic retrieval"
      - cmd: |
          npx @claude-flow/cli@latest vector index \
            --source "src/backend" \
            --namespace austa-analysis \
            --algorithm hnsw \
            --dimensions 768
        purpose: "Index backend source for code pattern matching"
      - cmd: |
          npx @claude-flow/cli@latest vector index \
            --source "src/web" \
            --namespace austa-analysis \
            --algorithm hnsw \
            --dimensions 768
        purpose: "Index frontend source for pattern matching"

  phase_c_neural:
    description: "Train SONA on codebase to enable autonomous pattern extraction"
    commands:
      - cmd: "npx @claude-flow/cli@latest neural train --modelType transformer --data-source src/ --epochs 5 --namespace austa-analysis"
        purpose: "Learn architectural patterns across all 667 source files"
      - cmd: "npx @claude-flow/cli@latest hooks worker dispatch --trigger map"
        purpose: "Autonomous codebase mapping"
      - cmd: "npx @claude-flow/cli@latest hooks worker dispatch --trigger deepdive"
        purpose: "Deep pattern extraction"
      - cmd: "npx @claude-flow/cli@latest hooks intelligence stats"
        purpose: "Confirm SONA + MoE active"

  phase_d_hooks:
    description: "Register task and store scope"
    commands:
      - cmd: |
          npx @claude-flow/cli@latest hooks pre-task \
            --description "Deep repository analysis — 5 dimensions — AUSTA SuperApp" \
            --task-id "deep-analysis-001" \
            --namespace austa-analysis
      - cmd: |
          npx @claude-flow/cli@latest memory store \
            --key "analysis-scope" \
            --value "5-dimension deep analysis: (1)purpose (2)plan-quality (3)plan-adherence (4)build-quality (5)security-enterprise. Workspace: /Users/rodrigo/claude-projects/healthcare-super-app--w-gamification--tgfzl7" \
            --namespace austa-analysis
      - cmd: |
          npx @claude-flow/cli@latest memory store \
            --key "repo-context" \
            --value "NestJS 10 backend (252 ts files, 8 services), React Native + Next.js frontend (415 ts/tsx files), 667 total source files, 37 total test files, 847 any-type usages, 1 ADR, Blitzy AI-generated 90% complete" \
            --namespace austa-analysis

# =============================================================================
# ANALYSIS DIMENSIONS (structured for agent iteration)
# =============================================================================
analysis_dimensions:

  - id: DIM-1
    name: "Repository Purpose & Problem Definition"
    weight: 1.0         # Foundational — all other dims depend on this
    priority: FIRST     # Execute before all others
    agent_role: "RECON-LEAD"
    memory_output_key: "dim1-purpose-summary"

    objective: |
      Fully understand what this system IS, WHO it serves, and WHAT PROBLEM it solves.
      Establish the ground truth that all other dimensions are measured against.

    vector_queries:
      - query: "healthcare super app purpose problem statement target users patient"
        top_k: 10
        namespace: "austa-analysis"
      - query: "gamification health engagement behavior change incentive"
        top_k: 8
        namespace: "austa-analysis"
      - query: "AUSTA business context market Brazil LATAM mHealth"
        top_k: 5
        namespace: "austa-analysis"
      - query: "My Health Care Now Plan Benefits three journeys"
        top_k: 8
        namespace: "austa-analysis"

    files_to_read:      # ordered by priority
      - path: "docs/original documentation/Project Guide.md"
        priority: 1
        why: "States project completion status + AI generation context"
      - path: "docs/original documentation/Technical Specifications_*.md"
        priority: 2
        why: "Original full specification — ground truth for purpose"
      - path: "docs/specifications/FUNCTIONAL_REQUIREMENTS.md"
        priority: 3
      - path: "docs/specifications/USER_STORIES.md"
        priority: 4
      - path: "docs/specifications/SYSTEM_ANALYSIS.md"
        priority: 5
      - path: "docs/design/HEALTHCARE_RESEARCH_INSIGHTS_2024.md"
        priority: 6
        why: "Validates whether gamification approach is evidence-based"

    questions:
      - "What is the primary problem this application solves?"
      - "Who are the target users — patient personas, roles, demographics?"
      - "What are the 3 core journeys (Health/Care/Plan) and how do they relate?"
      - "What role does gamification play — cosmetic or structurally integrated?"
      - "What regulatory/compliance context exists — HIPAA, LGPD, ANS Brazil?"
      - "Is the target market Brazil-specific, LATAM, or global?"
      - "Does the healthcare research justify the gamification design choices?"
      - "What are the stated performance SLAs and availability targets?"

    scoring_rubric:
      problem_clarity:
        max: 5
        description: "Is the core problem statement clear, specific, and validated?"
      user_persona_definition:
        max: 5
        description: "Are target users defined with demographics, needs, constraints?"
      journey_coherence:
        max: 5
        description: "Are the 3 journeys logically distinct and internally consistent?"
      regulatory_clarity:
        max: 5
        description: "Are compliance frameworks (HIPAA/LGPD/ANS) explicitly addressed?"
      market_definition:
        max: 5
        description: "Is target market, scale, and business model defined?"

  - id: DIM-2
    name: "Quality of Plan (Documentation & Architecture)"
    weight: 0.9
    priority: SECOND
    agent_role: "DOCS-ANALYST"
    memory_output_key: "dim2-plan-quality-scores"

    objective: |
      Assess completeness, internal consistency, and professional quality of ALL
      planning artifacts. Rate each artifact. Identify gaps.

    vector_queries:
      - query: "acceptance criteria measurable testable specific"
        top_k: 8
        namespace: "austa-analysis"
      - query: "architecture decision record rationale tradeoff alternatives"
        top_k: 5
        namespace: "austa-analysis"
      - query: "non-functional requirements SLA performance availability security"
        top_k: 8
        namespace: "austa-analysis"
      - query: "data model schema ERD entity relationship"
        top_k: 5
        namespace: "austa-analysis"
      - query: "test strategy coverage unit integration e2e contract"
        top_k: 8
        namespace: "austa-analysis"

    files_to_read:      # ALL documentation files
      - path: "docs/specifications/ACCEPTANCE_CRITERIA.md"
      - path: "docs/specifications/FUNCTIONAL_REQUIREMENTS.md"
      - path: "docs/specifications/NON_FUNCTIONAL_REQUIREMENTS.md"
      - path: "docs/specifications/INTEGRATION_REQUIREMENTS.md"
      - path: "docs/specifications/TECHNICAL_CONSTRAINTS.md"
      - path: "docs/specifications/UI_UX_REQUIREMENTS.md"
      - path: "docs/specifications/USER_STORIES.md"
      - path: "docs/specifications/SYSTEM_ANALYSIS.md"
      - path: "docs/design/SYSTEM_ARCHITECTURE.md"
      - path: "docs/design/COMPONENT_ARCHITECTURE.md"
      - path: "docs/design/DATA_FLOW_ARCHITECTURE.md"
      - path: "docs/design/API_GATEWAY_SERVICE_MESH.md"
      - path: "docs/design/GAMIFICATION_ENGINE_ARCHITECTURE.md"
      - path: "docs/design/DEPLOYMENT_INFRASTRUCTURE.md"
      - path: "docs/design/SECURITY_ERROR_HANDLING.md"
      - path: "docs/design/SERVICE_PSEUDOCODE.md"
      - path: "docs/design/TEST_STRATEGY.md"
      - path: "docs/ADRs/013-claude-flow-swarm-intelligence.md"

    scoring_rubric:
      artifacts:
        - name: "Functional Requirements"
          dimensions: [completeness, internal_consistency, measurability, technical_depth]
        - name: "Non-Functional Requirements"
          dimensions: [completeness, internal_consistency, measurability, technical_depth]
          note: "Check: are SLAs numeric? e.g. '99.9% uptime' not 'high availability'"
        - name: "User Stories + Acceptance Criteria"
          dimensions: [completeness, internal_consistency, measurability, testability]
        - name: "System Architecture"
          dimensions: [completeness, internal_consistency, diagram_quality, decision_rationale]
        - name: "Component Architecture"
          dimensions: [completeness, internal_consistency, interface_definition, dependency_clarity]
        - name: "Data Flow Architecture"
          dimensions: [completeness, internal_consistency, security_considerations]
        - name: "Security Design"
          dimensions: [completeness, threat_model_presence, control_coverage, compliance_mapping]
        - name: "Test Strategy"
          dimensions: [completeness, coverage_targets_numeric, tooling_specificity, all_test_types_covered]
        - name: "ADR Coverage"
          dimensions: [count_vs_expected, decision_quality, rationale_depth]
          expected_adrs: 10
          found_adrs: 1

    gap_indicators:
      - "Missing ERD / data model document"
      - "Missing API contract (OpenAPI spec or GraphQL schema file)"
      - "NFRs without numeric SLAs"
      - "Acceptance criteria with vague language (e.g. 'fast', 'reliable', 'secure')"
      - "Architecture docs not referencing actual service names"
      - "Test strategy without coverage % targets"
      - "Missing ADRs for: database choice, ORM selection, auth strategy, messaging"

