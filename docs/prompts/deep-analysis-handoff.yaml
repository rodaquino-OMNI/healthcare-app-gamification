# =============================================================================
# CLAUDE-FLOW WORKFLOW REFERENCE (ADR-013 + 013-agent-guide.yaml)
# =============================================================================
# This section documents the CORRECT workflow for all swarm operations.
# Coordinator role: prepare commands, memory, hooks, verify.
# User role: copy-paste spawn commands into separate terminals, report completion.

workflow_reference:

  # ---------------------------------------------------------------------------
  # BOOTSTRAP (once per session — 013-agent-guide Section 14)
  # ---------------------------------------------------------------------------
  bootstrap:
    description: "Run ONCE at start of each new session"
    phase_a_system_init:
      commands:
        - "npx @claude-flow/cli@latest daemon start"
        - "npx @claude-flow/cli@latest doctor --verbose"
        - "npx @claude-flow/cli@latest memory init --force --verbose"
        - "npx @claude-flow/cli@latest hooks pretrain --verbose"
        - "npx @claude-flow/cli@latest hooks build-agents --verbose"
    phase_b_daemon_workers:
      commands:
        - "npx @claude-flow/cli@latest hooks worker dispatch --trigger map"
        - "npx @claude-flow/cli@latest hooks worker dispatch --trigger deepdive"
        - "npx @claude-flow/cli@latest hooks worker dispatch --trigger ultralearn"
    phase_c_neural_training:
      commands:
        - "npx @claude-flow/cli@latest neural train --modelType moe --epochs 10"
        - "npx @claude-flow/cli@latest neural train --modelType transformer --epochs 10"
        - "npx @claude-flow/cli@latest neural train --modelType classifier --epochs 10"
      verify:
        - "npx @claude-flow/cli@latest neural status"
        - "npx @claude-flow/cli@latest hooks intelligence stats"
    phase_d_hive_mind:
      command: >
        npx @claude-flow/cli@latest hive-mind init
        --topology hierarchical-mesh --max-agents 15 --consensus byzantine
      note: "MUST run before EVERY swarm spawn, not just once"

  # ---------------------------------------------------------------------------
  # PHASE WORKFLOW (every swarm — 013-agent-guide Section 15, 9 steps)
  # ---------------------------------------------------------------------------
  phase_workflow:
    description: "Standard execution cycle for EVERY swarm task"
    steps:
      step_1_pre_task:
        what: "Register task with hooks system"
        command: >
          npx @claude-flow/cli@latest hooks pre-task
          --task-id "{swarm-id}"
          --description "{task description}"
        note: "Run from /tmp if root package.json has EOVERRIDE conflict"

      step_2_store_scope:
        what: "Persist task scope in memory for workers to read"
        command: >
          npx @claude-flow/cli@latest memory store
          --key "{swarm-id}-scope"
          --value "{scope description with deliverables, files, constraints}"
          --namespace healthcare-platform

      step_3_hive_mind_init:
        what: "Initialize hive-mind coordination (MANDATORY before every spawn)"
        command: >
          npx @claude-flow/cli@latest hive-mind init
          --topology hierarchical-mesh
          --max-agents 15
          --consensus byzantine
        critical: "NEVER skip this step — swarm spawn without init causes drift"

      step_4_spawn:
        what: "Display benchmark-quality spawn command for user to copy-paste"
        action: "Display command in markdown code block. STOP. Wait for user."
        template: "See spawn_command_template below"
        rules:
          - "NEVER auto-execute — display command only"
          - "NEVER do RECON work that belongs to swarm workers"
          - "NEVER spawn Task tool agents when using hive-mind CLI"
          - "After displaying command: STOP. Say nothing more. Wait."

      step_5_wait:
        what: "User runs command in separate terminal"
        action: "Wait for user to report completion"
        rules:
          - "Do NOT poll status"
          - "Do NOT ask 'should I check?'"
          - "Do NOT run any commands"

      step_6_verify:
        what: "Verify exit criteria after user reports completion"
        action: "Run grep/wc/find commands to validate deliverables"
        example: |
          grep -c "it(" src/backend/plan-service/test/claims.integration.spec.ts
          wc -l docs/production-setup-guide.md
          git diff --name-only

      step_7_post_task:
        what: "Record task completion in hooks system"
        command: >
          npx @claude-flow/cli@latest hooks post-task
          --task-id "{swarm-id}"
          --success true
          --store-results true

      step_8_neural_train:
        what: "Train neural patterns on key deliverable files"
        command: >
          npx @claude-flow/cli@latest hooks post-edit
          --file "{main-deliverable-file}"
          --success true
          --train-neural true
        when: "Only if significant new code patterns were created"

      step_9_store_complete:
        what: "Store completion key in memory"
        command: >
          npx @claude-flow/cli@latest memory store
          --key "{swarm-id}-complete"
          --value "{summary of results, exit criteria scores}"
          --namespace healthcare-platform

  # ---------------------------------------------------------------------------
  # POST-TASK ROUTINES (after each swarm — full checklist)
  # ---------------------------------------------------------------------------
  post_task_routines:
    description: "Complete checklist after EVERY swarm completion"
    steps:
      - step: "Verify exit criteria (grep/wc/find for each EC)"
      - step: "hooks post-task --task-id X --success true --store-results true"
      - step: "hooks post-edit --file X --train-neural true (per key file)"
      - step: "memory store --key X-complete --value 'results summary'"
      - step: "memory store --key pattern-X --namespace patterns --value 'what worked'"
      - step: "Dispatch relevant workers if applicable"
        examples:
          - "hooks worker dispatch --trigger audit  (after security changes)"
          - "hooks worker dispatch --trigger testgaps  (after new features)"
          - "hooks worker dispatch --trigger optimize  (after refactoring)"
          - "hooks worker dispatch --trigger map  (after 5+ file changes)"

  # ---------------------------------------------------------------------------
  # SPAWN COMMAND TEMPLATE (benchmark quality — proven pattern)
  # ---------------------------------------------------------------------------
  spawn_command_template:
    description: "Every hive-mind spawn MUST follow this structure"
    command_flags: |
      npx @claude-flow/cli@latest hive-mind spawn \
        --workers {8} \
        --topology hierarchical-mesh \
        --consensus byzantine \
        --claude \
        --model-routing intelligent \
        --namespace healthcare-platform \
        --use-memory \
        --use-patterns \
        --use-vectors \
        --use-learning \
        --objective '{OBJECTIVE}'

    objective_structure: |
      SWARM {ID}: {Description} | {count} items | ~{N} files

      MEMORY: {scope-key} (healthcare-platform namespace)
      WORKSPACE: /Users/rodrigo/claude-projects/healthcare-super-app--w-gamification--tgfzl7
      DURATION: ~{N} min

      PRIMARY DELIVERABLES:
      1. {file-path} — {description}
      2. {file-path} — {description}

      ANTI-PATTERNS TO AVOID:
      ❌ AP1 agent_introspection_loop (WEIGHT=0.95): Workers running hooks/status. CORRECT: read, edit, store >500 bytes.
      ❌ AP2 missing_upstream_gate (WEIGHT=0.90): Verifier skipping key checks. CORRECT: check ALL keys >200 bytes.
      ❌ AP3 queen_as_coder (WEIGHT=0.85): Queen editing files. CORRECT: delegate.
      ❌ AP4 {domain-specific} (WEIGHT=X.XX): {description}. CORRECT: {correction}.
      ❌ AP5 {domain-specific} (WEIGHT=X.XX): {description}. CORRECT: {correction}.

      ━━━ EXISTING CODE (READ BEFORE WRITING) ━━━
      [{service/module}] {path}:
        Has: {what exists — real code references}
        MISSING: {what needs to be created}

      ━━━ TARGET PATTERN ━━━
      [{pattern name}]:
        {code example showing desired output structure}

      ━━━ PHASE 1: RECON ({N} workers) ━━━
      Worker-{N} (ROLE):
        READ: {file list}
        MAP: {what to discover}
        STORE: memory store --key {key} --namespace healthcare-platform
        EXIT GATE: memory retrieve --key {key} | wc -c → must be > 500

      ━━━ PHASE 2: CODER ({N} workers, parallel) ━━━
      Worker-{N} (ROLE):
        READ: {inputs}
        EXECUTE: {what to create/modify}
        STORE: memory store --key {key} --namespace healthcare-platform
        EXIT GATE: {grep/wc command} → must be >= {threshold}

      ━━━ PHASE 3: VERIFIER ({N} workers) ━━━
      Worker-{N} (VERIFIER):
        REQUIRED_UPSTREAM_KEYS: {list all keys from phases 1-2}
        V1: {check} → expect {value}
        V2: {check} → expect {value}
        STORE: memory store --key {key}-verify --namespace healthcare-platform
        EXIT GATE: V1-VN all PASS

      ━━━ EXIT CRITERIA ({N}) ━━━
      EC1: {measurable check}
      EC2: {measurable check}

      ROLLBACK: {cleanup command}

  # ---------------------------------------------------------------------------
  # ANTI-DRIFT CONFIGURATION
  # ---------------------------------------------------------------------------
  anti_drift:
    topology: hierarchical-mesh
    max_agents: 15
    strategy: specialized
    consensus: byzantine
    guidelines:
      - "hierarchical: coordinator catches divergence"
      - "max-agents 8 per swarm: smaller team = less drift"
      - "specialized: clear roles, no overlap"
      - "3-phase RECON→CODER→VERIFIER: prevents skipping validation"
      - "EXIT GATE per worker: self-verification before declaring done"
      - "UPSTREAM GATE on verifier: blocks synthesis without complete data"

  # ---------------------------------------------------------------------------
  # KEY CLI COMMANDS REFERENCE
  # ---------------------------------------------------------------------------
  cli_quick_ref:
    memory:
      store: "memory store --key {k} --value {v} --namespace healthcare-platform"
      search: "memory search --query {q} --namespace healthcare-platform"
      retrieve: "memory retrieve --key {k} --namespace healthcare-platform"
      list: "memory list --namespace healthcare-platform --limit 10"
    hooks:
      pre_task: "hooks pre-task --task-id {id} --description {desc}"
      post_task: "hooks post-task --task-id {id} --success true --store-results true"
      post_edit: "hooks post-edit --file {f} --success true --train-neural true"
      route: "hooks route --task {desc}"
      worker: "hooks worker dispatch --trigger {map|audit|testgaps|optimize|deepdive}"
    neural:
      train: "neural train --modelType {moe|transformer|classifier} --epochs 10"
      status: "neural status"
      patterns: "neural patterns --list"
    hive_mind:
      init: "hive-mind init --topology hierarchical-mesh --max-agents 15 --consensus byzantine"
      spawn: "hive-mind spawn --claude --workers 8 --topology hierarchical-mesh --consensus byzantine --model-routing intelligent --namespace healthcare-platform --use-memory --use-patterns --use-vectors --use-learning --objective '{...}'"
      status: "hive-mind status"
    note: "All commands prefixed with: npx @claude-flow/cli@latest"
    eoverride_workaround: "Run from /tmp if root package.json EOVERRIDE conflict occurs"

