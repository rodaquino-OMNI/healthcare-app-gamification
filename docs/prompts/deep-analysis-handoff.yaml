        top_k: 6
        namespace: "austa-analysis"

    trace_methodology: |
      For each user need identified in DIM-1, attempt to trace through:
        User Need → Functional Requirement → Acceptance Criterion → Architecture Component
      
      Mark each chain:
        COMPLETE:   all 4 links exist and are consistent
        PARTIAL:    1-2 links missing
        BROKEN:     user need exists but no requirement or design found
        ORPHANED:   design/component exists with no user need justification
      
      Report % complete, % partial, % broken, % orphaned.

    specific_trace_targets:
      - need: "Real-time health metrics from wearables"
        expected_requirement: "FUNCTIONAL_REQUIREMENTS.md — wearable integration"
        expected_architecture: "health-service + FHIR adapter + TimescaleDB"
      - need: "AI-powered symptom checker"
        expected_requirement: "FUNCTIONAL_REQUIREMENTS.md — symptom checker"
        expected_architecture: "care-service/symptom-checker + ML model"
      - need: "Gamification — XP + achievements + leaderboard"
        expected_requirement: "FUNCTIONAL_REQUIREMENTS.md — gamification"
        expected_architecture: "gamification-engine + event-driven"
      - need: "Insurance claims digital submission"
        expected_requirement: "FUNCTIONAL_REQUIREMENTS.md — claims"
        expected_architecture: "plan-service + OCR + insurance API"
      - need: "Multi-language support"
        expected_requirement: "NON_FUNCTIONAL_REQUIREMENTS.md or UI_UX"
        expected_code: "i18n in web + mobile"
      - need: "LGPD compliance (Brazilian data privacy)"
        expected_requirement: "NON_FUNCTIONAL_REQUIREMENTS.md or TECHNICAL_CONSTRAINTS"
        expected_architecture: "SECURITY_ERROR_HANDLING.md"

    questions:
      - "What % of user stories have complete traces to code?"
      - "Are there planned features with no user/business justification (over-engineering)?"
      - "Does the gamification design reflect healthcare research evidence?"
      - "Are integration requirements (FHIR, insurance, telemedicine) adequately architected?"
      - "Is multi-tenancy addressed consistently across all services?"
      - "Is multi-language (i18n) addressed throughout or only partially?"
      - "Are the 3 journeys equally well designed, or is there imbalance?"
      - "Does the deployment infrastructure match the scale requirements?"

  - id: DIM-4
    name: "Build Quality"
    weight: 1.0         # highest signal — this is what the next human work targets
    priority: PARALLEL  # run alongside DIM-3 (no dependency)
    agent_roles: ["CODE-AUDITOR-BACKEND", "CODE-AUDITOR-FRONTEND"]
    memory_output_keys:
      backend:   "dim4-backend-scored"
      frontend:  "dim4-frontend-scored"
      combined:  "dim4-build-quality-summary"

    objective: |
      Assess current implementation state: completeness, correctness, maintainability,
      and technical debt. Do NOT fix anything — measure and report.

    recon_commands:   # READ-ONLY — run these first before file sampling
      count_by_service: |
        find src/backend -name "*.ts" | grep -v node_modules | grep -v ".d.ts" | grep -v ".spec" \
          | sed 's|/[^/]*$||' | sort | uniq -c | sort -rn | head -30
      test_ratio: |
        echo "Source files:" && find src -name "*.ts" -o -name "*.tsx" | grep -v node_modules | grep -v spec | grep -v test | wc -l
        echo "Test files:" && find src -name "*.spec.ts" -o -name "*.test.ts" -o -name "*.spec.tsx" -o -name "*.test.tsx" | grep -v node_modules | wc -l
      debt_markers: |
        grep -rn "TODO\|FIXME\|HACK\|WORKAROUND\|XXX\|NOT IMPLEMENTED\|placeholder" \
          src/ --include="*.ts" --include="*.tsx" | grep -v node_modules | grep -v ".spec"
      stub_files: |
        find src/backend -name "*.ts" | grep -v node_modules | xargs wc -l 2>/dev/null \
          | sort -n | head -40
      any_type_density: |
        find src/backend -name "*.ts" | grep -v node_modules | \
          xargs grep -c "\bany\b" 2>/dev/null | grep -v ":0" | sort -t: -k2 -rn | head -20
      error_handling: |
        grep -rn "try {" src/backend --include="*.ts" | grep -v node_modules | wc -l
        grep -rn "catch (e)" src/backend --include="*.ts" | grep -v node_modules | wc -l
        grep -rn "@Catch\|ExceptionFilter\|HttpException" src/backend --include="*.ts" | grep -v node_modules | wc -l
      opentelemetry_usage: |
        grep -rn "trace\|span\|meter\|opentelemetry" src/backend --include="*.ts" | grep -v node_modules | grep -v "import" | wc -l
      prisma_vs_typeorm: |
        echo "Prisma usages:" && grep -rn "prisma\b" src/backend --include="*.ts" | grep -v node_modules | wc -l
        echo "TypeORM usages:" && grep -rn "@Entity\|@Column\|@Repository\|getRepository" src/backend --include="*.ts" | grep -v node_modules | wc -l

    files_to_sample:   # representative sample — not exhaustive
      backend_core:
        - "src/backend/gamification-engine/src/achievements/"   # full directory
        - "src/backend/gamification-engine/src/rules/"          # full directory
        - "src/backend/auth-service/src/auth/"                  # full directory
        - "src/backend/care-service/src/telemedicine/"          # full directory
        - "src/backend/health-service/src/health/"              # full directory
        - "src/backend/api-gateway/src/graphql/"                # full directory
        - "src/backend/plan-service/src/claims/"                # full directory
        - "src/backend/notification-service/src/notifications/" # full directory
      backend_config:
        - "src/backend/docker-compose.yml"
        - "src/backend/nest-cli.json"
        - "src/backend/gamification-engine/prisma/"             # Prisma schema
      frontend_web:
        - "src/web/web/src/pages/"                              # list + sample 3
        - "src/web/web/src/components/"                         # list
        - "src/web/web/src/hooks/"                              # list + sample 2
      frontend_mobile:
        - "src/web/mobile/src/screens/"                         # list + sample 3
        - "src/web/mobile/src/navigation/"                      # full
      design_system:
        - "src/web/design-system/src/"                          # structure overview
        - "src/web/design-system/src/tokens/"                   # design tokens
        - "src/web/design-system/src/themes/"                   # theme config
      shared:
        - "src/web/shared/"                                     # structure + key files

    scoring_rubric:
      backend:
        - dimension: "Implementation completeness"
          description: "% of planned service modules actually implemented"
          max: 5
        - dimension: "Test coverage"
          description: "Test files / source files ratio. Target: >60%"
          max: 5
        - dimension: "Code consistency"
          description: "Same patterns, naming, structure across all 8 services"
          max: 5
        - dimension: "Error handling"
          description: "try/catch, typed errors, global filters, user-facing messages"
          max: 5
        - dimension: "Observability"
          description: "OpenTelemetry spans, structured logging, metrics"
          max: 5
        - dimension: "Database design"
          description: "Schema quality, migrations present, indexes defined"
          max: 5
        - dimension: "API design"
          description: "GraphQL schema quality, REST consistency, validation"
          max: 5
        - dimension: "TypeScript quality"
          description: "'any' density, interface coverage, strict mode adherence"
          max: 5
        - dimension: "Technical debt density"
          description: "TODOs/FIXMEs per 1000 lines (target: <2)"
          max: 5
        - dimension: "ORM consistency"
          description: "Single ORM or justified dual-ORM pattern"
          max: 5
      frontend:
        - dimension: "Page/screen completeness"
          description: "Implemented pages vs planned screens in UI/UX spec"
          max: 5
        - dimension: "Design system adoption"
          description: "% of UI using design-system vs ad-hoc styled components"
          max: 5
        - dimension: "Type safety"
          description: "'any' density, proper component typing"
          max: 5
        - dimension: "State management consistency"
          description: "Apollo Client vs React Query — clear separation of concerns"
          max: 5
        - dimension: "Error boundary coverage"
          description: "Error boundaries on all major page sections"
          max: 5
        - dimension: "Accessibility"
          description: "ARIA labels, semantic HTML, screen reader support"
          max: 5
        - dimension: "i18n completeness"
          description: "Translation keys complete for all text in web + mobile"
          max: 5
        - dimension: "Test coverage"
          description: "Component tests coverage in design-system vs web/mobile"
          max: 5

    critical_checks:
      - "Does gamification-engine implement ALL subsystems: achievements, leaderboard, quests, rewards, rules, events, profiles?"
      - "Is there consistent error handling or each service handles errors differently?"
      - "Are all 3 journeys (Health/Care/Plan) at similar completion levels?"
      - "Are there empty service modules or stub implementations?"
      - "Is the design-system complete enough to support both web and mobile consistently?"
      - "Are environment variables validated at startup (class-validator/Joi schemas)?"
      - "Are Kafka consumers/producers implemented in all services that need them?"

  - id: DIM-5
    name: "Security & Enterprise Requirements"
    weight: 1.0         # non-negotiable for healthcare
    priority: PARALLEL  # run alongside DIM-4
    agent_roles: ["SECURITY-AUDITOR", "DEPENDENCY-AUDITOR"]
    memory_output_keys:
      security:     "dim5-security-checklist"
      dependencies: "dim5-deps-audit"
      critical:     "dim5-critical-vulnerabilities"

    objective: |
      Identify security vulnerabilities, deprecated/vulnerable dependencies,
      compliance gaps, and deviations from enterprise best practices.
      Healthcare data requires HIPAA + LGPD compliance — treat all gaps as CRITICAL.

    compliance_frameworks:
      - name: "HIPAA"
        focus: "PHI handling, audit logs, encryption at rest/transit, access controls, minimum necessary principle"
      - name: "LGPD"
        focus: "Brazilian GDPR — consent, data subject rights, DPO, biometric data, data retention"
      - name: "ANS"
        focus: "Brazilian health insurance regulator — claim processing, coverage verification"
      - name: "OWASP Top 10 (2021)"
        focus: "Injection, broken auth, sensitive data exposure, broken access control, security misconfiguration"
      - name: "OWASP Mobile Top 10"
        focus: "Improper platform usage, insecure data storage, insecure communication"

    automated_commands:   # READ-ONLY security checks
      npm_audit_backend: |
        cd src/backend && npm audit --json 2>/dev/null | python3 -c "
        import sys, json
        try:
            d = json.load(sys.stdin)
            vuln = d.get('vulnerabilities', {})
            by_severity = {}
            for k, v in vuln.items():
                s = v.get('severity', 'unknown')
                by_severity.setdefault(s, []).append(k)
            for s in ['critical', 'high', 'moderate', 'low']:
                items = by_severity.get(s, [])
                if items: print(f'{s.upper()} ({len(items)}): {items[:5]}')
        except: print('audit parse error')
        "
      npm_audit_web: |
        cd src/web && npm audit --json 2>/dev/null | python3 -c "
        import sys, json
        try:
            d = json.load(sys.stdin)
            vuln = d.get('vulnerabilities', {})
            by_severity = {}
            for k, v in vuln.items():
                s = v.get('severity', 'unknown')
                by_severity.setdefault(s, []).append(k)
            for s in ['critical', 'high', 'moderate', 'low']:
                items = by_severity.get(s, [])
                if items: print(f'{s.upper()} ({len(items)}): {items[:5]}')
        except: print('audit parse error')
        "
      hardcoded_secrets: |
        grep -rn "password\s*[:=]\s*['\"][^'\"\$][^'\"]\|secret\s*[:=]\s*['\"][^'\"\$][^'\"]\|api[_-]key\s*[:=]\s*['\"][^'\"\$]" \
          src/ --include="*.ts" --include="*.tsx" | grep -v node_modules | grep -v ".spec" | grep -v "test"
      env_files_committed: |
        find . -name ".env" -not -name ".env.example" -not -path "*/node_modules/*"
      jwt_config: |
        grep -rn "expiresIn\|secret\|JWT_SECRET\|refreshToken\|rotation" \
          src/backend --include="*.ts" | grep -v node_modules | grep -v ".spec"
      auth_guards: |
        find src/backend -name "*.guard.ts" | grep -v node_modules
        grep -rn "@UseGuards\|JwtAuthGuard\|RolesGuard" src/backend --include="*.ts" | grep -v node_modules | wc -l
      data_encryption: |
        grep -rn "encrypt\|AES\|crypto\|bcrypt\|hash\|salt" \
          src/backend --include="*.ts" | grep -v node_modules | grep -v ".spec" | head -20
      kubernetes_security: |
        grep -rn "runAsNonRoot\|runAsUser\|readOnlyRootFilesystem\|allowPrivilegeEscalation\|NetworkPolicy" \
          infrastructure/kubernetes/ --include="*.yaml"
      cors_config: |
        grep -rn "cors\|CORS\|origin" src/backend --include="*.ts" | grep -v node_modules | head -10
      helmet_config: |
        grep -rn "helmet\|ContentSecurityPolicy\|hsts\|frameguard" \
          src/backend --include="*.ts" | grep -v node_modules | head -10
      rate_limiting: |
        grep -rn "ThrottlerModule\|ThrottlerGuard\|RateLimit\|@Throttle" \
          src/backend --include="*.ts" | grep -v node_modules | head -10
      audit_logging: |
        grep -rn "audit\|AuditLog\|auditTrail\|who.*what.*when" \
          src/backend --include="*.ts" | grep -v node_modules | head -15
      phi_handling: |
        grep -rn "PHI\|HIPAA\|personalHealth\|medical\|diagnosis\|prescription" \
          src/backend --include="*.ts" | grep -v node_modules | head -15
      biometric_mobile: |
        grep -rn "biometric\|Biometrics\|FaceID\|TouchID\|fingerprint" \
          src/web/mobile/src --include="*.ts" --include="*.tsx" | head -10
      multitenancy_isolation: |
        grep -rn "tenantId\|organizationId\|companyId\|tenant" \
          src/backend --include="*.ts" | grep -v node_modules | grep -v ".spec" | head -15

    security_checklist:   # agent fills in: PASS / FAIL / PARTIAL / NOT_IMPLEMENTED
      authentication:
        - control: "JWT authentication implemented"
          severity: CRITICAL
          check_hint: "passport-jwt, JwtAuthGuard usage in controllers"
        - control: "OAuth2 social login implemented"
          severity: HIGH
          check_hint: "passport-oauth2, OAuth2Strategy"
        - control: "JWT expiration configured (not infinite)"
          severity: HIGH
          check_hint: "expiresIn in JWT config"
        - control: "Refresh token rotation implemented"
          severity: HIGH
          check_hint: "refreshToken endpoint + token blacklist"
        - control: "Biometric auth in mobile"
          severity: MEDIUM
          check_hint: "react-native-biometrics usage"
      authorization:
        - control: "RBAC implemented"
          severity: CRITICAL
          check_hint: "@Roles decorator, RolesGuard, permissions module"
        - control: "Resource-level authorization (users can only access own data)"
          severity: CRITICAL
          check_hint: "userId checks in service layer"
        - control: "GraphQL field-level authorization"
          severity: HIGH
          check_hint: "@UseGuards on resolvers"
      input_security:
        - control: "Input validation on all endpoints"
          severity: CRITICAL
          check_hint: "class-validator DTOs, ValidationPipe global"
        - control: "SQL injection prevention"
          severity: CRITICAL
          check_hint: "TypeORM parameterized queries / Prisma (both safe by default)"
        - control: "XSS prevention"
          severity: HIGH
          check_hint: "sanitize-html or DOMPurify usage"
      transport:
        - control: "CORS configured restrictively"
          severity: HIGH
          check_hint: "cors() with allowlist, not '*'"
        - control: "Helmet HTTP security headers"
          severity: MEDIUM
          check_hint: "helmet() in main.ts"
        - control: "Rate limiting / throttling"
          severity: HIGH
          check_hint: "ThrottlerModule in app.module.ts"
      data_protection:
        - control: "Passwords hashed with bcrypt"
          severity: CRITICAL
          check_hint: "bcrypt.hash usage in auth service"
        - control: "PHI encrypted at rest"
          severity: CRITICAL
          check_hint: "encryption service, AES usage on health records"
        - control: "Secrets in environment variables only"
          severity: CRITICAL
          check_hint: "no hardcoded secrets in source"
        - control: "No .env files committed"
          severity: CRITICAL
          check_hint: ".gitignore includes .env"
      compliance:
        - control: "Audit trail for PHI access"
          severity: CRITICAL
          check_hint: "AuditLog entity, interceptor logging WHO accessed WHAT"
        - control: "Data retention policies defined"
          severity: HIGH
          check_hint: "LGPD compliance — retention limits"
        - control: "Consent management"
          severity: HIGH
          check_hint: "LGPD — explicit consent for data processing"
        - control: "Right to be forgotten support"
          severity: HIGH
          check_hint: "account deletion + data purge functionality"
        - control: "FHIR data privacy controls"
          severity: CRITICAL
          check_hint: "fhir.service.ts access controls"
        - control: "Multi-tenant data isolation"
          severity: CRITICAL
          check_hint: "tenantId filtering in all queries"
      infrastructure:
        - control: "Kubernetes pods run as non-root"
          severity: HIGH
          check_hint: "securityContext.runAsNonRoot in deployments"
        - control: "Kubernetes network policies defined"
          severity: HIGH
          check_hint: "NetworkPolicy resources in k8s/"
        - control: "Kubernetes secrets not in plain YAML"
          severity: CRITICAL
          check_hint: "Sealed Secrets or AWS Secrets Manager references"
        - control: "Container images use non-root user"
          severity: HIGH
          check_hint: "USER directive in Dockerfiles"
        - control: "WAF configured"
          severity: HIGH
          check_hint: "infrastructure/terraform/modules/waf/"

    dependency_audit:
      extract_command: |
        # Extract all package.json files and their dependencies
        for f in src/backend/package.json src/web/package.json src/web/web/package.json \
                  src/web/mobile/package.json src/web/design-system/package.json; do
          echo "=== $f ===";
          cat $f | python3 -c "import sys,json; d=json.load(sys.stdin); 
            print(json.dumps({**d.get('dependencies',{}), **d.get('devDependencies',{})}, indent=2))"
        done
      check_for:
        deprecated_packages:
          - "request (deprecated 2020 — use axios/fetch)"
          - "node-uuid (use uuid)"
          - "moment (use date-fns or dayjs)"
          - "tslint (replaced by eslint)"
          - "ts-jest (check version compatibility)"
          - "glob@7 (v9+ breaking change)"
        outdated_majors:
          - "NestJS v9 → v10 breaking changes"
          - "TypeORM v0.2 → v0.3 breaking changes"
          - "Prisma v4 → v5 breaking changes"
          - "React 17 → 18 (concurrent features)"
          - "React Native 0.71 → 0.73 (new arch)"
          - "Next.js 13 → 14 (app router)"
        security_sensitive:
          - "jsonwebtoken (check: CVE-2022-23529)"
          - "passport-jwt (check: version pinning)"
          - "bcrypt (check: bcryptjs vs bcrypt native)"
          - "typeorm (SQL injection in older versions)"
          - "axios (SSRF in older versions)"
          - "express (check for latest security patches)"

# =============================================================================
# SWARM SPAWN COMMAND
# =============================================================================
swarm_spawn:
  protocol: |
    AGENT: After completing SESSION BOOTSTRAP, display the command below as a
    markdown code block. Do NOT execute it. Instruct the user to copy and paste
    it into a SEPARATE terminal window. Wait for user to report completion.
  
  display_message: |
    Bootstrap complete. Please copy the entire command below and paste it into
    your separate terminal window to start the analysis swarm. Notify me when
    the swarm completes.

  command: |
    npx @claude-flow/cli@latest hive-mind spawn \
      --workers 8 \
      --topology hierarchical-mesh \
      --consensus byzantine \
      --claude \
      --model-routing intelligent \
      --namespace austa-analysis \
      --use-memory \
      --use-patterns \
      --use-vectors \
      --use-learning \
      --objective "
    SWARM DEEP-ANALYSIS-001: 5-dimension repository analysis | AUSTA SuperApp | 667 source files | output: 3 analysis reports

    MEMORY: analysis-scope, repo-context
    WORKSPACE: /Users/rodrigo/claude-projects/healthcare-super-app--w-gamification--tgfzl7

    PRIMARY DELIVERABLES:
    1. docs/analysis/REPOSITORY_DEEP_ANALYSIS.md
    2. docs/analysis/SECURITY_AUDIT.md
    3. docs/analysis/BUILD_QUALITY_SCORECARD.md

    ANTI-PATTERNS TO AVOID:
    ❌AP1: Modifying any source file — READ ONLY analysis
    ❌AP2: Writing code — analysis and reporting only
    ❌AP3: Creating PROGRESS.md, STATUS.md — use memory store only
    ❌AP4: Vague findings without file:line evidence
    ❌AP5: Skipping compliance verification before starting
    ❌AP6: Agent introspection loop — do NOT run 'hooks statusline' or 'hive-mind status' as a substitute for reading files. Each worker MUST read actual source/doc files and store substantive memory keys.
    ❌AP7: Missing per-worker exit gate — every worker MUST self-verify its own memory key was stored with >500 bytes BEFORE declaring completion. Command: npx @claude-flow/cli@latest memory retrieve -k <key> --namespace austa-analysis | wc -c → must be > 500
    ❌AP8: Synthesizer (Worker-8) starting without upstream gate — check ALL 7 upstream keys exist with >200 bytes each BEFORE writing any report. If any key is missing: store error key "synthesis-blocked-missing-<key>" and ABORT cleanly.
    ❌AP9: Parallel dimension workers reading each other's dependencies — Workers 1-7 are independent; Worker-8 is the ONLY synthesizer. Do NOT have Worker-3 read DIM-1 results from memory before Worker-1 has stored them.

    ━━━ PHASE 1: RECON (Workers 1-2, parallel) ━━━
    Worker-1 (RECON-LEAD):
      READ: all docs/specifications/ files, docs/original documentation/ files
      EXTRACT: purpose, user personas, regulatory context, NFR SLAs
      SEMANTIC SEARCH: use vector search with queries from DIM-1 in handoff YAML
      STORE: memory key dim1-purpose-summary, namespace austa-analysis
      EXIT GATE ✅: npx @claude-flow/cli@latest memory retrieve -k dim1-purpose-summary --namespace austa-analysis | wc -c  → must be > 500. IF GATE FAILS: re-execute READ+STORE.

    Worker-2 (DOCS-ANALYST):
      READ: all docs/design/ files, docs/ADRs/ files
      SCORE: each artifact using rubric in handoff YAML DIM-2
      COUNT: user stories with complete acceptance criteria
      IDENTIFY: missing ADRs, vague NFRs, undocumented decisions
      STORE: memory key dim2-plan-quality-scores, namespace austa-analysis
      EXIT GATE ✅: npx @claude-flow/cli@latest memory retrieve -k dim2-plan-quality-scores --namespace austa-analysis | wc -c  → must be > 500. IF GATE FAILS: re-execute READ+STORE.

    ━━━ PHASE 2: ANALYSIS (Workers 3-7, parallel after Phase 1) ━━━
    Worker-3 (TRACE-ANALYST):
      RETRIEVE: dim1-purpose-summary, dim2-plan-quality-scores
      PRE-CHECK: both keys must have >200 bytes or ABORT with "trace-blocked-missing-upstream"
      BUILD: traceability matrix (user need → requirement → architecture → code)
      MEASURE: % complete, % partial, % broken, % orphaned chains
      IDENTIFY: over-engineered features, under-covered user needs
      STORE: memory key dim3-adherence-gaps, namespace austa-analysis
      EXIT GATE ✅: npx @claude-flow/cli@latest memory retrieve -k dim3-adherence-gaps --namespace austa-analysis | wc -c  → must be > 500. IF GATE FAILS: re-execute BUILD+STORE.

    Worker-4 (CODE-AUDITOR-BACKEND):
      RUN: recon commands from DIM-4 (find, grep, wc — read only)
      SAMPLE READ: gamification-engine/achievements/, auth-service/auth/, care-service/telemedicine/, api-gateway/graphql/
      SCORE: all 10 backend rubric dimensions
      IDENTIFY: stub files, missing tests, ORM inconsistency, debt markers
      STORE: memory key dim4-backend-scored, namespace austa-analysis
      EXIT GATE ✅: npx @claude-flow/cli@latest memory retrieve -k dim4-backend-scored --namespace austa-analysis | wc -c  → must be > 500. IF GATE FAILS: re-execute SCORE+STORE.

    Worker-5 (CODE-AUDITOR-FRONTEND):
      RUN: test ratio and coverage commands
      SAMPLE READ: web/src/pages/ (3 pages), mobile/src/screens/ (3 screens), design-system/src/ structure
      SCORE: all 8 frontend rubric dimensions
      IDENTIFY: missing screens vs planned, design-system adoption gaps
      STORE: memory key dim4-frontend-scored, namespace austa-analysis
      EXIT GATE ✅: npx @claude-flow/cli@latest memory retrieve -k dim4-frontend-scored --namespace austa-analysis | wc -c  → must be > 500. IF GATE FAILS: re-execute SCORE+STORE.

    Worker-6 (SECURITY-AUDITOR):
      RUN: all automated security commands from DIM-5
      ASSESS: every control in security checklist (PASS/FAIL/PARTIAL/NOT_IMPLEMENTED)
      CHECK: HIPAA, LGPD, OWASP Top 10 compliance
      IDENTIFY: critical gaps requiring immediate remediation
      STORE: memory key dim5-security-checklist, namespace austa-analysis
      EXIT GATE ✅: npx @claude-flow/cli@latest memory retrieve -k dim5-security-checklist --namespace austa-analysis | wc -c  → must be > 500. IF GATE FAILS: re-execute ASSESS+STORE.

    Worker-7 (DEPENDENCY-AUDITOR):
      EXTRACT: all dependencies from all package.json files
      CHECK: npm audit results from automated commands
      IDENTIFY: deprecated packages, outdated majors, CVE-flagged packages
      LIST: exact package@version for each finding
      STORE: memory key dim5-deps-audit, namespace austa-analysis
      EXIT GATE ✅: npx @claude-flow/cli@latest memory retrieve -k dim5-deps-audit --namespace austa-analysis | wc -c  → must be > 500. IF GATE FAILS: re-execute CHECK+STORE.

    ━━━ PHASE 3: SYNTHESIS (Worker-8, STRICTLY after Phase 2 complete) ━━━
    Worker-8 (REPORT-SYNTHESIZER):
      UPSTREAM GATE (MANDATORY FIRST STEP — DO NOT SKIP):
        FOR EACH key in [dim1-purpose-summary, dim2-plan-quality-scores, dim3-adherence-gaps,
                         dim4-backend-scored, dim4-frontend-scored, dim5-security-checklist, dim5-deps-audit]:
          result = npx @claude-flow/cli@latest memory retrieve -k <key> --namespace austa-analysis | wc -c
          IF result < 200: ABORT — store "synthesis-blocked-missing-<key>" and STOP.
          DO NOT write any report with incomplete upstream data.
      RETRIEVE ALL: dim1-purpose-summary, dim2-plan-quality-scores, dim3-adherence-gaps,
                    dim4-backend-scored, dim4-frontend-scored, dim5-security-checklist,
                    dim5-deps-audit from namespace austa-analysis
      WRITE: docs/analysis/REPOSITORY_DEEP_ANALYSIS.md (full report per template)
      WRITE: docs/analysis/SECURITY_AUDIT.md (security findings + remediation plan)
      WRITE: docs/analysis/BUILD_QUALITY_SCORECARD.md (scored rubrics + evidence)
      INCLUDE: all file:line citations for every finding
      PRODUCE: Prioritized Recommendations table (P0/P1/P2/P3)

    EXIT CRITERIA:
    ✅ ls docs/analysis/ shows 3 files
    ✅ wc -l docs/analysis/REPOSITORY_DEEP_ANALYSIS.md >= 300
    ✅ wc -l docs/analysis/SECURITY_AUDIT.md >= 150
    ✅ npx @claude-flow/cli@latest memory list --namespace austa-analysis shows 9+ keys
    ✅ All 5 scoring rubrics completed with numeric scores (not '?')
    ✅ Security checklist 100% assessed (no '?' remaining)
    ✅ Prioritized recommendations table has P0 items identified

    ROLLBACK: If Worker-8 fails, each worker report is independently in memory.
    Retrieve all keys and manually synthesize: npx @claude-flow/cli@latest memory list --namespace austa-analysis

    ESTIMATED TIME: 3-4 hours
    "

# =============================================================================
# FINAL REPORT TEMPLATE
# =============================================================================
report_template:
  primary: "docs/analysis/REPOSITORY_DEEP_ANALYSIS.md"
  structure:
    - section: "Executive Summary"
      required_fields:
        - "Overall maturity score: X/5 (weighted average of 5 dimensions)"
        - "Top 3 strengths (with evidence)"
        - "Top 3 critical gaps (with evidence)"
        - "Priority action list (P0 = do now, P1 = this sprint, P2 = next sprint)"
    - section: "Dimension 1 — Purpose & Problem Definition"
      required_fields:
        - "Problem statement (extracted, not paraphrased)"
        - "User personas identified (with attributes)"
        - "Regulatory context (HIPAA/LGPD/ANS — present/absent)"
        - "Market scope (Brazil/LATAM/global)"
        - "Score: X/25 with per-criterion breakdown"
    - section: "Dimension 2 — Plan Quality"
      required_fields:
        - "Artifact rubric table (all artifacts scored)"
        - "ADR gap analysis (found vs expected)"
        - "Documentation completeness %"
        - "Score: X/45 with per-artifact breakdown"
    - section: "Dimension 3 — Plan-to-Purpose Adherence"
      required_fields:
        - "Traceability matrix (% complete/partial/broken/orphaned)"
        - "Journey balance analysis (Health vs Care vs Plan)"
        - "Over-engineering findings"
        - "Under-coverage findings"
        - "Score: X/25 with evidence"
    - section: "Dimension 4 — Build Quality"
      required_fields:
        - "Per-service completion status table"
        - "Test coverage ratio (actual numbers)"
        - "Backend rubric table (10 dimensions scored)"
        - "Frontend rubric table (8 dimensions scored)"
        - "Technical debt items (file:line)"
        - "Score: X/90 (backend 50 + frontend 40)"
    - section: "Dimension 5 — Security & Enterprise"
      required_fields:
        - "Security checklist table (PASS/FAIL/PARTIAL/NOT_IMPLEMENTED)"
        - "HIPAA compliance status"
        - "LGPD compliance status"
        - "OWASP Top 10 status"
        - "CVE findings (package@version, CVE-ID, severity)"
        - "Deprecated packages list"
        - "Score: X/20 (security controls)"
    - section: "Prioritized Recommendations"
      required_fields:
        - "P0 — Immediate (security critical, blocks launch)"
        - "P1 — This Sprint (high impact, <1 week effort)"
        - "P2 — Next Sprint (medium impact)"
        - "P3 — Backlog (improvements, nice-to-have)"
        - "Each item: Finding | Impact | Effort | Owner | Swarm-ready?"
    - section: "Appendix A — File Evidence Index"
      required_fields:
        - "All file:line citations for all findings"
    - section: "Appendix B — Dependency Audit"
      required_fields:
        - "All packages: name | current version | latest | CVE status | deprecated?"

# =============================================================================
# POST-ANALYSIS PROTOCOL
# =============================================================================
post_analysis:
  description: "Execute after Worker-8 confirms all 3 reports written"
  commands:
    train_on_analysis: |
      npx @claude-flow/cli@latest neural train \
        --modelType moe \
        --data-source "docs/analysis" \
        --epochs 5 \
        --namespace austa-analysis
    post_task_hook: |
      npx @claude-flow/cli@latest hooks post-task \
        --task-id "deep-analysis-001" \
        --outcome success
    store_completion: |
      npx @claude-flow/cli@latest memory store \
        --key "deep-analysis-001-complete" \
        --value "5-dimension analysis complete. Reports: docs/analysis/. Date: 2026-02-19" \
        --namespace austa-analysis
    verify_outputs: |
      ls -la docs/analysis/
      wc -l docs/analysis/*.md

# =============================================================================
# COMPLIANCE VERIFICATION (run before any work)
# =============================================================================
compliance_verification:
  - cmd: "npx @claude-flow/cli@latest --version"
    expect: ">= 3.0.0"
  - cmd: "npx @claude-flow/cli@latest hive-mind status"
    expect: "initialized"
  - cmd: "npx @claude-flow/cli@latest memory list --namespace austa-analysis"
    expect: "analysis-scope key present (after bootstrap)"
  - cmd: "npx @claude-flow/cli@latest neural list"
    expect: "models listed"
  - cmd: "npx @claude-flow/cli@latest hooks intelligence stats"
    expect: "SONA active, MoE active"

# =============================================================================
# SESSION CONTINUITY — If Analysis is Interrupted
# =============================================================================
resume_protocol:
  check_progress: |
    npx @claude-flow/cli@latest memory list --namespace austa-analysis
  dimension_keys_to_check:
    - "dim1-purpose-summary"
    - "dim2-plan-quality-scores"
    - "dim3-adherence-gaps"
    - "dim4-backend-scored"
    - "dim4-frontend-scored"
    - "dim5-security-checklist"
    - "dim5-deps-audit"
  resume_logic: |
    For each missing key above: re-run only that dimension's worker.
    Already-complete dimensions: retrieve from memory, do not re-execute.
    Final report: only run Worker-8 when all 7 keys present.

# =============================================================================
# KNOWN SESSION STATE (from previous bootstrap session)
# =============================================================================
prior_session_state:
  date: "2026-02-19"
  completed:
    - "claude-flow v3.0.0-alpha.151 installed + 4 alpha bugs patched"
    - "Daemon started (check with daemon status — may need restart)"
    - "Memory DB initialized at .swarm/memory.db"
    - "Hive-mind initialized (hierarchical, byzantine, 15 max agents)"
    - "5 agent configs: agents/ (coder, architect, tester, security-architect, reviewer)"
    - "Native modules globally installed: @ruvector/attention, @ruvector/sona, @ruvector/core, agentdb, agentic-flow"
    - "Init guide: .claude/claude-flow-init.yaml (1124 lines)"
  check_first: |
    npx @claude-flow/cli@latest daemon status
    npx @claude-flow/cli@latest hive-mind status
  if_daemon_stopped: |
    npx @claude-flow/cli@latest daemon start
    npx @claude-flow/cli@latest hooks worker dispatch --trigger map
