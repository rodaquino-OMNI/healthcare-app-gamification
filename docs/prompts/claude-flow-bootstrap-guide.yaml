# ══════════════════════════════════════════════════════════════════════════════
# Claude Flow V3 — Agent Bootstrap & Initialization Guide
# ══════════════════════════════════════════════════════════════════════════════
#
# PURPOSE: Comprehensive runbook for any agent (human or AI) to initialize,
#          configure, and operate Claude Flow V3 in this workspace.
#
# REPO:    https://github.com/ruvnet/claude-flow
# VERSION: v3.5.2 (stable)
# UPDATED: 2026-02-28
# ──────────────────────────────────────────────────────────────────────────────

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  ARCHITECTURE OVERVIEW                                                      │
# │                                                                             │
# │  Claude Flow V3 has FOUR configuration layers:                            │
# │                                                                             │
# │  1. .claude/settings.json       — Claude Code hooks, permissions, env vars  │
# │  2. .claude-flow/config.yaml    — Runtime: swarm, memory, neural, daemon    │
# │  3. .mcp.json                   — MCP server connection for tool integration│
# │  4. claude-flow.config.json     — SystemConfigSchema (doctor validation)    │
# │                                                                             │
# │  Data directories:                                                          │
# │  - .swarm/memory.db           — SQLite + HNSW vector database               │
# │  - .claude-flow/neural/       — Trained patterns (patterns.json)            │
# │  - .claude-flow/data/         — Session persistence                         │
# │  - .claude-flow/logs/         — Daemon and worker logs                      │
# │  - agents/                    — Agent YAML configs (coder, architect, etc.)  │
# └─────────────────────────────────────────────────────────────────────────────┘

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 0: PREREQUISITES
# ══════════════════════════════════════════════════════════════════════════════
prerequisites:
  required:
    node: ">= 20.0.0"           # v22 LTS recommended
    npm: ">= 10.0.0"
    git: ">= 2.40.0"
    claude_code_cli: ">= 2.0.0" # `claude --version` — install: npm install -g @anthropic-ai/claude-code
  optional:
    typescript: ">= 5.0.0"
    agentic_flow: ">= 2.0.7"    # For embeddings/routing — install: yarn add --dev agentic-flow@latest -W
  disk_space_minimum: "500MB"    # For memory.db + neural models

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 1: CLEAN INSTALL (Run once or when upgrading)
# ══════════════════════════════════════════════════════════════════════════════
phase_1_install:
  description: "Clear stale npx cache and pull latest claude-flow"
  why: >
    npx caches old versions. If `claude-flow doctor` shows "Version Freshness"
    warning, clear the cache first. This ensures all subsequent commands use
    the latest CLI.
  commands:
    - description: "Clear stale npx cache"
      command: "rm -rf ~/.npm/_npx/*"
      note: "May prompt for confirmation in zsh — answer 'y'"

    - description: "Pull and verify latest version"
      command: "npx -y @claude-flow/cli@latest --version"
      expected: "claude-flow v3.5.x"

  global_install_alternative:
    description: >
      npx can timeout on slow connections due to the large dependency tree
      (757+ packages). For reliability, install globally instead:
    commands:
      - "npm install -g @claude-flow/cli@latest"
      - "claude-flow --version"
    benefit: "All subsequent commands use 'claude-flow' directly (faster, no npx overhead)"
    cleanup: "npm uninstall -g @claude-flow/cli  # when no longer needed"

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 2: INITIALIZATION (Run once per workspace)
# ══════════════════════════════════════════════════════════════════════════════
phase_2_init:
  description: "Initialize all Claude Flow subsystems"

  step_1_config_init:
    description: "Create .claude/ and .claude-flow/ directories with defaults"
    command: "npx @claude-flow/cli@latest config init"
    creates:
      - ".claude/settings.json"
      - ".claude/helpers/"
      - ".claude/commands/    (10 commands)"
      - ".claude/skills/      (30 skills)"
      - ".claude/agents/      (99 agents)"
      - ".claude-flow/config.yaml"
      - ".claude-flow/data/"
      - ".claude-flow/logs/"
      - ".claude-flow/sessions/"
      - ".mcp.json"
      - "CLAUDE.md            (swarm guidance)"
    actual_output: "115 files created"
    notes:
      - "Use --force to reinitialize if already exists"
      - "The generated config.yaml is minimal — see our comprehensive version"

  step_2_memory_init:
    description: "Initialize SQLite + HNSW vector memory database"
    command: "npx @claude-flow/cli@latest memory init --force --verbose"
    creates:
      - ".swarm/memory.db"
    verification:
      tests: 6
      expected_tables:
        - memory_entries
        - patterns
        - pattern_history
        - trajectories
        - trajectory_steps
        - migration_state
        - sessions
        - vector_indexes
        - metadata
    features_enabled:
      - "384-dim ONNX embeddings (all-MiniLM-L6-v2)"
      - "HNSW indexing (150x faster search)"
      - "Pattern learning with confidence scoring"
      - "Temporal decay (30-day half-life)"

  step_3_daemon_start:
    description: "Start background daemon for workers and scheduling"
    command: "npx @claude-flow/cli@latest daemon start"
    notes:
      - "Runs in background, creates .claude-flow/daemon.pid"
      - "Check status: npx @claude-flow/cli@latest daemon status"
      - "Stop: npx @claude-flow/cli@latest daemon stop"
      - "Logs: .claude-flow/daemon.log"

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 3: INTELLIGENCE BOOTSTRAP (Run after init, or after major changes)
# ══════════════════════════════════════════════════════════════════════════════
phase_3_intelligence:
  description: "Train neural patterns and build agent configurations"

  step_1_pretrain:
    description: "Analyze codebase, extract patterns, learn strategies"
    command: "npx @claude-flow/cli@latest hooks pretrain --model-type moe --epochs 3"
    what_it_does:
      - "Scans all source files (84+ in this repo)"
      - "Extracts 30+ code patterns"
      - "Learns 16+ optimization strategies"
      - "Evaluates 46+ learning trajectories"
      - "Resolves contradictions in patterns"
      - "Builds semantic search embeddings"
    duration: "~1-3 seconds"
    model_types:
      moe: "Mixture of Experts — routes to specialized sub-models"
      transformer: "Full transformer attention"
      classifier: "Pattern classification"

  step_2_build_agents:
    description: "Generate optimized agent configs from learned patterns"
    command: "npx @claude-flow/cli@latest hooks build-agents --verbose"
    creates:
      - "agents/coder.yaml"
      - "agents/architect.yaml"
      - "agents/tester.yaml"
      - "agents/security-architect.yaml"
      - "agents/reviewer.yaml"
    output:
      configs_generated: 5
      patterns_applied: 15
      optimizations_included: 7

  step_3_neural_train:
    description: "Train neural coordination patterns"
    command: "npx @claude-flow/cli@latest neural train -p coordination"
    what_it_does:
      - "Runs 50 epochs of pattern training"
      - "Builds ReasoningBank (150 patterns)"
      - "Persists to .claude-flow/neural/patterns.json"
    actual_metrics:
      epochs: 50
      batch_size: 32
      embedding_dim: 256
      learning_rate: 0.01
      reasoning_bank_size: 150
      duration: "~0.2s"
    trainable_patterns:
      - coordination
      - optimization
      - prediction
      - error-recovery
      - task-routing

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 4: HIVE MIND (Multi-agent swarm coordination)
# ══════════════════════════════════════════════════════════════════════════════
phase_4_hive_mind:
  description: "Initialize queen-led swarm coordination"
  command: >
    npx @claude-flow/cli@latest hive-mind init
    --topology hierarchical
    --max-agents 15
    --consensus byzantine
    --auto

  topologies:
    hierarchical: "Queen controls all workers (recommended for coding)"
    mesh: "Peer-to-peer coordination"
    hierarchical-mesh: "Queen + peer groups"
    adaptive: "Dynamic topology based on workload"

  consensus_algorithms:
    byzantine: "BFT — tolerates f faults with 3f+1 agents (most robust)"
    raft: "Leader election — fast, good for stable teams"
    gossip: "Epidemic protocol — eventually consistent"
    crdt: "Conflict-free replicated data"
    quorum: "Majority voting"

  recommended_settings:
    coding_tasks:
      topology: hierarchical
      consensus: raft
      maxAgents: 8
      note: "Smaller teams = less drift, clearer roles"
    complex_analysis:
      topology: hierarchical-mesh
      consensus: byzantine
      maxAgents: 15
      note: "Large teams for parallel deep analysis"

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 5: WORKER DISPATCH (On-demand analysis)
# ══════════════════════════════════════════════════════════════════════════════
phase_5_workers:
  description: "Dispatch background analysis workers"
  workers:
    map:
      command: "npx @claude-flow/cli@latest hooks worker dispatch --trigger map"
      purpose: "Codebase mapping and architecture analysis"
      duration: "~30s"
    deepdive:
      command: "npx @claude-flow/cli@latest hooks worker dispatch --trigger deepdive"
      purpose: "Deep analysis of complex code patterns"
      duration: "~60s"
    ultralearn:
      command: "npx @claude-flow/cli@latest hooks worker dispatch --trigger ultralearn"
      purpose: "Neural training sequence, pattern consolidation"
      duration: "~60s"
    audit:
      command: "npx @claude-flow/cli@latest hooks worker dispatch --trigger audit"
      purpose: "Security scanning and CVE detection"
      duration: "~45s"
      priority: "critical"
    optimize:
      command: "npx @claude-flow/cli@latest hooks worker dispatch --trigger optimize"
      purpose: "Performance optimization analysis"
      duration: "~30s"
      priority: "high"

# ══════════════════════════════════════════════════════════════════════════════
# DAILY USAGE COMMANDS (Reference card)
# ══════════════════════════════════════════════════════════════════════════════
daily_usage:
  before_any_task:
    command: 'npx @claude-flow/cli@latest hooks pre-task --description "[task]" --task-id "[id]"'
    purpose: "Loads relevant patterns, sets context for the task"

  after_success:
    command: 'npx @claude-flow/cli@latest memory store --key "pattern-X" --value "[what worked]" --namespace patterns'
    purpose: "Persist successful patterns for future recall"

  search_patterns:
    command: 'npx @claude-flow/cli@latest memory search --query "[topic]" --namespace patterns'
    purpose: "Find relevant patterns from past work"

  diagnostics:
    command: "npx @claude-flow/cli@latest doctor --verbose"
    purpose: "Full system health check"

  neural_status:
    command: "npx @claude-flow/cli@latest neural status"
    purpose: "Check SONA, embeddings, ReasoningBank status"

  memory_stats:
    command: "npx @claude-flow/cli@latest memory stats"
    purpose: "Database size, entry counts, index status"

  hive_status:
    command: "npx @claude-flow/cli@latest hive-mind status"
    purpose: "Check queen, workers, consensus state"

# ══════════════════════════════════════════════════════════════════════════════
# CONFIGURATION FILES REFERENCE
# ══════════════════════════════════════════════════════════════════════════════
config_files:
  ".claude-flow/config.yaml":
    purpose: "Runtime configuration — THE main config file"
    read_by:
      - "auto-memory-hook.mjs (learningBridge, memoryGraph, agentScopes)"
      - "daemon (workers, schedules, autoStart)"
      - "hooks (preTask, postTask, trainOnEdit)"
      - "hive-mind (topology, consensus)"
      - "MCP server (transport, port, capabilities)"
    format: YAML
    schema_source: "@claude-flow/shared/src/core/config/schema.ts (SystemConfigSchema, validated via Zod)"
    sections:
      - swarm
      - hiveMind
      - memory
      - neural
      - embeddings
      - hooks
      - daemon
      - mcp
      - agents
      - learning
      - orchestrator
      - verification
      - security
      - logging
      - project

  ".claude/settings.json":
    purpose: "Claude Code integration — hooks, permissions, env vars"
    format: JSON
    key_sections:
      hooks: "PreToolUse, PostToolUse, UserPromptSubmit, SessionStart/End, Stop, PreCompact, SubagentStart, TeammateIdle, TaskCompleted"
      permissions: "allow/deny rules for Bash, MCP tools, file reads"
      env: "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS, CLAUDE_FLOW_V3_ENABLED"
      claudeFlow: "Mirrors key config.yaml settings for Claude Code awareness"

  ".mcp.json":
    purpose: "MCP server connection configuration"
    format: JSON
    content:
      server: claude-flow
      command: "npx @claude-flow/cli@latest mcp start"
      env_vars:
        CLAUDE_FLOW_MODE: v3
        CLAUDE_FLOW_HOOKS_ENABLED: "true"
        CLAUDE_FLOW_TOPOLOGY: hierarchical-mesh
        CLAUDE_FLOW_MAX_AGENTS: "15"
        CLAUDE_FLOW_MEMORY_BACKEND: hybrid

  "claude-flow.config.json":
    purpose: "SystemConfigSchema shim — doctor validation (V2-legacy path)"
    format: JSON
    critical_note: >
      The doctor checks this file AND validates it against the Zod
      SystemConfigSchema in @claude-flow/shared/src/core/config/schema.ts.
      This is NOT purely cosmetic — an invalid file produces [WARN] on
      every CLI command. The file MUST conform to SystemConfigSchema.
    required_shape:
      orchestrator:
        session: { persistSessions: true, dataDir: ".claude-flow/data", sessionRetentionMs: 3600000 }
        health: { checkInterval: 30000, historyLimit: 100, degradedThreshold: 1, unhealthyThreshold: 2 }
        lifecycle: { maxConcurrentAgents: 15, spawnTimeout: 30000, terminateTimeout: 10000, maxSpawnRetries: 3 }
      swarm:
        topology: "hierarchical-mesh"
        maxAgents: 15
        autoScale: { enabled: true, minAgents: 1, maxAgents: 15 }  # MUST be object, NOT boolean
        coordination: { consensusRequired: true, timeoutMs: 10000, retryPolicy: { maxRetries: 3, backoffMs: 500 } }
      memory:
        type: "hybrid"           # NOT "backend" — schema uses "type" enum
        path: ".swarm/memory.db"
        agentdb: { dimensions: 384, indexType: "hnsw" }
      mcp:
        name: "claude-flow"
        transport: { type: "stdio" }
    common_mistakes:
      - "Using 'autoScale: true' (boolean) instead of 'autoScale: { enabled: true, ... }' (object)"
      - "Missing 'orchestrator' key (it is REQUIRED, not optional)"
      - "Adding 'neural', 'hooks', '$schema', 'version' at root (not in SystemConfigSchema)"
      - "Using 'backend' instead of 'type' for memory"

  "agents/*.yaml":
    purpose: "Per-agent type configurations"
    format: YAML
    generated_by: "hooks build-agents"
    agents:
      - coder
      - architect
      - tester
      - security-architect
      - reviewer

# ══════════════════════════════════════════════════════════════════════════════
# WHY BOTH config.yaml AND config.json ARE NEEDED
# ══════════════════════════════════════════════════════════════════════════════
#
# ANALYSIS (from https://github.com/ruvnet/claude-flow source code, v3.5.2):
#
# 1. The auto-memory-hook.mjs EXPLICITLY reads `.claude-flow/config.yaml`:
#      const configPath = join(PROJECT_ROOT, '.claude-flow', 'config.yaml');
#    It parses learningBridge, memoryGraph, and agentScopes from this file.
#
# 2. The V3 init executor (executor.ts) GENERATES config.yaml by default
#    during `claude-flow init` — it's the official runtime config format.
#
# 3. The COMPONENTS.md documentation states:
#    ".claude-flow/config.yaml configures V3 runtime"
#
# 4. The config loader (loader.ts) searches for:
#    - claude-flow.config.json (V2 legacy — BUT STILL VALIDATED)
#    - claude-flow.config.js
#    - claude-flow.json
#    The V3 CLI commands read config.yaml directly for runtime.
#
# 5. CRITICAL DISCOVERY (v3.5.2): The doctor AND all CLI commands validate
#    claude-flow.config.json against SystemConfigSchema (Zod). An invalid
#    file produces [WARN] on EVERY command, not just doctor. The schema
#    requires: orchestrator (object, not optional), swarm.autoScale (object,
#    not boolean), memory.type (not memory.backend).
#
# 6. YAML vs JSON:
#    - YAML supports comments (essential for documenting 15+ config sections)
#    - YAML is more readable for nested structures
#    - settings.json remains JSON because Claude Code requires it
#    - config.yaml is the V3 runtime standard
#    - config.json is ALSO required for doctor validation / CLI shim
#
# VERDICT: BOTH files are needed. config.yaml for runtime, config.json
#          for CLI/doctor validation. They serve different purposes.
#
# ══════════════════════════════════════════════════════════════════════════════

# ══════════════════════════════════════════════════════════════════════════════
# QUICK-START: Copy-paste bootstrap sequence
# ══════════════════════════════════════════════════════════════════════════════
quickstart_sequence:
  description: "Run these commands in order to fully bootstrap Claude Flow"
  commands:
    - "rm -rf ~/.npm/_npx/*"
    - "npx -y @claude-flow/cli@latest --version"
    - "npx @claude-flow/cli@latest config init --force"
    - "npx @claude-flow/cli@latest memory init --force --verbose"
    - "npx @claude-flow/cli@latest daemon start"
    - "npx @claude-flow/cli@latest hooks pretrain --model-type moe --epochs 3"
    - "npx @claude-flow/cli@latest hooks build-agents --verbose"
    - "npx @claude-flow/cli@latest neural train -p coordination"
    - "npx @claude-flow/cli@latest hive-mind init --topology hierarchical --max-agents 15 --consensus byzantine --auto"
    - "npx @claude-flow/cli@latest doctor --verbose"
  note_for_ai_agents: >
    When running this sequence programmatically, wait for each command to
    fully complete before starting the next. Overlapping commands in the
    same terminal will cause SIGTERM / exit code 130 failures. Large
    installs (npm install -g) can take 60+ seconds.

# ══════════════════════════════════════════════════════════════════════════════
# TROUBLESHOOTING
# ══════════════════════════════════════════════════════════════════════════════
troubleshooting:
  stale_version:
    symptom: "doctor shows 'Version Freshness' warning"
    fix: "rm -rf ~/.npm/_npx/* && npx -y @claude-flow/cli@latest --version"

  config_warning:
    symptom: "doctor shows 'No config file (using defaults)'"
    fix: "Create claude-flow.config.json at project root (see config_files reference)"
    note: >
      NOT cosmetic. The doctor checks for claude-flow.config.json AND validates
      it against SystemConfigSchema (Zod). An invalid file causes [WARN] on
      every CLI command. Key pitfalls: orchestrator is REQUIRED, swarm.autoScale
      must be an object (not boolean), memory uses 'type' not 'backend'.
      config.yaml remains the V3 runtime config; config.json is the doctor shim.

  daemon_not_running:
    symptom: "doctor shows 'Daemon Status: Not running'"
    fix: "npx @claude-flow/cli@latest daemon start"

  sona_not_loaded:
    symptom: "neural status shows 'SONA Engine: Not loaded'"
    fix: "npx @claude-flow/cli@latest neural train -p coordination"
    note: "SONA is optional; SONA Coordinator + ReasoningBank are sufficient"

  wasm_fallback:
    symptom: "attention.FlashAttention is not a constructor"
    impact: "None — falls back to JS implementation automatically"
    fix: "No action needed"

  disk_space:
    symptom: "doctor shows 'Disk Space' failure"
    fix: "Free disk space; memory.db + neural data need ~50-100MB"

  memory_empty:
    symptom: "memory stats shows 0 entries"
    fix: "Normal after fresh init — entries accumulate during usage"
    populate: 'npx @claude-flow/cli@latest memory store --key "test" --value "hello" --namespace test'

  api_keys_warning:
    symptom: "doctor shows 'No API keys found'"
    impact: "Not needed for local Claude Code CLI usage"
    fix: "Set ANTHROPIC_API_KEY env var only if using API directly"

  agentic_flow_missing:
    symptom: "doctor shows 'agentic-flow: Not installed (optional)'"
    impact: "Embeddings/routing will use JS fallbacks (slower but functional)"
    fix: "yarn add --dev agentic-flow@latest -W   # for yarn workspaces"
    fix_alt: "npm install --save-dev agentic-flow@latest  # for npm projects"
    note: >
      Must be installed LOCALLY in the project node_modules — global install
      is not detected by the doctor. In monorepos, use -W (yarn) or
      --workspace-root (npm) to install at root level. The package has 740+
      transitive dependencies; allow 60+ seconds for install.
    disk_tip: "If installed globally during troubleshooting, remove with: npm uninstall -g agentic-flow"

  claude_code_cli_missing:
    symptom: "doctor shows 'Claude Code CLI: Not installed'"
    fix: "npm install -g @anthropic-ai/claude-code"
    verification: "claude --version  # expect: 2.x.x (Claude Code)"
