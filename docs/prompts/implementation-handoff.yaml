      npx @claude-flow/cli@latest memory retrieve -k dim5-security-checklist --namespace austa-analysis
    for_architecture_context: |
      npx @claude-flow/cli@latest memory retrieve -k dim4-backend-scored --namespace austa-analysis

  anti_patterns:
    critical_reference: "deep-analysis-handoff.yaml → swarm_spawn.command → ANTI-PATTERNS section"
    summary:
      - "AP1: Do NOT modify source files during analysis phases"
      - "AP2: Do NOT write code during analysis phases"
      - "AP3: Do NOT create PROGRESS.md/STATUS.md — use memory store"
      - "AP4: Do NOT report findings without file:line evidence"
      - "AP5: Do NOT skip compliance verification before starting"
      - "AP6: Agent introspection loop — read FILES, not 'hive-mind status'"
      - "AP7: Synthesizer must gate on ALL upstream keys (>200 bytes each)"
      - "AP8: Don't put dependent dimensions in same parallel swarm"
      - "AP9: Workers 1-7 are independent; only Worker-8 synthesizes"
    memory_keys:
      - pattern-anti-introspection-loop
      - pattern-anti-synthesizer-gate
      - pattern-anti-monolithic-swarm

  swarm_patterns:
    topology: "hierarchical-mesh"
    consensus: "byzantine"
    learned: |
      Independent dimensions → parallel swarms (SWARM-A, B, C).
      Dependent dimensions + synthesis → sequential SWARM-D, only after gate passes.
      Every worker needs an EXIT GATE: memory retrieve | wc -c > 500.
      Fix swarms: spawn specialized agents per finding category, coordinate via hive-mind.

