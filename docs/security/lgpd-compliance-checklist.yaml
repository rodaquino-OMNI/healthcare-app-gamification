# LGPD Compliance Checklist — AUSTA Healthcare SuperApp
# Generated: 2026-03-09
# Scope: Full platform (backend services, web, mobile)

metadata:
  law: "Lei Geral de Protecao de Dados (LGPD) - Lei no 13.709/2018"
  platform: "AUSTA Healthcare SuperApp"
  date: "2026-03-09"
  version: "1.0"
  services:
    - auth-service
    - care-service
    - health-service
    - plan-service
    - gamification-engine
    - notification-service
  prisma_schema: "src/backend/shared/prisma/schema.prisma"

# ============================================================
# 1. PHI ENDPOINT MAP
# ============================================================
phi_endpoints:
  # ----------------------------------------------------------
  # Endpoints decorated with @PhiAccess (audit-logged as PHI)
  # ----------------------------------------------------------
  protected:
    care_service:
      appointments:
        - endpoint: "POST /appointments"
          method: create
          controller: "appointments.controller.ts"
          phi_resource_type: "Appointment"
          phi_fields: ["notes"]
          guards: [JwtAuthGuard, RolesGuard]
        - endpoint: "GET /appointments"
          method: findAll
          controller: "appointments.controller.ts"
          phi_resource_type: "Appointment"
          phi_fields: ["notes"]
          guards: [JwtAuthGuard, RolesGuard]
        - endpoint: "GET /appointments/:id"
          method: findOne
          controller: "appointments.controller.ts"
          phi_resource_type: "Appointment"
          phi_fields: ["notes"]
          guards: [JwtAuthGuard, RolesGuard]
        - endpoint: "PATCH /appointments/:id"
          method: update
          controller: "appointments.controller.ts"
          phi_resource_type: "Appointment"
          phi_fields: ["notes"]
          guards: [JwtAuthGuard, RolesGuard]
        - endpoint: "DELETE /appointments/:id"
          method: remove
          controller: "appointments.controller.ts"
          phi_resource_type: "Appointment"
          phi_fields: ["notes"]
          guards: [JwtAuthGuard, RolesGuard]

      medications:
        - endpoint: "POST /medications"
          method: create
          controller: "medications.controller.ts"
          phi_resource_type: "Medication"
          phi_fields: ["name", "notes"]
          guards: [JwtAuthGuard]
          ownership_check: true
        - endpoint: "GET /medications"
          method: findAll
          controller: "medications.controller.ts"
          phi_resource_type: "Medication"
          phi_fields: ["name", "notes"]
          guards: [JwtAuthGuard]
        - endpoint: "GET /medications/:id"
          method: findOne
          controller: "medications.controller.ts"
          phi_resource_type: "Medication"
          phi_fields: ["name", "notes"]
          guards: [JwtAuthGuard]
          ownership_check: true
        - endpoint: "PUT /medications/:id"
          method: update
          controller: "medications.controller.ts"
          phi_resource_type: "Medication"
          phi_fields: ["name", "notes"]
          guards: [JwtAuthGuard]
          ownership_check: true
        - endpoint: "DELETE /medications/:id"
          method: remove
          controller: "medications.controller.ts"
          phi_resource_type: "Medication"
          phi_fields: ["name", "notes"]
          guards: [JwtAuthGuard]
          ownership_check: true

      treatments:
        - endpoint: "POST /treatments"
          method: create
          controller: "treatments.controller.ts"
          phi_resource_type: "TreatmentPlan"
          guards: [JwtAuthGuard]
        - endpoint: "GET /treatments"
          method: findAll
          controller: "treatments.controller.ts"
          phi_resource_type: "TreatmentPlan"
          guards: [JwtAuthGuard]
        - endpoint: "GET /treatments/:id"
          method: findOne
          controller: "treatments.controller.ts"
          phi_resource_type: "TreatmentPlan"
          guards: [JwtAuthGuard]
        - endpoint: "PUT /treatments/:id"
          method: update
          controller: "treatments.controller.ts"
          phi_resource_type: "TreatmentPlan"
          guards: [JwtAuthGuard]
        - endpoint: "DELETE /treatments/:id"
          method: remove
          controller: "treatments.controller.ts"
          phi_resource_type: "TreatmentPlan"
          guards: [JwtAuthGuard]

      symptom_checker:
        - endpoint: "POST /symptom-checker"
          method: checkSymptoms
          controller: "symptom-checker.controller.ts"
          phi_resource_type: "SymptomCheck"
          guards: [JwtAuthGuard]

      telemedicine:
        - endpoint: "POST /telemedicine/session"
          method: startTelemedicineSession
          controller: "telemedicine.controller.ts"
          phi_resource_type: "TelemedicineSession"
          guards: [JwtAuthGuard]

    health_service:
      health_metrics:
        - endpoint: "POST /health/:recordId"
          method: createHealthMetric
          controller: "health.controller.ts"
          phi_resource_type: "HealthMetric"
          phi_fields: ["value", "notes"]
          guards: [JwtAuthGuard, RolesGuard, ConsentGuard]
          consent_required: "HEALTH_DATA_SHARING"
        - endpoint: "PUT /health/:id"
          method: updateHealthMetric
          controller: "health.controller.ts"
          phi_resource_type: "HealthMetric"
          phi_fields: ["value", "notes"]
          guards: [JwtAuthGuard, RolesGuard, ConsentGuard]
          consent_required: "HEALTH_DATA_SHARING"

      fhir_interoperability:
        - endpoint: "GET /fhir/Patient/:id"
          controller: "fhir.controller.ts"
          guards: [JwtAuthGuard, ConsentGuard]
          consent_required: "HEALTH_DATA_SHARING"
        - endpoint: "GET /fhir/Observation"
          controller: "fhir.controller.ts"
          guards: [JwtAuthGuard, ConsentGuard]
          consent_required: "HEALTH_DATA_SHARING"
        - endpoint: "GET /fhir/Bundle/:patientId"
          controller: "fhir.controller.ts"
          guards: [JwtAuthGuard, ConsentGuard]
          consent_required: "HEALTH_DATA_SHARING"

  # ----------------------------------------------------------
  # Endpoints that handle sensitive data but LACK @PhiAccess
  # ----------------------------------------------------------
  unprotected_requiring_review:
    plan_service:
      - endpoint: "POST /claims"
        controller: "claims.controller.ts"
        guards: [JwtAuthGuard, RolesGuard]
        ownership_check: true
        reason: "Claims contain procedureCode and amount fields which are encrypted as PHI in Prisma middleware, but the endpoint lacks @PhiAccess audit decoration"
        recommendation: "Add @PhiAccess('Claim') to all 5 claims endpoints"

      - endpoint: "GET /claims"
        controller: "claims.controller.ts"
        reason: "Returns claim data including procedure codes and amounts"
        recommendation: "Add @PhiAccess('Claim')"

      - endpoint: "GET /claims/:id"
        controller: "claims.controller.ts"
        reason: "Returns individual claim with PHI fields"
        recommendation: "Add @PhiAccess('Claim')"

      - endpoint: "PUT /claims/:id"
        controller: "claims.controller.ts"
        reason: "Modifies claim data containing medical procedure info"
        recommendation: "Add @PhiAccess('Claim')"

      - endpoint: "DELETE /claims/:id"
        controller: "claims.controller.ts"
        reason: "Deletes PHI data without PHI audit trail"
        recommendation: "Add @PhiAccess('Claim')"

      - endpoint: "POST /documents"
        controller: "documents.controller.ts"
        guards: []  # NO AUTH GUARDS
        reason: "Document upload has no JwtAuthGuard and no @PhiAccess. Documents may contain medical images, lab results, or prescriptions"
        recommendation: "Add JwtAuthGuard, ownership checks, and @PhiAccess('Document')"

      - endpoint: "GET /documents"
        controller: "documents.controller.ts"
        guards: []
        reason: "Document listing is completely unauthenticated"
        recommendation: "Add JwtAuthGuard and ownership enforcement"

      - endpoint: "GET /documents/:id"
        controller: "documents.controller.ts"
        guards: []
        reason: "Individual document retrieval is unauthenticated"
        recommendation: "Add JwtAuthGuard and ownership enforcement"

      - endpoint: "DELETE /documents/:id"
        controller: "documents.controller.ts"
        guards: []
        reason: "Document deletion is unauthenticated and unaudited"
        recommendation: "Add JwtAuthGuard, ownership check, and @PhiAccess('Document')"

    privacy_service:
      - endpoint: "GET /api/privacy/my-data"
        controller: "privacy.controller.ts"
        guards: [JwtAuthGuard]
        reason: "Returns ALL user data including PHI but lacks @PhiAccess decoration"
        recommendation: "Add @PhiAccess('UserData') for complete audit trail of bulk data access"

      - endpoint: "GET /api/privacy/export"
        controller: "privacy.controller.ts"
        guards: [JwtAuthGuard]
        reason: "FHIR export of all PHI should be PHI-audit-logged"
        recommendation: "Add @PhiAccess('UserDataExport')"

# ============================================================
# 2. DATA SUBJECT RIGHTS (DSR) FLOW — LGPD Art. 18
# ============================================================
dsr_flow:
  right_to_access:
    lgpd_article: "Art. 18-II"
    endpoint: "GET /api/privacy/my-data"
    controller: "src/backend/shared/src/privacy/privacy.controller.ts"
    service_method: "PrivacyService.getMyData(userId)"
    implementation: |
      Queries 13 Prisma models in parallel: user, appointments, medications,
      healthMetrics, healthGoals, claims, plans, deviceConnections, notifications,
      gameProfile (with achievements/quests/rewards), medicalEvents, treatmentPlans,
      telemedicineSessions. Returns structured JSON object.
    data_categories_returned:
      - user (id, name, email, phone, cpf, createdAt, updatedAt)
      - appointments
      - medications
      - healthMetrics
      - healthGoals
      - claims
      - plans
      - deviceConnections
      - notifications
      - gameProfile (with achievements, quests, rewards)
      - medicalEvents
      - treatmentPlans
      - telemedicineSessions
    status: "implemented"
    gaps:
      - "No @PhiAccess audit decoration on this bulk-data-access endpoint"
      - "No rate limiting to prevent abuse of bulk data retrieval"

  right_to_portability:
    lgpd_article: "Art. 18-V"
    endpoint: "GET /api/privacy/export"
    controller: "src/backend/shared/src/privacy/privacy.controller.ts"
    service_method: "PrivacyService.exportAsFhirBundle(userId)"
    format: "FHIR R4 Bundle (type: collection)"
    fhir_resource_types:
      - "Patient (with CPF as identifier via urn:oid:2.16.840.1.113883.13.236)"
      - "Observation (health metrics mapped to LOINC codes)"
      - "MedicationStatement"
      - "Appointment"
    loinc_mappings:
      HEART_RATE: "8867-4"
      BLOOD_PRESSURE_SYSTOLIC: "8480-6"
      BLOOD_PRESSURE_DIASTOLIC: "8462-4"
      BLOOD_GLUCOSE: "2339-0"
      WEIGHT: "29463-7"
      STEPS: "41950-7"
      BODY_TEMPERATURE: "8310-5"
      OXYGEN_SATURATION: "2708-6"
      RESPIRATORY_RATE: "9279-1"
      SLEEP: "93832-4"
      CALORIES: "41981-2"
      DISTANCE: "41953-1"
    status: "implemented"
    gaps:
      - "Export does not include claims, treatmentPlans, or telemedicineSessions as FHIR resources"
      - "No download format option (only JSON, no CSV/PDF)"
      - "No @PhiAccess audit decoration"

  right_to_deletion:
    lgpd_article: "Art. 18-VI"
    endpoint: "DELETE /api/privacy/my-data"
    controller: "src/backend/shared/src/privacy/privacy.controller.ts"
    service_method: "PrivacyService.deleteMyData(userId)"
    implementation: |
      Executes cascading deletion in a single Prisma $transaction, respecting
      foreign key constraints. Deletes in dependency order: gamification children,
      gameProfile, notifications, notificationPreferences, telemedicineSessions,
      appointments, medications, treatmentPlans, deviceConnections, healthMetrics,
      healthGoals, medicalEvents, claims, benefits, coverages, plans, documents,
      consentRecords, and finally the user record.
    cascade_order:
      - userAchievement
      - userQuest
      - userReward
      - gameProfile
      - notification
      - notificationPreference
      - telemedicineSession
      - appointment
      - medication
      - treatmentPlan
      - deviceConnection
      - healthMetric
      - healthGoal
      - medicalEvent
      - claim
      - benefit
      - coverage
      - plan
      - document
      - consentRecord
      - user
    audit_anonymization: |
      Audit log entries are anonymized (userId set to 'DELETED_USER')
      rather than deleted, preserving the regulatory audit trail.
    status: "implemented"
    gaps:
      - "No confirmation step or cooling-off period before irreversible deletion"
      - "No notification to DPO or admin when deletion is executed"
      - "ConsentRecord deletion wrapped in try/catch due to model availability uncertainty"

  right_to_rectification:
    lgpd_article: "Art. 18-III"
    endpoint: "PATCH /api/privacy/my-data"
    controller: "src/backend/shared/src/privacy/privacy.controller.ts"
    service_method: "PrivacyService.rectifyMyData(userId, updates)"
    allowed_fields: ["name", "email", "phone"]
    restricted_fields: ["cpf", "password"]
    validation:
      - "At least one field must be provided"
      - "Email uniqueness check before update"
    status: "implemented"
    gaps:
      - "CPF rectification is not supported (may be needed for legal name/document changes)"
      - "No audit trail entry for rectification events"

  right_to_revoke_consent:
    lgpd_article: "Art. 18-IX / Art. 8, para. 5"
    endpoint: "DELETE /api/consents/:id"
    controller: "src/backend/shared/src/consent/consent.controller.ts"
    service_method: "ConsentService.revokeConsent(userId, consentId)"
    implementation: |
      Verifies consent belongs to the requesting user (ownership check).
      Updates status to REVOKED and sets revokedAt timestamp.
      Bulk revocation available via ConsentService.revokeAllConsents(userId)
      for right-to-be-forgotten requests.
    status: "implemented"
    gaps:
      - "No cascade effect: revoking HEALTH_DATA_SHARING consent does not block existing active sessions"
      - "No notification to data processors when consent is revoked"

  right_to_information:
    lgpd_article: "Art. 18-I"
    implementation: "Partially implemented via i18n consent texts and privacy policy screen"
    status: "partial"
    gaps:
      - "No dedicated endpoint to list all data processors and third parties"
      - "Privacy policy content is static in i18n, not dynamically generated from actual data flows"

# ============================================================
# 3. CONSENT MANAGEMENT
# ============================================================
consent_management:
  prisma_model: "ConsentRecord"
  schema_location: "src/backend/shared/prisma/schema.prisma (line 691)"
  model_fields:
    - "id: String (UUID)"
    - "userId: String"
    - "consentType: ConsentType enum"
    - "status: ConsentStatus (ACTIVE | REVOKED | EXPIRED)"
    - "purpose: String"
    - "dataCategories: String[]"
    - "grantedAt: DateTime"
    - "expiresAt: DateTime? (nullable, null = indefinite)"
    - "revokedAt: DateTime?"
    - "ipAddress: String? (audit trail)"
    - "userAgent: String? (audit trail)"
    - "version: Int (default 1)"

  consent_types:
    - type: "DATA_PROCESSING"
      description: "General data processing consent for platform operations"
      lgpd_basis: "Art. 7-I (consentimento do titular)"

    - type: "HEALTH_DATA_SHARING"
      description: "Consent to share health data with healthcare team"
      lgpd_basis: "Art. 11-I (consentimento especifico para dados sensiveis)"
      enforced_by: "ConsentGuard on health-service endpoints"
      endpoints_enforced:
        - "POST /health/:recordId"
        - "PUT /health/:id"
        - "GET /fhir/Patient/:id"
        - "GET /fhir/Observation"
        - "GET /fhir/Bundle/:patientId"

    - type: "MARKETING"
      description: "Consent for marketing communications"
      lgpd_basis: "Art. 7-I"

    - type: "RESEARCH"
      description: "Consent for anonymized health data research use"
      lgpd_basis: "Art. 7-IV (pesquisa) / Art. 11-II-c"

    - type: "TELEMEDICINE"
      description: "Consent for telemedicine session recording and data sharing"
      lgpd_basis: "Art. 11-I"

    - type: "THIRD_PARTY_SHARING"
      description: "Consent to share data with third-party providers"
      lgpd_basis: "Art. 7-I / Art. 33 (transferencia internacional)"

  api_endpoints:
    - method: "GET"
      path: "/api/consents"
      description: "List all consent records for the authenticated user"
      controller: "consent.controller.ts"

    - method: "POST"
      path: "/api/consents"
      description: "Grant a new consent (type, purpose, dataCategories, optional expiresAt)"
      controller: "consent.controller.ts"
      records_audit: true
      audit_fields: ["ipAddress", "userAgent"]

    - method: "DELETE"
      path: "/api/consents/:id"
      description: "Revoke a specific consent"
      controller: "consent.controller.ts"
      ownership_verified: true

    - method: "GET"
      path: "/api/consents/check/:type"
      description: "Check if user has active consent for a specific type"
      controller: "consent.controller.ts"

  consent_guard:
    file: "src/backend/shared/src/consent/consent.guard.ts"
    decorator: "@RequireConsent(ConsentType.HEALTH_DATA_SHARING)"
    behavior: |
      Reads consent type from handler metadata via Reflector.
      Extracts userId from JWT. Checks ConsentService.hasActiveConsent().
      Throws FORBIDDEN (CONSENT_004) if consent is missing or expired.
      Allows access if no consent metadata is set on the handler.

  consent_texts:
    pt_BR:
      - key: "socialAuth.lgpdConsent"
        text: "Eu concordo com o tratamento dos meus dados pessoais conforme a"
      - key: "socialAuth.privacyPolicy"
        text: "Politica de Privacidade"
      - key: "socialAuth.consentRequired"
        text: "Consentimento Necessario"
      - key: "socialAuth.consentMessage"
        text: "Por favor, aceite os termos de privacidade antes de continuar com o login social."
      - key: "socialAuth.disclaimer"
        text: "Ao entrar, voce concorda com nossos Termos de Servico e Politica de Privacidade. Seus dados sao protegidos pela LGPD (Lei Geral de Protecao de Dados)."
      - key: "onboarding.consentPrivacy.title"
        text: "Consentimento e Privacidade"
      - key: "onboarding.consentPrivacy.subtitle"
        text: "Seus dados estao protegidos"
      - key: "onboarding.consentPrivacy.consent1"
        text: "Concordo em compartilhar meus dados de saude com minha equipe medica"
      - key: "onboarding.consentPrivacy.consent2"
        text: "Aceito receber insights e recomendacoes de saude"
      - key: "onboarding.consentPrivacy.consent3"
        text: "Entendo que meus dados sao protegidos pela LGPD"
      - key: "onboarding.consentPrivacy.dataUsage"
        text: "Como seus dados serao usados"
      - key: "onboarding.consentPrivacy.dataUsageText"
        text: "Seus dados de saude sao criptografados e usados apenas para gerar recomendacoes personalizadas."
      - key: "settings.dataExport.info"
        text: "De acordo com a LGPD, voce tem direito de solicitar uma copia dos seus dados pessoais."

    en_US:
      - key: "socialAuth.lgpdConsent"
        text: "I agree to the processing of my personal data in accordance with the"
      - key: "socialAuth.privacyPolicy"
        text: "Privacy Policy"
      - key: "socialAuth.consentRequired"
        text: "Consent Required"
      - key: "socialAuth.consentMessage"
        text: "Please accept the privacy terms before continuing with social login."
      - key: "socialAuth.disclaimer"
        text: "By signing in, you agree to our Terms of Service and Privacy Policy. Your data is protected under LGPD (Lei Geral de Protecao de Dados)."
      - key: "onboarding.consentPrivacy.title"
        text: "Consent and Privacy"
      - key: "onboarding.consentPrivacy.consent1"
        text: "I consent to share my health data with my healthcare team"
      - key: "onboarding.consentPrivacy.consent2"
        text: "I agree to receive health insights and recommendations"
      - key: "onboarding.consentPrivacy.consent3"
        text: "I understand my data is protected under LGPD/HIPAA"
      - key: "settings.dataExport.info"
        text: "Under LGPD, you have the right to request a copy of your personal data."

# ============================================================
# 4. ENCRYPTION STATUS
# ============================================================
encryption:
  at_rest:
    mechanism: "AES-256-GCM with per-record random salt"
    implementation_file: "src/backend/shared/src/encryption/encryption.service.ts"
    key_derivation: "scrypt (32-byte salt, 32-byte key output)"
    encrypted_format: "salt:iv:authTag:ciphertext (all hex-encoded)"
    key_source: "ENCRYPTION_KEY environment variable"
    middleware_file: "src/backend/shared/src/encryption/prisma-encryption.middleware.ts"
    middleware_behavior: |
      Prisma middleware automatically encrypts on write (create, update, upsert,
      createMany, updateMany) and decrypts on read (findUnique, findFirst,
      findMany). Idempotent: skips already-encrypted values. Graceful degradation:
      legacy unencrypted data passes through without error.
    status: "implemented"

    phi_fields_encrypted:
      User:
        - "cpf"
        - "phone"
        - "email"
      HealthMetric:
        - "value"
        - "notes"
      HealthGoal:
        - "targetValue"
        - "currentValue"
      Claim:
        - "procedureCode"
        - "amount"
      Document:
        - "filename"
      Medication:
        - "name"
        - "notes"
      Notification:
        - "body"
      Appointment:
        - "notes"
      DeviceConnection:
        - "authToken"
        - "refreshToken"

    phi_fields_not_encrypted:
      User:
        - "password (hashed, not encrypted — acceptable)"
        - "name (PII, not currently encrypted)"
      Appointment:
        - "type (could reveal medical specialty)"
      TreatmentPlan:
        - "all fields (no entry in PHI_FIELDS map despite @PhiAccess on controller)"
      TelemedicineSession:
        - "all fields (no entry in PHI_FIELDS map despite @PhiAccess on controller)"
      MedicalEvent:
        - "all fields (no entry in PHI_FIELDS map)"

  in_transit:
    api: "HTTPS (TLS) — all API URLs use https://api.austa.com.br"
    mobile_ssl_pinning:
      file: "src/web/mobile/src/api/client.ts"
      notes: |
        Comment in client.ts references native-ssl-pinning.ts and
        Android network_security_config.xml. Implementation exists but
        certificates are placeholders requiring production certs.
    status: "partial"
    gaps:
      - "SSL pinning uses placeholder certificates, not production certs"
      - "No explicit TLS version enforcement (should enforce TLS 1.2+)"

  key_management:
    status: "basic"
    current: "ENCRYPTION_KEY from environment variable"
    gaps:
      - "No key rotation mechanism"
      - "No HSM or KMS integration (AWS KMS / Azure Key Vault recommended for production)"
      - "Key compromise would require re-encryption of all PHI fields"

# ============================================================
# 5. DATA RETENTION
# ============================================================
data_retention:
  health_metrics:
    config_key: "METRICS_RETENTION_DAYS"
    default_days: 730  # 2 years
    validation: "Joi.number().integer().min(1).max(3650)"
    source: "src/backend/health-service/src/config/validation.schema.ts"

  auth_data:
    config_key: "DATA_RETENTION_DAYS"
    default_days: 730  # 2 years
    source: "src/backend/auth-service/src/config/validation.schema.ts"

  care_recordings:
    config_key: "CARE_SERVICE_RECORDING_RETENTION_DAYS"
    default_days: 90
    source: "src/backend/care-service/src/config/configuration.ts"

  plan_documents:
    config_key: "CLAIMS_RETENTION_PERIOD"
    default_days: 2555  # 7 years (regulatory requirement for insurance)
    source: "src/backend/plan-service/src/config/configuration.ts"
    validation: "Joi.number() with description 'Document retention period in days'"

  audit_logs:
    retention: "indefinite (no TTL configured)"
    note: "Audit logs are anonymized on user deletion (userId -> 'DELETED_USER') but never purged"

  consent_records:
    retention: "indefinite"
    note: "Consent records are deleted during right-to-be-forgotten but otherwise have no expiry TTL"

  gaps:
    - "No automated purge jobs for expired retention periods"
    - "Audit log retention is indefinite — should have configurable TTL per LGPD Art. 16"
    - "No documented retention policy for gamification data"

# ============================================================
# 6. AUDIT LOGGING
# ============================================================
audit:
  implementation_file: "src/backend/shared/src/audit/audit.service.ts"
  interceptor_file: "src/backend/shared/src/audit/audit.interceptor.ts"
  decorator_file: "src/backend/shared/src/audit/phi-access.decorator.ts"
  prisma_model: "AuditLog (mapped to 'audit_logs' table)"

  general_audit:
    trigger: "AuditInterceptor on every controller action"
    logged_fields:
      - "userId (from JWT)"
      - "action (READ/WRITE/DELETE, mapped from HTTP method)"
      - "resourceType (derived from controller class name)"
      - "resourceId (from URL params)"
      - "ipAddress (from request.ip or x-forwarded-for)"
      - "userAgent"
      - "metadata: { handler, path, statusCode }"
    behavior: "Fire-and-forget (async, never blocks response)"

  phi_audit:
    trigger: "When @PhiAccess metadata is present on handler"
    additional_logging: "AuditService.logPHIAccess() with phiAccess:true in metadata"
    logged_fields:
      - "userId"
      - "resourceType (from @PhiAccess parameter, e.g., 'HealthMetric')"
      - "resourceId"
      - "action"
      - "metadata: { method, path, handler, ipAddress, userAgent, phiAccess: true }"

  database_indexes:
    - "@@index([userId])"
    - "@@index([resourceType, resourceId])"
    - "@@index([createdAt])"

  status: "implemented"
  gaps:
    - "No query/export endpoint for audit logs (admins cannot review audit trail via API)"
    - "No alerting on suspicious PHI access patterns"
    - "No separate audit database — audit logs share the same DB as application data"
    - "Failed access attempts (403/401) are not explicitly logged as security events"
    - "Consent changes (grant/revoke) are not audit-logged via AuditInterceptor"

