# ============================================================
# 8. DATA PROCESSING LEGAL BASES — LGPD Art. 7 & 11
# ============================================================
legal_bases:
  - category: "User account data (name, email, phone)"
    basis: "Art. 7-V (execucao de contrato)"
    justification: "Necessary for service delivery"

  - category: "CPF (Cadastro de Pessoa Fisica)"
    basis: "Art. 7-II (cumprimento de obrigacao legal)"
    justification: "Required by ANS (Agencia Nacional de Saude Suplementar) for health plan identification"

  - category: "Health metrics, medical records, diagnoses"
    basis: "Art. 11-I (consentimento especifico do titular)"
    justification: "Sensitive health data requires explicit, specific consent"
    enforcement: "ConsentGuard with RequireConsent(HEALTH_DATA_SHARING)"

  - category: "Insurance claims and procedure codes"
    basis: "Art. 7-V / Art. 11-II-f (tutela da saude)"
    justification: "Health insurance contract execution and healthcare provision"

  - category: "Gamification data (achievements, quests, rewards)"
    basis: "Art. 7-V (execucao de contrato)"
    justification: "Part of platform features agreed to in terms of service"

  - category: "Audit logs"
    basis: "Art. 7-II (cumprimento de obrigacao legal)"
    justification: "Regulatory compliance for healthcare data access tracking"

  - category: "Marketing communications"
    basis: "Art. 7-I (consentimento)"
    justification: "Optional, consent-based"
    enforcement: "ConsentType.MARKETING"

  - category: "Telemedicine recordings"
    basis: "Art. 11-I (consentimento especifico)"
    justification: "Medical consultation recordings are sensitive health data"
    enforcement: "ConsentType.TELEMEDICINE"

# ============================================================
# 9. COMPLIANCE GAPS
# ============================================================
gaps:
  critical:
    - id: "LGPD-GAP-001"
      title: "Documents controller has no authentication"
      lgpd_article: "Art. 46 (medidas de seguranca)"
      description: |
        The DocumentsController (plan-service) has zero authentication guards.
        All 4 endpoints (POST, GET, GET/:id, DELETE/:id) are publicly accessible.
        Documents may contain medical images, prescriptions, and lab results.
      affected_file: "src/backend/plan-service/src/documents/documents.controller.ts"
      recommendation: |
        Add @UseGuards(JwtAuthGuard, RolesGuard) at controller level.
        Add ownership verification (entityId == userId check).
        Add @PhiAccess('Document') decorator.
      severity: "critical"

    - id: "LGPD-GAP-002"
      title: "No DPO (Encarregado) designation or contact endpoint"
      lgpd_article: "Art. 41"
      description: |
        LGPD requires appointment of a Data Protection Officer (Encarregado)
        whose identity and contact information must be publicly available.
        No DPO designation exists in the codebase or public-facing pages.
      recommendation: |
        Designate a DPO, create a /api/dpo or /dpo public endpoint with
        contact information, and add DPO details to the privacy policy.
      severity: "critical"

    - id: "LGPD-GAP-003"
      title: "No data breach notification mechanism"
      lgpd_article: "Art. 48"
      description: |
        LGPD Art. 48 requires notification to ANPD and affected data subjects
        within a reasonable timeframe when a security incident affects personal
        data. No incident response or breach notification system exists.
      recommendation: |
        Implement a breach notification workflow: detection, assessment,
        ANPD notification template, user notification via email/push,
        and incident response logging.
      severity: "critical"

  high:
    - id: "LGPD-GAP-004"
      title: "Claims endpoints lack @PhiAccess audit decoration"
      lgpd_article: "Art. 46 / Art. 37"
      description: |
        All 5 claims endpoints handle PHI data (procedureCode, amount are
        encrypted as PHI by Prisma middleware) but lack @PhiAccess decoration,
        meaning PHI access to claims is not logged in the PHI audit trail.
      affected_file: "src/backend/plan-service/src/claims/claims.controller.ts"
      recommendation: "Add @PhiAccess('Claim') to all claims controller methods"
      severity: "high"

    - id: "LGPD-GAP-005"
      title: "TreatmentPlan and TelemedicineSession fields not encrypted"
      lgpd_article: "Art. 46"
      description: |
        TreatmentPlan and TelemedicineSession models have @PhiAccess on their
        controller endpoints but are not listed in the PHI_FIELDS map of the
        Prisma encryption middleware. Their fields are stored unencrypted.
      affected_file: "src/backend/shared/src/encryption/prisma-encryption.middleware.ts"
      recommendation: |
        Add TreatmentPlan and TelemedicineSession to PHI_FIELDS with
        appropriate sensitive fields (e.g., diagnosis, notes, recordingUrl).
      severity: "high"

    - id: "LGPD-GAP-006"
      title: "No encryption key rotation mechanism"
      lgpd_article: "Art. 46"
      description: |
        The ENCRYPTION_KEY is a single static environment variable with no
        rotation support. Key compromise would require manual re-encryption
        of all PHI fields across all models.
      recommendation: |
        Implement key versioning (encrypt with version tag), scheduled key
        rotation, and a migration script to re-encrypt under new keys.
        Consider integration with AWS KMS or Azure Key Vault.
      severity: "high"

    - id: "LGPD-GAP-007"
      title: "SSL certificate pinning uses placeholder certificates"
      lgpd_article: "Art. 46"
      description: |
        Mobile app references native-ssl-pinning.ts and Android
        network_security_config.xml but uses placeholder certificates.
        In production, this effectively disables certificate pinning.
      recommendation: |
        Replace placeholder certificates with production API server
        certificates. Implement certificate backup pins for rotation.
      severity: "high"

    - id: "LGPD-GAP-008"
      title: "Privacy/export endpoints lack @PhiAccess audit logging"
      lgpd_article: "Art. 37 (registros de operacoes)"
      description: |
        GET /api/privacy/my-data and GET /api/privacy/export return all
        user PHI but are not decorated with @PhiAccess, so bulk data
        access events are not captured in the PHI audit trail.
      affected_file: "src/backend/shared/src/privacy/privacy.controller.ts"
      recommendation: "Add @PhiAccess('UserData') to getMyData and exportData methods"
      severity: "high"

    - id: "LGPD-GAP-009"
      title: "MedicalEvent model has no PHI field encryption"
      lgpd_article: "Art. 46"
      description: |
        MedicalEvent stores medical event data but has no entry in the
        PHI_FIELDS map and no @PhiAccess on any controller endpoint.
        This data is neither encrypted nor audit-logged.
      recommendation: |
        Add MedicalEvent to PHI_FIELDS with relevant sensitive fields.
        Add a controller with @PhiAccess if direct access endpoints exist.
      severity: "high"

  medium:
    - id: "LGPD-GAP-010"
      title: "No automated data retention purge jobs"
      lgpd_article: "Art. 16 (eliminacao dos dados)"
      description: |
        Retention periods are configured (730 days for health, 90 for recordings,
        2555 for claims) but no automated cron/scheduled job exists to purge
        data that exceeds retention periods.
      recommendation: |
        Implement scheduled purge jobs (NestJS @Cron or external scheduler)
        that delete or anonymize records exceeding their retention period.
      severity: "medium"

    - id: "LGPD-GAP-011"
      title: "No DPIA (RIPD) documentation"
      lgpd_article: "Art. 38 (relatorio de impacto)"
      description: |
        No Data Protection Impact Assessment (RIPD - Relatorio de Impacto
        a Protecao de Dados Pessoais) document exists. ANPD may require
        this for health data processing at scale.
      recommendation: |
        Create a RIPD document covering: data flows, risks, mitigation
        measures, necessity and proportionality assessment.
      severity: "medium"

    - id: "LGPD-GAP-012"
      title: "Consent texts lack versioning"
      lgpd_article: "Art. 8 (consentimento)"
      description: |
        Consent texts in i18n files are static strings without version
        tracking. If consent wording changes, there is no way to know
        which version a user consented to.
      recommendation: |
        Add version field to consent texts. Store the consent text version
        in ConsentRecord. Require re-consent when text version changes.
      severity: "medium"

    - id: "LGPD-GAP-013"
      title: "No data processing record (ROPA)"
      lgpd_article: "Art. 37"
      description: |
        LGPD requires controllers to maintain records of processing activities.
        No structured ROPA (Record of Processing Activities) document exists.
      recommendation: |
        Create a ROPA document listing: processing purposes, data categories,
        data subjects, recipients, retention periods, and security measures
        for each processing activity.
      severity: "medium"

    - id: "LGPD-GAP-014"
      title: "User.name field stored unencrypted"
      lgpd_article: "Art. 46"
      description: |
        The User model encrypts cpf, phone, and email but the name field
        is stored in plaintext. Full names are personal data under LGPD.
      recommendation: |
        Add 'name' to the User entry in PHI_FIELDS or justify the decision
        with a documented risk assessment.
      severity: "medium"

    - id: "LGPD-GAP-015"
      title: "No international data transfer safeguards"
      lgpd_article: "Art. 33-35"
      description: |
        If the platform uses cloud providers with data centers outside Brazil,
        LGPD Art. 33 requires adequate safeguards for international transfers.
        No data residency configuration or transfer impact assessment exists.
      recommendation: |
        Document cloud provider data residency. If data leaves Brazil,
        implement Standard Contractual Clauses or verify adequacy decisions.
        Configure cloud storage to use Brazil (sa-east-1) regions.
      severity: "medium"

  low:
    - id: "LGPD-GAP-016"
      title: "No granular consent for each data category"
      lgpd_article: "Art. 8, para. 4"
      description: |
        The onboarding consent flow uses 3 broad checkboxes rather than
        granular per-category consent (e.g., separate consent for medications
        vs. health metrics vs. telemedicine).
      recommendation: |
        Consider adding more granular consent options aligned with the
        6 ConsentType enum values already defined in the backend.
      severity: "low"

    - id: "LGPD-GAP-017"
      title: "FHIR export incomplete — missing resource types"
      lgpd_article: "Art. 18-V (portabilidade)"
      description: |
        The FHIR R4 Bundle export includes Patient, Observation,
        MedicationStatement, and Appointment but omits claims, treatment
        plans, telemedicine sessions, and gamification data.
      recommendation: |
        Add FHIR resource mappings for Claim (ExplanationOfBenefit),
        CarePlan (TreatmentPlan), and Encounter (TelemedicineSession).
      severity: "low"

    - id: "LGPD-GAP-018"
      title: "No right to data anonymization"
      lgpd_article: "Art. 18-IV (anonimizacao)"
      description: |
        LGPD provides a right to anonymization of unnecessary data.
        The platform only supports full deletion, not anonymization
        as an alternative.
      recommendation: |
        Implement an anonymization endpoint that replaces PII with
        pseudonymized values while preserving non-identifying data
        for analytics and research purposes.
      severity: "low"

