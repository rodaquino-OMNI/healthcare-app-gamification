# ==========================================
# AUSTA Healthcare SuperApp - Redis Configuration
# ==========================================

# ── Network ────────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60

# ── Security ───────────────────────────────────────────────────────────────
requirepass ${REDIS_PASSWORD}

# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB ""

# ── Memory ─────────────────────────────────────────────────────────────────
maxmemory 512mb
maxmemory-policy allkeys-lru

# ── Persistence (AOF) ─────────────────────────────────────────────────────
appendonly yes
appendfsync everysec
appendfilename "appendonly.aof"

# ── RDB Snapshots ──────────────────────────────────────────────────────────
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# ── Logging ────────────────────────────────────────────────────────────────
loglevel notice
