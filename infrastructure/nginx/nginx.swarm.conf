# ==========================================
# AUSTA Healthcare SuperApp - Nginx Swarm Config
# ==========================================

# ── Rate Limiting Zones ────────────────────────────────────────────────────

# General API: 30 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Auth endpoints: 5 requests/second per IP (stricter)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# Health checks: 100 requests/second per IP
limit_req_zone $binary_remote_addr zone=health_limit:10m rate=100r/s;

# ── Upstream ───────────────────────────────────────────────────────────────

upstream laravel_api {
    least_conn;
    server laravel-api:8000;
    keepalive 32;
}

# ── Global Settings ───────────────────────────────────────────────────────

server_tokens off;

# ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Allow health check without redirect
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS Configuration ─────────────────────────────────────────────────────

    ssl_certificate     /etc/letsencrypt/live/austa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/austa/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security Headers ──────────────────────────────────────────────────────

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Logging ───────────────────────────────────────────────────────────────

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ── General Settings ──────────────────────────────────────────────────────

    client_max_body_size 10m;

    # ── Gzip Compression ──────────────────────────────────────────────────────

    gzip on;
    gzip_types
        application/json
        application/javascript
        text/css
        text/xml
        text/plain
        application/xml
        application/xml+rss
        text/javascript;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_comp_level 6;

    # ── Common Proxy Settings ─────────────────────────────────────────────────

    proxy_http_version    1.1;
    proxy_set_header      Host              $host;
    proxy_set_header      X-Real-IP         $remote_addr;
    proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;
    proxy_set_header      X-Request-ID      $request_id;
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # ── Nginx Health Check ────────────────────────────────────────────────────

    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Let's Encrypt ACME Challenge ──────────────────────────────────────────

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # ── Health Endpoint ───────────────────────────────────────────────────────

    location /api/health {
        limit_req zone=health_limit burst=50 nodelay;
        proxy_pass http://laravel_api;
        add_header X-Content-Type-Options "nosniff";
    }

    # ── Auth Endpoints (stricter rate limit) ──────────────────────────────────

    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://laravel_api;
    }

    # ── All API Routes ────────────────────────────────────────────────────────

    location / {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://laravel_api;
    }
}
