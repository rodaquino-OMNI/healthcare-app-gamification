version: '3.8'

# ==========================================
# AUSTA Healthcare SuperApp - Production
# ==========================================
# All secrets must be provided via .env.production
# DO NOT hardcode any credentials in this file

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:18-alpine
    container_name: postgres-production
    restart: always
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=128MB
        -c wal_buffers=16MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-production-data:/var/lib/postgresql/data
    networks:
      - austa-production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 4G
    cpus: '2'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: redis-production
    restart: always
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-production-data:/data
    networks:
      - austa-production
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 1G
    cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Backend Services ───────────────────────────────────────────────────────

  api-gateway:
    image: ghcr.io/${GITHUB_OWNER}/austa-api-gateway:${IMAGE_TAG}
    container_name: api-gateway-production
    restart: always
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      AUTH_SERVICE_URL: http://auth-service:3001
      HEALTH_SERVICE_URL: http://health-service:3002
      CARE_SERVICE_URL: http://care-service:3003
      PLAN_SERVICE_URL: http://plan-service:3004
      GAMIFICATION_ENGINE_URL: http://gamification-engine:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - austa-production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 1G
    cpus: '1'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  auth-service:
    image: ghcr.io/${GITHUB_OWNER}/austa-auth-service:${IMAGE_TAG}
    container_name: auth-service-production
    restart: always
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: ${DATABASE_URL}?schema=auth
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - austa-production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 1G
    cpus: '1'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  health-service:
    image: ghcr.io/${GITHUB_OWNER}/austa-health-service:${IMAGE_TAG}
    container_name: health-service-production
    restart: always
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: "3002"
      DATABASE_URL: ${DATABASE_URL}?schema=health
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      SENTRY_DSN: ${SENTRY_DSN}
      DATADOG_API_KEY: ${DATADOG_API_KEY}
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - austa-production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 1G
    cpus: '0.75'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  care-service:
    image: ghcr.io/${GITHUB_OWNER}/austa-care-service:${IMAGE_TAG}
    container_name: care-service-production
    restart: always
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: "3003"
      DATABASE_URL: ${DATABASE_URL}?schema=care
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - austa-production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 1G
    cpus: '0.75'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  plan-service:
    image: ghcr.io/${GITHUB_OWNER}/austa-plan-service:${IMAGE_TAG}
    container_name: plan-service-production
    restart: always
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: "3004"
      DATABASE_URL: ${DATABASE_URL}?schema=plan
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - austa-production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 1G
    cpus: '0.75'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  gamification-engine:
    image: ghcr.io/${GITHUB_OWNER}/austa-gamification-engine:${IMAGE_TAG}
    container_name: gamification-engine-production
    restart: always
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: "3005"
      DATABASE_URL: ${DATABASE_URL}?schema=gamification
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - austa-production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 2G
    cpus: '1.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  notification-service:
    image: ghcr.io/${GITHUB_OWNER}/austa-notification-service:${IMAGE_TAG}
    container_name: notification-service-production
    restart: always
    ports:
      - "3006:3006"
    environment:
