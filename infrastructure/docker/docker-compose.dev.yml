# Development environment — 7 microservices on ports 3000-3006, PostgreSQL 16, Redis 7, Kafka with Zookeeper
version: '3.8'

services:
  api-gateway:
    image: austa-api-gateway:latest
    container_name: api-gateway
    build:
      context: ../../src/backend
      dockerfile: api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      API_URL: http://localhost:3000
      AUTH_SERVICE_URL: http://auth-service:3001
      HEALTH_SERVICE_URL: http://health-service:3002
      CARE_SERVICE_URL: http://care-service:3003
      PLAN_SERVICE_URL: http://plan-service:3004
      GAMIFICATION_ENGINE_URL: http://gamification-engine:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - auth-service
      - health-service
      - care-service
      - plan-service
      - gamification-engine
      - redis
    networks:
      - austa-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  auth-service:
    image: austa-auth-service:latest
    container_name: auth-service
    build:
      context: ../../src/backend
      dockerfile: auth-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-austa}:${POSTGRES_PASSWORD:-austa}@postgres:5432/${POSTGRES_DB:-austa}?schema=auth
      JWT_SECRET: ${JWT_SECRET:-changeme-dev-only}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    networks:
      - austa-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  health-service:
    image: austa-health-service:latest
    container_name: health-service
    build:
      context: ../../src/backend
      dockerfile: health-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://austa:austa@postgres:5432/austa?schema=health
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - austa-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  care-service:
    image: austa-care-service:latest
    container_name: care-service
    build:
      context: ../../src/backend
      dockerfile: care-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://austa:austa@postgres:5432/austa?schema=care
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - austa-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  plan-service:
    image: austa-plan-service:latest
    container_name: plan-service
    build:
      context: ../../src/backend
      dockerfile: plan-service/Dockerfile
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://austa:austa@postgres:5432/austa?schema=plan
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - austa-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  gamification-engine:
    image: austa-gamification-engine:latest
    container_name: gamification-engine
    build:
      context: ../../src/backend
      dockerfile: gamification-engine/Dockerfile
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: development
      PORT: 3005
      DATABASE_URL: postgresql://austa:austa@postgres:5432/austa?schema=gamification
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - austa-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  notification-service:
    image: austa-notification-service:latest
    container_name: notification-service
    build:
      context: ../../src/backend
      dockerfile: notification-service/Dockerfile
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: development
      PORT: 3006
      DATABASE_URL: postgresql://austa:austa@postgres:5432/austa?schema=notification
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - austa-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-austa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-austa}
      POSTGRES_DB: ${POSTGRES_DB:-austa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - austa-network

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - austa-network

  kafka:
    image: confluentinc/cp-kafka:7.9.5
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper
    networks:
      - austa-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.5
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - austa-network

networks:
  austa-network:
    driver: bridge

volumes:
  postgres_data: