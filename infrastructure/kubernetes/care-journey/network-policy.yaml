apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: care-service-network-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: care-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic ONLY from api-gateway
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 3000
  egress:
  # Allow connections to Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis-master
    ports:
    - protocol: TCP
      port: 6379
  # Allow connections to Database
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow DNS resolution
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
