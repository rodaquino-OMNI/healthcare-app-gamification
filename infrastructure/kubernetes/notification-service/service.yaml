apiVersion: v1
kind: Service
metadata:
  name: notification-service
  labels:
    app: notification-service
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
    - port: 8080
      targetPort: 3001
      protocol: TCP
      name: websocket