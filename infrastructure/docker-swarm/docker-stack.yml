version: "3.8"

# ==========================================
# AUSTA Healthcare SuperApp - Docker Swarm Stack
# ==========================================

services:
  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt-certs:/etc/letsencrypt:ro
      - ../nginx/nginx.swarm.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - austa-frontend
      - austa-backend
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      - laravel-api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Laravel API ──────────────────────────────────────────────────────────────
  laravel-api:
    image: ghcr.io/austa/healthcare-app:${IMAGE_TAG:-latest}
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    volumes:
      - laravel-storage:/var/www/html/storage
    networks:
      - austa-backend
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Laravel Queue Worker ─────────────────────────────────────────────────────
  laravel-worker:
    image: ghcr.io/austa/healthcare-app:${IMAGE_TAG:-latest}
    command: php artisan queue:work redis --queue=gamification,notifications,default --tries=3
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - laravel-storage:/var/www/html/storage
    networks:
      - austa-backend
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      - postgres
      - redis

  # ── Laravel Scheduler ────────────────────────────────────────────────────────
  laravel-scheduler:
    image: ghcr.io/austa/healthcare-app:${IMAGE_TAG:-latest}
    command: php artisan schedule:work
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - laravel-storage:/var/www/html/storage
    networks:
      - austa-backend
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      - postgres
      - redis

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-austa}
      - POSTGRES_USER=${POSTGRES_USER:-austa}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - austa-backend
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 4G
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-austa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis-data:/data
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - austa-backend
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  austa-frontend:
    driver: overlay
  austa-backend:
    driver: overlay
    internal: true

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  letsencrypt-certs:
    driver: local
  laravel-storage:
    driver: local
