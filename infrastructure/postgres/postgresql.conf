# ==========================================
# AUSTA Healthcare SuperApp - PostgreSQL Configuration
# ==========================================

# ── Connection Settings ────────────────────────────────────────────────────
listen_addresses = '*'
max_connections = 200
port = 5432

# ── Memory ─────────────────────────────────────────────────────────────────
shared_buffers = 256MB
effective_cache_size = 768MB
maintenance_work_mem = 128MB
work_mem = 4MB

# ── WAL ────────────────────────────────────────────────────────────────────
wal_level = replica
max_wal_senders = 3
wal_keep_size = 256MB

# ── Query Tuning ───────────────────────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ── Logging ────────────────────────────────────────────────────────────────
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_timezone = 'UTC'

# ── Locale ─────────────────────────────────────────────────────────────────
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
