# ==========================================
# AUSTA Healthcare SuperApp - Nginx Staging
# ==========================================

# Rate limiting zone: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ─── Upstreams ──────────────────────────────────────────────────────────────

upstream api_gateway {
    server api-gateway:4000;
    keepalive 32;
}

upstream auth_service {
    server auth-service:3001;
    keepalive 16;
}

upstream health_service {
    server health-service:3002;
    keepalive 16;
}

upstream care_service {
    server care-service:3003;
    keepalive 16;
}

upstream plan_service {
    server plan-service:3004;
    keepalive 16;
}

upstream gamification_engine {
    server gamification-engine:3005;
    keepalive 16;
}

upstream notification_service {
    server notification-service:3006;
    keepalive 16;
}

# ─── HTTP → HTTPS Redirect ──────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Allow health check without redirect
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ──────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name _;

    # TLS certificates (replace with real paths in staging)
    ssl_certificate     /etc/nginx/certs/staging.crt;
    ssl_certificate_key /etc/nginx/certs/staging.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Logging
    access_log  /var/log/nginx/staging.access.log;
    error_log   /var/log/nginx/staging.error.log warn;

    # General settings
    client_max_body_size 10m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    # Common proxy headers
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_read_timeout  60s;
    proxy_connect_timeout 10s;

    # ── Nginx health check ────────────────────────────────────────────────────

    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Auth Service ──────────────────────────────────────────────────────────

    location /api/auth/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://auth_service/;
    }

    # ── Health Journey Service ────────────────────────────────────────────────

    location /api/health/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://health_service/;
    }

    # ── Care Journey Service ──────────────────────────────────────────────────

    location /api/care/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://care_service/;
    }

    # ── Plan Journey Service ──────────────────────────────────────────────────

    location /api/plans/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://plan_service/;
    }

    # ── Gamification Engine ───────────────────────────────────────────────────

    location /api/gamification/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://gamification_engine/;
    }

    # ── Notification Service (WebSocket-enabled) ──────────────────────────────

    location /api/notifications/ {
        limit_req zone=api_limit burst=20 nodelay;
        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://notification_service/;
    }

    # ── API Gateway (default — handles all other /api/* traffic) ─────────────

    location / {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://api_gateway;
    }
}
