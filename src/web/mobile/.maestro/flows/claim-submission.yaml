appId: com.austa.superapp
tags:
  - regression
  - plan
---
- launchApp
- tapOn:
    id: "welcome-cta-login"
- tapOn:
    id: "login-email-input"
- inputText: "test@austa.health"
- tapOn:
    id: "login-password-input"
- inputText: "Test123!@#"
- tapOn:
    id: "login-submit-button"
- assertVisible:
    id: "home-screen"
    timeout: 10000
- tapOn:
    text: "Plan"
- assertVisible:
    id: "plan-dashboard-claims"
    timeout: 5000
- tapOn:
    id: "plan-dashboard-claims"
- assertVisible:
    id: "plan-claims-list"
    timeout: 5000
- tapOn:
    id: "plan-claims-submit-new"
- assertVisible:
    id: "plan-claim-type-select"
    timeout: 5000
- tapOn:
    id: "plan-claim-type-select"
- tapOn:
    id: "plan-claim-date-input"
- inputText: "2026-02-22"
- tapOn:
    id: "plan-claim-amount-input"
- inputText: "150.00"
- tapOn:
    id: "plan-claim-provider-input"
- inputText: "Hospital São Paulo"
- tapOn:
    id: "plan-claim-submit-button"
- assertVisible:
    text: "submitted"
    timeout: 10000
