appId: com.austa.superapp
tags:
  - regression
  - plan
---
# ── Login ──
- launchApp
- tapOn:
    id: "welcome-cta-login"
- tapOn:
    id: "login-email-input"
- inputText: "test@austa.health"
- tapOn:
    id: "login-password-input"
- inputText: "Test123!@#"
- tapOn:
    id: "login-submit-button"
- assertVisible:
    id: "home-screen"
    timeout: 10000

# ── Navigate to Plan tab ──
- tapOn:
    text: "Plan"

# ── Assert Plan Dashboard sections are visible ──
- assertVisible:
    id: "plan-dashboard-digital-card"
    timeout: 5000
- assertVisible:
    id: "plan-dashboard-cost-simulator"
    timeout: 5000
- assertVisible:
    id: "plan-dashboard-benefits"
    timeout: 5000

# Scroll down to reveal Coverage and Claims sections
- scrollUntilVisible:
    element:
      id: "plan-dashboard-coverage"
    direction: DOWN
    timeout: 5000
- assertVisible:
    id: "plan-dashboard-coverage"

- scrollUntilVisible:
    element:
      id: "plan-dashboard-claims"
    direction: DOWN
    timeout: 5000
- assertVisible:
    id: "plan-dashboard-claims"

# ── Navigate to Claims via section title tap ──
- tapOn:
    id: "plan-dashboard-claims"
- assertVisible:
    id: "plan-claims-list"
    timeout: 5000
- assertVisible:
    id: "plan-claims-submit-new"
    timeout: 5000
- assertVisible:
    id: "plan-claims-filter"
    timeout: 5000
- back

# ── Navigate to Coverage via section title tap ──
- tapOn:
    id: "plan-dashboard-coverage"
- assertVisible:
    id: "plan-coverage-title"
    timeout: 5000
- assertVisible:
    id: "plan-coverage-details"
    timeout: 5000
- back

# ── Navigate to Cost Simulator via stat card tap ──
- tapOn:
    id: "plan-dashboard-cost-simulator"
- assertVisible:
    id: "plan-cost-procedure-input"
    timeout: 5000
- assertVisible:
    id: "plan-cost-calculate"
    timeout: 5000
- back

# ── Navigate to Benefits via stat card tap ──
- tapOn:
    id: "plan-dashboard-benefits"
- back

# ── Navigate to Digital Card ──
- scrollUntilVisible:
    element:
      id: "plan-dashboard-digital-card"
    direction: UP
    timeout: 5000
- tapOn:
    id: "plan-dashboard-digital-card"
- back

# ── Final assertion: back on dashboard ──
- assertVisible:
    id: "plan-dashboard-digital-card"
    timeout: 5000
