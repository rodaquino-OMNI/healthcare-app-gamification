appId: com.austa.superapp
tags:
  - regression
  - gamification
---
- launchApp
- tapOn:
    id: "welcome-cta-login"
- tapOn:
    id: "login-email-input"
- inputText: "test@austa.health"
- tapOn:
    id: "login-password-input"
- inputText: "Test123!@#"
- tapOn:
    id: "login-submit-button"
- assertVisible:
    id: "home-screen"
    timeout: 10000
- tapOn:
    text: "Achievements"
- assertVisible:
    id: "gamification-achievements-list"
    timeout: 5000
- tapOn:
    id: "gamification-achievement-card"
    index: 0
- back
- tapOn:
    id: "gamification-tab-quests"
- assertVisible:
    id: "gamification-quest-list"
    timeout: 5000
- tapOn:
    id: "gamification-tab-rewards"
- assertVisible:
    id: "gamification-reward-list"
    timeout: 5000
