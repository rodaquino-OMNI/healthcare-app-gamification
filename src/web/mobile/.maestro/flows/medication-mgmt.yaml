appId: com.austa.superapp
tags:
  - regression
  - health
---
- launchApp
- tapOn:
    id: "welcome-cta-login"
- tapOn:
    id: "login-email-input"
- inputText: "test@austa.health"
- tapOn:
    id: "login-password-input"
- inputText: "Test123!@#"
- tapOn:
    id: "login-submit-button"
- assertVisible:
    id: "home-screen"
    timeout: 10000
- tapOn:
    text: "Health"
- tapOn:
    id: "medication-list"
    timeout: 5000
- assertVisible:
    id: "medication-list"
- tapOn:
    id: "fab-add-medication"
- assertVisible:
    text: "Add Medication"
    timeout: 5000
- tapOn:
    id: "medication-search-input"
- inputText: "Amoxicillin"
- scroll:
    direction: DOWN
