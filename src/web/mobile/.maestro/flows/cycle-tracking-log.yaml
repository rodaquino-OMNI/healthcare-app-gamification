appId: com.austa.superapp
tags:
  - regression
  - cycle-tracking
  - health
  - p2
---
# ── Login ──
- launchApp
- tapOn:
    id: "welcome-cta-login"
- tapOn:
    id: "login-email-input"
- inputText: "test@austa.health"
- tapOn:
    id: "login-password-input"
- inputText: "Test123!@#"
- tapOn:
    id: "login-submit-button"
- assertVisible:
    id: "home-screen"
    timeout: 10000

# ── Navigate to Health tab ──
- tapOn:
    text: "Health"

# ── Open Cycle Tracking ──
- tapOn:
    text: "Cycle Tracking"
    timeout: 5000

# ── Assert CycleHome screen elements are visible ──
- assertVisible:
    id: "log-period-button"
    timeout: 5000
- assertVisible:
    id: "view-today-button"

# ── Navigate to Log Period Start ──
- tapOn:
    id: "log-period-button"

# ── Select "Started Today" ──
- assertVisible:
    id: "started-today-button"
    timeout: 5000
- tapOn:
    id: "started-today-button"

# ── Select flow intensity ──
- tapOn:
    id: "flow-light"
    timeout: 3000

# ── Add optional notes ──
- tapOn:
    id: "notes-input"
- inputText: "E2E test cycle entry"

# ── Save the entry ──
- tapOn:
    id: "save-button"

# ── Navigate back to CycleHome and verify ──
- assertVisible:
    id: "log-period-button"
    timeout: 5000

# ── Navigate to history tab to verify entry ──
- tapOn:
    id: "tab-history"
    timeout: 3000
- assertVisible:
    id: "cycle-history-list"
    timeout: 5000
