appId: com.austa.superapp
tags:
  - regression
  - lgpd
  - error-path
---
# Login
- launchApp
- tapOn:
    id: "welcome-cta-login"
- tapOn:
    id: "login-email-input"
- inputText: "test@austa.health"
- tapOn:
    id: "login-password-input"
- inputText: "Test123!@#"
- tapOn:
    id: "login-submit-button"
- assertVisible:
    id: "home-screen"
    timeout: 10000
# Navigate to Privacy Settings
- tapOn:
    text: "Settings"
- tapOn:
    id: "settings-privacy-service"
    timeout: 5000
# Toggle marketing consent off (revoke)
- tapOn:
    id: "settings-privacy-marketing"
# Verify consent revoked feedback
- assertVisible:
    id: "consent-revoked-message"
    timeout: 5000
