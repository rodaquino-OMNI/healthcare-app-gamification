appId: com.austa.superapp
tags:
  - regression
  - plan
  - error-path
---
# Login
- launchApp
- tapOn:
    id: "welcome-cta-login"
- tapOn:
    id: "login-email-input"
- inputText: "test@austa.health"
- tapOn:
    id: "login-password-input"
- inputText: "Test123!@#"
- tapOn:
    id: "login-submit-button"
- assertVisible:
    id: "home-screen"
    timeout: 10000
# Navigate to Claims
- tapOn:
    text: "Plan"
- tapOn:
    id: "plan-dashboard-claims"
    timeout: 5000
- tapOn:
    id: "plan-claims-submit-new"
    timeout: 5000
# Submit without filling required fields
- tapOn:
    id: "plan-claim-submit-button"
# Verify validation errors visible
- assertVisible:
    id: "claim-validation-error"
    timeout: 5000
