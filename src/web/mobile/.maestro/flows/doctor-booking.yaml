appId: com.austa.superapp
tags:
  - regression
  - care
---
- launchApp
- tapOn:
    id: "welcome-cta-login"
- tapOn:
    id: "login-email-input"
- inputText: "test@austa.health"
- tapOn:
    id: "login-password-input"
- inputText: "Test123!@#"
- tapOn:
    id: "login-submit-button"
- assertVisible:
    id: "home-screen"
    timeout: 10000
- tapOn:
    text: "Care"
- tapOn:
    id: "doctor-search-input"
- inputText: "cardiologist"
- tapOn:
    id: "doctor-results-list"
    index: 0
- assertVisible:
    text: "Book"
    timeout: 5000
