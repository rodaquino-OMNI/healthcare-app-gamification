appId: com.austa.superapp
tags:
  - regression
  - auth
  - error-path
---
- launchApp
- tapOn:
    id: "welcome-cta-login"
- tapOn:
    id: "login-email-input"
- inputText: "invalid@test.com"
- tapOn:
    id: "login-password-input"
- inputText: "wrongpassword123"
- tapOn:
    id: "login-submit-button"
- assertVisible:
    id: "login-error-message"
    timeout: 5000
- assertNotVisible:
    id: "home-screen"
