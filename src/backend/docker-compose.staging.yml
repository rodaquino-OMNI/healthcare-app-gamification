version: '3.8'

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-austa_staging}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-austa_staging}
    volumes:
      - postgres-staging-data:/var/lib/postgresql/data
    networks:
      - austa-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-austa_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    container_name: redis-staging
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-staging-data:/data
    networks:
      - austa-staging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper-staging
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - austa-staging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  kafka:
    image: confluentinc/cp-kafka:8.1.1
    container_name: kafka-staging
    restart: unless-stopped
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - austa-staging
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ─── Backend Services ───────────────────────────────────────────────────────

  api-gateway:
    image: ghcr.io/${GITHUB_OWNER:-austa-superapp}/austa-api-gateway:${IMAGE_TAG:-latest}
    container_name: api-gateway-staging
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: staging
      PORT: "4000"
      AUTH_SERVICE_URL: http://auth-service:3001
      HEALTH_SERVICE_URL: http://health-service:3002
      CARE_SERVICE_URL: http://care-service:3003
      PLAN_SERVICE_URL: http://plan-service:3004
      GAMIFICATION_ENGINE_URL: http://gamification-engine:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - austa-staging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  auth-service:
    image: ghcr.io/${GITHUB_OWNER:-austa-superapp}/austa-auth-service:${IMAGE_TAG:-latest}
    container_name: auth-service-staging
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: staging
      PORT: "3001"
      DATABASE_URL: ${DATABASE_URL}?schema=auth
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - austa-staging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  health-service:
    image: ghcr.io/${GITHUB_OWNER:-austa-superapp}/austa-health-service:${IMAGE_TAG:-latest}
    container_name: health-service-staging
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: staging
      PORT: "3002"
      DATABASE_URL: ${DATABASE_URL}?schema=health
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      SENTRY_DSN: ${SENTRY_DSN:-}
      DATADOG_API_KEY: ${DATADOG_API_KEY:-}
    env_file:
      - .env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - austa-staging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  care-service:
    image: ghcr.io/${GITHUB_OWNER:-austa-superapp}/austa-care-service:${IMAGE_TAG:-latest}
    container_name: care-service-staging
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: staging
      PORT: "3003"
      DATABASE_URL: ${DATABASE_URL}?schema=care
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - austa-staging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  plan-service:
    image: ghcr.io/${GITHUB_OWNER:-austa-superapp}/austa-plan-service:${IMAGE_TAG:-latest}
    container_name: plan-service-staging
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: staging
      PORT: "3004"
      DATABASE_URL: ${DATABASE_URL}?schema=plan
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - austa-staging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  gamification-engine:
    image: ghcr.io/${GITHUB_OWNER:-austa-superapp}/austa-gamification-engine:${IMAGE_TAG:-latest}
    container_name: gamification-engine-staging
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: staging
      PORT: "3005"
      DATABASE_URL: ${DATABASE_URL}?schema=gamification
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - austa-staging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  notification-service:
    image: ghcr.io/${GITHUB_OWNER:-austa-superapp}/austa-notification-service:${IMAGE_TAG:-latest}
    container_name: notification-service-staging
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: staging
      PORT: "3006"
      DATABASE_URL: ${DATABASE_URL}?schema=notification
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    env_file:
      - .env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - austa-staging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

networks:
  austa-staging:
    driver: bridge

volumes:
  postgres-staging-data:
  redis-staging-data:
