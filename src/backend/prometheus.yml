global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "api-gateway"
    scrape_interval: 10s
    static_configs:
      - targets: ["api-gateway:3000"]
    metrics_path: "/metrics"

  - job_name: "auth-service"
    scrape_interval: 10s
    static_configs:
      - targets: ["auth-service:3001"]
    metrics_path: "/metrics"

  - job_name: "health-service"
    scrape_interval: 10s
    static_configs:
      - targets: ["health-service:3002"]
    metrics_path: "/metrics"

  - job_name: "care-service"
    scrape_interval: 10s
    static_configs:
      - targets: ["care-service:3003"]
    metrics_path: "/metrics"

  - job_name: "plan-service"
    scrape_interval: 10s
    static_configs:
      - targets: ["plan-service:3004"]
    metrics_path: "/metrics"

  - job_name: "gamification-engine"
    scrape_interval: 10s
    static_configs:
      - targets: ["gamification-engine:3005"]
    metrics_path: "/metrics"

  - job_name: "notification-service"
    scrape_interval: 10s
    static_configs:
      - targets: ["notification-service:3006"]
    metrics_path: "/metrics"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]